body:
  text: 伊濱集卷六元王沂撰五言律詩試院中聞簾官張雄飛賦詩甚多分題得春草賦送孟功郎中使淮南二月青門道玉騘驕不行和烟迷上苑隨水遶蕪城目極傷離别情多管送迎相思定相寄佳句夢中成馮氏蔵書堂蕭條門巷靜時有客停輪所得寧湏計相過莫厭頻芸香清辟潤書帶細摇春自笑揚雄僻誰云郭劇貧送袁達道諸生都養久列郡用才先白髪占烏鵲清江照畫船東陽好山水憲府富英賢慎爾持水蘖還應力薦延送范悦古燕市多竒俊歸心獨浩然朱雲辭吏日賈誼上書年春綠蘆溝草江回楚客船知才不能薦敢恨坐無氊送苖天澤從師古云樂話别意何如司馬雖工賦兒寛本受書凉風下黃葉秋水媚紅蕖燈火橋門夜新詩定起予送符生遊子三年别雙親八十稀好風催畫鷁春水照斑衣長樂鐘聲斷蘆溝樹影微我無懷橘日空望白雲飛送揭理京華為客久不是賞音稀書未投光範詩先賦式微凉風驚畫扇江水照斑衣莫道行裝薄驪珠滿袖歸賦風靜追蘋末興况復值蕭條猛勢資新鴈寒威伴暮潮過山雲散亂經樹葉飄颻今日烟江上征帆望望遥題蘇伯修春風亭退食青瑣闥委蛇嘉樹林如何試春服還此集華簪庭草皆生意園禽自好音寥寥千載上俛仰㑹余心月庭為孫伯昭賦朝出塵如霧歸來月滿庭名高三語掾食厭五侯鯖碧漢雲歸凈金莖露未零壯懷銷鑠盡偏照髪星星生日次楊自樗姑夫無限劬勞感澘然涕泗零桑弧今在户萊服舊趨庭齒豁榮何益家貧險盡經徒存心耿耿有愧鬢星星挽蕭處士逺心江左衣冠族家傳復過庭城空新化鶴忩冷舊囊螢西漢儒林傳南州處士星階前蘭玉滿衮衮繼芳馨挽王端卿處士風吹隨流水烏衣自夕陽忩前書帶草林下徳星堂編簡尋真味嵓花散古香凄凉鎮山路松柏暮蒼蒼除夕沙路燈成市衡門雪擁籬茂陵新病後梁父獨吟時濩落浮波瓠傾輸向日葵不憂雙鬢改惟恨鈍如槌過劒閣危棧羊腸轉羣峰馬齒齊崇墉専地險疋練覺天低俯矙金牛北雄吞玉罍西連林青不斷留與子規啼峽山次陳心吾病酒知更早推篷愛月亭千林動凉吹數葉下秋汀峽近深防虎沙昏亂照螢殊方思妙藥愁醉只長醒仁齋為醫者郭成甫賦燕處仁為表淳風坐挽還寶方懸肘後陰徳見眉間焚券長安市求仙太白山文園消渴久歸思滿鄉闗送陳萬里之四明幕官衆樂昔曽别蓬萊亦可求邦君能生嘯幕府得名流溝港通魚市雲霞雜蜃樓因君一回首塵土滿貂裘八十老人鳩杖鹿為裳龎眉兩鬢霜鶴巢親種樹龜息舊支床自得安心法寧論却老方恩榮新賜帛大勝橘中蔵送僧觀外龍去千山雨花開萬樹春幽禪端有味瘦影本無塵會見螺吞象方知獸有麟馬師瞞不得龎藴語非真題解馬焦縣尉詩卷驛吏傳呼定驊騮顧主鳴牧羊憐卜式上疏笑梅生芻秣寧無法温凉要適平誰分駑與駿騰踏入神京廖子謙廣文席上次韻城中九日過家釀報新開偶就陶公菊因同鄭老杯鷄肥縁黍熟鱸美及橙來莫賦停雲句應湏踏月回送簡西碧尹桃源龍門登早歲鳬舄化今朝縣古仙源近城荒楚戍遥莎㕔移案牘葦屋半漁樵别後書頻寄清淮入兩潮書事暮三朝四裏亁啼濕哭中人間爭腐鼠天外起𡨕鴻價重咸陽市名高稷下宫元經何日草寂寞笑揚雄竹澗亭聞説軒車過新亭醉墨存硬黃臨古帖空翠落清尊老節題詩遍春流洗硯渾烟霞興蕭散難與俗人言題楓溪圖秋色醉紅樹晴嵐蒸白雲何人事結搆於此脱塵氛野屐破苔色輕橈生水紋仙源如可到鸞鶴定平分書感學荒虛度歲客逺苦思親未得平安報空驚物候新向來甘絶俗不是故違人好在牆根草青青又一春嘉陵道中蜀道朝逢雨蕭蕭意轉迷江沙留虎跡山木䕶猿啼古棧縁崖小陰雲傍水低春禽正堪聴莫惜錦障泥旦日口占朔日逢丁卯王正紀甲寅階蓂天上早池草雪中春城郭回佳氣衣冠失舊人食貧甘守拙垂老遂為民曉發曉發槍竿嶺縁雲路杳茫驚飈振嵓壑明月在衣裳擬欲超千載從兹覽八荒悠然晴景豁木葉滿山黃題彭叔介負郭茅屋圖負郭幽棲處林陰見草堂采樵躋鳥道垂釣踏魚航樹擁山雲濕泉流石髓香亦知清景好來往未能忘感興古逕苔衣積晴囱竹影侵市聲鏖午枕幽興寄雲林問字人擕酒敲門客抱琴急材聞聖世休效越人吟送張掾之官河西含香辭粉署躍馬過凉州野迥牛羊小天低帳幕稠清朝行召用雄鎮要分憂細酌蒲萄酒寧愁前路脩逰東山為愛東山好還思蜀道行玉裁笻竹杖雪縷芋魁羮會法參兠率遊仙夢玉京江波正西望况聴杜鵑聲寄張順中四首醉寫烏絲紙狂披紫綺裘時無李供奉誰識董糟邱月照清伊曉風生碧樹秋天津橋畔柳定拂酒家樓薊北花先發周南草又青許身甘濩落懷友惜飄零擬就窪尊飲重看布被銘只愁清潁水照見髪星星金匱書成晚銅駝迹已迷憶同池上酌曽向壁間題仙子能騎鶴山翁解祝鷄無才禆盛代有意學幽棲子住雒橋邊堂成祀十賢何由薦蘋藻毎恨隔山川牲就蟠螭繫書憑過鴈傳伊流清見底誰覓孝㢘船蘭蕙圖澤國多芳草藂生亦可憐餘馨留楚佩幽思入湘絃按譜雖同族為容各自妍灤河秋水濶疑問過江船題霍山寓隠長揖漢公卿携書隠澗坰朱雲堪作吏貢禹最明經書報新來鶴囊乾舊聚螢相期高晚節不盡太行青幽居客思渾無賴開窓忽見山數峰青嶂出千里白雲還溪鳥恰飛起野花相對閒浮生百年内消得幾愁顔同劉槎翁蕭朋起朋漢西華望月雲散出西華秋清月色賒光涵珠斗凈影抱玉繩斜河迥槎孤汎崖陰樹半遮如何今夜裏星彩聚仙家題嚴甥元齡松軒讀書圖憶爾幽軒好躭書久未逢高科懷五桂喬木愛雙松流水池邊路浮雲户外峰世家元不忝力學待昌宗送推官之嘉禾檇李民多訟君行總法曹南州雖地逺東海要門高霜橘明千樹仙禽唳九臯一麾容出守吾亦問吳舠送黃汝舟推官高郵高沙為郡逺城下客檣多笛弄揚州月珠游甓社波漁樵民易足雲水氣相和他日觀為政扁舟試一過由東湖入鄱陽出大孤艤棹轉東湖㳂流出大孤地方原跨楚王業久興吳山掩重瞳廟沙沉八陣圖萬邦歸職貢風化憶唐虞平潭驛中秋晉國闗河在秋風禾黍成叢祠誰命爵野鳥自呼名又是中秋節其如倦客情太行今夜月還似去年明喜蝶翳葉身如醉迎風勢便狂娟娟輕傅粉栩栩暗偷香橘蠧忘前夢蛛絲闕後防殷勤收墜翼羣蟻為誰忙送舒亦誠歸江南碣石山中客青門道上歸泉甘供釀酒霞綺可裁衣迎棹慈鴉舞啣書白鶴飛回瞻丹鳳闕雲氣轉霏微題太湖烟雨圖垂虹亭上望烟樹辨三州悲嘯魚龍夜青黄橘柚秋氷綃誰解寫畫鷁我曽游忽動南歸興同盟有白鷗夜次荻港泊舟臨荻港敗葉響蕭蕭汀鳥翔秋浦江豚落暮潮傍人漁未散吟伴酒初消因識將軍令轅門夜寂寥滎陽郡夫人挽章崇徳瞻華表滎陽憶故侯名郎麟一角熟歲橘千頭萱草空華屋杯棬共此邱懷清高百尺欝欝見松楸送遼陽學正歸覲四望遼陽逺身疑化鶴仙向來文學掾今日孝㢘船烏哺無窮意駒馳有限年夜闌更秉燭細説舊山川送學錄永年泮水集羣賢才華獨妙年定因文學掾為覓孝㢘船能賦推王粲明經引服䖍西風正摇落此别意茫然旦日詠山茶王氏鳴珂里山茶舊所栽花從新旦發根是昔年培緑潤疑雲度紅深愛日來春風故相惜歲歲長條枚馬伏波廟諸將中興日遺思獨在民壺頭憐晚歲椒壁誤功臣古殿松陰冷空堦草色新雲臺圖畫好廟食更何人秋懐四首飄泊五秋螢無人問獨醒遥空孤鳥白平野數峰青望逺心猶壯懷人涕自零邱園他日事艱阻飽曽經朝曦窺破牖寒鵲下空庭爽氣回青女清愁伴客星崢嶸喬木影寂寞晚花馨不似牆根草依然滿地青入夜雨聲急開門落葉深風霜欺敗絮塵土暗孤琴飄泊嗟吾道艱虞識此心囚山成底事時得一閒吟客子歸何晚山城歲又窮寒砧催短日老木受高風憂患身如寄塵埃鬢欲蓬江南天一角回首羨飛鴻沙嶺沙嶺千層出氊車一字齊馬啣青苜蓿人唱白銅鞮野曠青烟直天遥落日低回看丹鳳闕秖在五雲西送傅生還汶陽塵土貂裘黑闗山木葉黃秋風吹汶水歸客問呉航虎穴能無子龍宫别有方會看文學國重舉孝㢘郎小莊道中客路千崖裏春風二月中虎蹄荒徑少鸎語故鄉同澗水縈廻緑山花自在紅物華空滿眼去意只匆匆福州税提舉張君挽章小試征商日佳城忽馬前白雲空故國丹旐濕蠻烟旅櫬蛟螭䕶音容繪畫傳唐城東去路春草緑新阡幽居次夏伯黃歸來千里道寄寓百家村編竹通幽逕分葵藝小園農談隣好密琴操土音存即事成今古相逢免雜言送客野水危橋缺荒榛古路通殘陽明樹杪孤客去山中啼鳥嬌秋浦落花飄晚風離愁雜清思悵望但忽忽遊青原山次隆太古謝子方二首送客淹螺浦尋僧問鷲峰水流通雪竇谷響雜霜鐘靈跡雙荆樹香風五鬛松追隨成信宿感爾意重重躡雲來駐錫拓地此安禪曽讀傳燈録因參不二天松陰城四合雲影塔孤懸消歇同人世憑軒思惘然徐安節挽詩白髮歸來晚黃花又幾秋衣冠悲故國英俊憶同遊投轄苔生井蔵書月滿樓漢濱耆舊傳凖擬為君脩李霽峰挽詩夢覺義熙年歸耕海上田青雲子虛賦白首廣文氊故宅悲江令諸儒引服䖍幽光發潛徳妙語碧瑶鐫題張仲舉贈桑文饒詩後桑也有仙骨潛名醫藥中飢吟十日雨客夢幾秋風賴有酒堪飲初無文送窮好將青白眼留着送飛鴻賣藥韓康伯能詩張景陽世紛空落木句法挾秋霜杖履飛烟下聲名翰墨場往來成二老休負菊花黃青燈同雨夜貂帽共霜寒旅思寧無惡歸書但説安瓊林勞逺夢仙鶴養修翰聖代求才急終期拭目觀白石化羣羊仙家自有鄉草𤣥甘寂寂作賦問蒼蒼江路梅堪折山橋酒可嘗雙溪今夜月千里定相忘人生逐羣動何路脱塵氛鸚鵡新題賦麒麟舊獻文頽垣猶擁雪怪石自生雲鳴鳥將春信殷勤報客聞世態浮雲變心源水鏡空時時書咄咄往往視夢夢磊落千年上汪洋萬折東梅花知我意的皪露椒紅雜詩寂歴踈花晚盤紆小逕連寒村明白水野寺起青烟三北非余恥一癡終自憐歸期何日是山月幾回圓歲晚難為客地偏宜放慵城鴉驚戍皷隣婦閙村舂木落山排闥籬荒竹附庸不材甘懶散何去復何從曲曲高都路茫茫伊滸田雲低明去鴈野濶退飛鳶故國思千里君門隔九天窮途莫回首一望一悽然題孝義詩卷為惠非求報辭官只為親養松無觸鹿汲水有窮鱗潛徳誰如子聞名願卜隣他年班馬筆汗簡表斯人大孤山次鍾舉善韻聞説揚瀾好春舡更一灣江豚乗水上野鶴落雲間勝景疑三島靈祠俯萬山若逢王子晉笙鶴定相攀和王君冕暮春旅次詩韻我欲留春住啼鵑苦勸歸捲簾看雨過倚杖數花飛烏几書堆滿衡門客到稀夢中江路杳好在釣漁磯心逺亭物外青霞想山中白板扉有時捫蝨坐舉目送鴻飛自笑身將隠寧論世與違閒雲分半席誰道客來稀又題心逺亭詩和孫老人韻先君視之曰花陰不若易作花帷以對萍盖為工盖予初言花隂三面合故也鄉邦盗賊徧野傍城邱墟回想心逺何勝悵然步屐西郊曲幽懷得暫攄花帷三靣合萍盖一竿餘意悟前修近言忘世味疏不湏厭塵事塵事亦無如送河東教授聞説河東縣絃歌比屋聞路經榆次驛山隔太行雲玉署閒憐我新詩寫送君灤河烟草緑離思亂紛紛
