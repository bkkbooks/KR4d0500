body:
  text: 伊濵集卷一元王沂撰賦函谷關賦客有逺適於西土兮聊遊盤乎關東窺河流之奔放兮眄髙掌之遺蹤衍平臯之如席兮豁函谷之谾谾觀天險之固護兮據五達而隆崇乃喟然而嘆曰遐乎邈然姬德之衰也有真人焉致虛克極兮守靜曰篤遊物之初兮而立於獨綴明月以為佩兮製青霞而為服厭中區之溷濁兮朅逺遊以觀復乘素霓之修幡兮綷雲蓋而虹旗駟青虬之連卷兮先雲浮之陸離矞狂奔而警蹕兮走招搖與黔雷焱騰踊而沓颯兮曵光耀之葳蕤詔陵陽以疾驅兮吾將往乎南娭巨靈下襲而奔突兮揚紫氣之逶迤歷函關而弭節兮與尹喜乎相期著微言之元妙兮垂金薤之瑰竒曰無名天地之始兮有名萬物之母聽之而不聞兮視之而不覩唯恍唯惚兮以閲衆甫喜眩然而自失兮微夫子誰發吾之醯雞何天地之大全兮吾茫洋而不知乃谷神於元牝兮載營魄而髙馳相與過太乙之所居兮歷崑崙之嵗魁驅松喬與偓佺兮役羡門乎三危軼列缺之倒景兮餐沆瀣而充飢越八紘而朅度兮涉流沙而徘徊風樅樅而扶軑兮雲來迎而襂纚矍欃槍與旬始兮格澤歘其揚輝羾閶闔而謁帝兮帝亦欣然而來祇命西王母以上夀兮玉女鼓瑟而舞雲師乘虛亡以獨存兮超寥廓而忘歸悲人寰而下視兮擾羣蟻之紛移伊兹關之形勢兮為強暴之所恃若乃嬴秦虎視列國犬猘開關延敵鳥散麋沸又若羣雄雲擾漢祖龍驤項羽梟冽縱火擅強烽燧之勤井幹之固戰馬屯雲猛士如雨既已勢窮力竭變滅無餘河深華髙草生故墟聖朝以四海為家八荒為居普天所覆咸沾咸濡不烽不吏匪柝匪符示王者之無外廓四會之通途吾將觀紫氣之遙遙俟青牛之仙車傳清淨之言樹雍熙之輿陋文景之迫隘躡羲軒之元符溫泉賦客有遊於臨汝之山徘徊溫泉之上喟然嘆曰山之有泉猶人之氣也吹之則寒呵之則溫蓋其性之自然而無待於外也彼狃于靈砂暮石酷烈之氣惑于燭龍熒惑潛照之怪蓋昧乎物理之大而囿于耳目之隘然泉之為湯者在在有之而驪山汝水獨以名著詎以乘輿後宫之所臨幸歟吾是以嘉斯泉之遇也當其盛時綺疏璇題玉璫璧英魚龍飛動眩人目睛及其勢徂事變光沉響息翳之以荒煙古木罥之以澤葵藂刺薪翁漁子之所灌沐木魅山精之所嘯集於是騷人墨客凝思寂聽登髙逺望嘆息成詠以為亡國之遺迹吾又以哀斯泉之不幸吾嘗歌久視之遺詩想輿衛之雄麗煙霏靄兮千官風雨忽其萬騎三思之鬼蜮昌宗之狐媚涸斯泉之流而不足以湔其耻俄而白日西匿獰風振沙野羽嘯其叢薄寒鴟鳴兮枯槎灌莽杳而無際心慘惻其無涯吾亦按轡而去恐山川之神笑其言之誇也放山雞賦久栖遲於山澤厭羽族之珍竒嘉兹禽之自得固殊智於羣飛抱耿介之貞性表瑰麗之妍姿煥繡膺兮丹頸炫披霓之仙衣﨑幽間之容止逺人境之喧卑栖遐深以是適照滄浪而自怡匪華軒之是乘豈雕籠之能羈聊優遊兮飲啄與憂患兮長辭何巧夫之艱險設雲羅以見縻旅燕雀而為虜傷羽毛之低摧詎文采之賈禍將狷潔而殃罹敢微軀之自保念疇侣之暌違適野叟之見售動余心之長悲始縳布之甚急旋釋儀而縱歸詎羊公之責報抑簡子之是希無求友而遭賣無啄食而觸機偶六翮之未鎩聊逺舉而遐嬉嗟微類以喻大聊抒意而成詩勤耕堂賦冨州鄒福名堂曰勤耕莆田陳衆仲既銘而福請余不已乃為之賦曰浮西江以遐逝擇瘠土而歸耕躬劬勞而不二庶善心之由萌時輟耒以太息感先民之所程苟嚮義之或違諒余心之未寧好風東來兮膏雨宵零升陽潤土兮氷渙川盈嘉植阿那兮羽鳴嚶嚶川原髙卑兮錦機紅青夜飯牛以悲歌晨擁犂而戴星忘駢胝之作苦幸襏襫之蔽形綿綿秧針衣被清泠荀令置膝兮武子過庭雖娟秀之可愛卒未知其所成既幽栗乎旱魃又明懼乎螽螟謹嵗功之云始分百憂之怦怦獰飇霣葉兮蟋蟀宵鳴渺黃雲之彌望鎌挃挃而風生舍蓋避堂祖疏辭榮顧耒耜之在壁猶盤盂之有銘託陋質於昭世旅讓耕之遺氓穫同穎之嘉禾數盈虧之階蓂從君子之好修羌羽儀於上京躬勞瘁以踰紀亦含芬其吐馨詎桑梓之悠曠愧蒸嘗之弗營惟垂穎而顧本指南雲而效誠嵗冉冉其云暮渺悁悁之余情收疇昔之逸豫修初服以南征雪竹軒賦大梁王希孟榜軒雪竹師魯道人為賦曰江空嵗暮僵立萬木有偉青士強項不屈初秀挺以立玉倐錚鏦而響築虛室生白若逃空谷柙鎮帷以懸犀裘堆膝而裁鹿擁殘爐而敧帽甘龜手以肥粟清聲逺響倐斷還續起而視之羣仙鶴馭羽衣縞服雲情風纛空曠出沒豈居家之此君而籜龍之諸族也邪嗚呼噫嘻堅貞則有立潔白斯無欲虛心所以持身敷澤所以成物豈惟徜徉以卒嵗蓋將繼君子之遐躅嘯臺賦阮嗣宗酒酣登臺箕踞甚逸眼空四海神遊八極既騁望以慷慨乃長嘯而自適聲清厲而彌長音磞硠而絡繹或徘徊而縈雲或激躍而裂石或逺響之澎湃或餘哀之剽急雲變色而凝飛鳥悲鳴而舉翼清飇振而若厲流泉咽而如泣研羣聲之至清含自然之鍾律滌埃壒之溷煩聊超然而獨立忽仙去兮不返遺兹臺之岌岌嗚呼噫嘻斯人之不可得也士固有大言而欺世虛名而無實然味言而察其志循名而觀其識則真偽之分奚啻白黑也當其慟窮途歎廣武豈昏冥之是逃抑遺世而不顧俾其遘辰得位以奮厥志則將伏南陽之軌躅馳東山之極摯惜其懷瑾握瑜久幽而不試樂邱壑之栖遲銜杯酒以自肆貞而不諒遁以傲世過故臺而一弔動志士之歔欷望思臺賦出湖城而西騖兮眺泉鳩於中塗弔漢武之肆暴兮憫戾園之無辜忽孤墉之如塊兮曰歸來望思之遺墟吁趙虜之讒賊兮亂乃國猶摴蒱武雄略其焉在兮曾不寤夫覆車初犬臺之召見兮冠步搖而垂輸固將竄巧以逞志兮帝已湔拭其逃逋知銜毒以肆噬兮寧畏夫宗滅而身屠間茂陵之猜忌兮實惑神而信巫親文成而溺五利兮耗生民於怪迂挾蠱道以祝詛兮疑左右之是圖抑天道之好還兮聊假手乎憸夫彼長平與陽石兮加顯戮乎其孥探隱伏以或慊兮詐夜祠以沾濡瘞桐木於宫闈兮卒嫁禍於帝儲哀淺謀之狂傅兮爰昔鑒於扶蘇盜父兵以戮充兮冀忿忿之或攄獨寃結以誰語兮將何適而容軀懿三老與千秋兮銷惡運兮無餘焚橫橋其已晚兮徒興哀於既徂築新宫以永思兮魂煢煢其焉如緬先王之儲二兮唯端良之與居峙博望以延士兮雜衛翼以壬諛哀持身之不謹兮卒失勢以就誅帝復信訛而嗜殺兮不能慎夫厥初搆禍敗之弗救兮徵蚩尤以為符興余悲於千古兮聊盤桓以躊躇陟古馗之谽谺兮盼頽基之蓁蕪歌青蠅以一弔兮遂慷慨以成書不寐賦何杪秋之遙夜兮塊獨處兮心怦感嵗月之徂邁兮蹇邅回而無成悵反側而不寐兮紛所憂其相仍聊披襟以容與兮聿發憤而揚清淡蒼蒼之天宇兮流孤月之熒熒橫明河兮素練萬籟寂兮無聲練余心於元妙離塵垢之營營歌逺遊以激烈兮餐沆瀣之宵零存亭毒之正靈兮息擾擾之外慕履孔德之窕冥兮超遺俗而不顧吾以元氣為車兮以微風為御渺遨翔于太清兮孰云桎梏之未固夫何美人之遙遙兮乘翠雲而容與哀吾生之孔艱兮淹躊躇而弗能去及行迷之未逺兮還吾返乎故宇聞至言以斟酌兮幸年嵗之未暮稽同人之先號鑑北叟之後悟聊肆志以從容復何憂而何懼看雲賦為吳間間作太虛清明極靈無聲風雨霜露性命咸貞日餘惟星月遡虧盈昭回在上獨雲多形或魚鱗之錯錯或車蓋之軿軿泰山崇朝六合同氣目不容瞬倐若掣幟已霑溉乎穜稑復覆蔭乎弱稚馬駝轀輬是知朔方氛祲正祥占臺書常何質無而神有而隱顯巨細之叵量也元隱子于是延佇而睇之重歌曰我觀於天雲有物兮輪囷扶輿生眇忽兮變無化有亦其神兮離有入無反乎真兮九州百物象其精兮一氣之噓龍或憑兮蒸烰歘霱油然昭倬又將焉名兮胡桃木賦吾廬之陽峙嘉植兮受命於天物莫比兮修幹巍峩巨葉旎兮屹如承天中立不倚兮鴟梟不集矧毒螫兮逺彼邪惡斯明哲兮纍纍佳實薦之珍兮膏以自澤德潤身兮厥材之良剖犧尊兮不青不黃而自文兮林林天壤寓奚異兮或斷溝中萬乘器兮使然者誰抑偶置兮曷若斯木德之備兮明告君子以為類兮四言古詩短歌行南山采樵林木未凋北崖多薪鬱何岧嶤白雲在巔驚風日飄豺虎相逐猿猴可招長嘯倐往睨彼柯條匪材不經中則乃遙荆棘鈎衣瀑流喧囂還顧舊鄉心旌搖搖商山採芝巢由避堯絶唱千載清風寥寥五十負薪行歌車塵彼獨何心我思古人和溪釣者圖流泉幽幽釣絲浮浮風濤既逺雲木相繆方之舟之竹竿恆持鯨鯢弗顧鰋鯉何為今焉在溪伊昔望海彼美釣徒志尚千載洪岡之東其誰與同欸乃天際悠然清風五言古詩古詩一以送克哷景兖入梁其二以謝張子文應舉訪余伊上兼簡汴中諸名勝山童照伊白日瘦埋雲黃雍容車騎都長卿薄遊梁文采麗宫錦鄒枚斂其光我飄山林牢三見天雨霜公如左右手易親復難忘交深出苦語愜於冬飲湯夷門二三友問我行與藏長吟歸田賦亂以囚山章桴槎在江湖行止非所期誰云山澤間見此鸞鳳姿人生會面難肯憚鞍馬疲遙迎長伊湄枯榆媚寒曦親友話存沒學問訪闕遺醉語雜嘲謔曽不我瑕疵君憐我疏懶我愛君坦夷而能致斯人孰謂余數竒傾蓋即分襟歸馬三振鬐仰看孤雲飛搖搖心南馳山寒梅未破何以寄相思寒月侵山軒朔吹鳴竹牖夢中逢故人談笑共杯酒怪我趨塵埃短褐幾露肘相望曉天星相思令人瘦丈夫屬有念虛名等箕斗曽聞子公書出此釣竿手平生張平子矯矯文章叟懸知月旦評應憶忘年友感秋六首寂寂重寂寂窮巷秋氣集逺家誰晤言披書了今夕斯文家舊物蚤嵗事雕飾橘柚本不遷敢望為羽翼謬蒙時髦知風雅共推激一從縛卯申坐覺憂患積緬懷下帷年我自適其適茅屋濕風霜青燈破寥閴蠨蛸懸壞牖蟋蟀語空壁豈無故林思奈此世故力已矣勿復云清愁漲胸臆我愛黃翁材筆力追二班校尉亦已侯老將猶行間憶昔懷刺遊為翁數解顔譬彼絶壑松蔭此幽谷蘭祕方不我諱汲深良獨難相思千山表惆悵遙夜闌夢中不識路月明江水寒黃子富文章皎皎有仙骨當年牧羊處白石秋草沒相思欲面論夢想扁舟兀安得啓玄關玉佩聽清越分我金華雲烹茶對山月屋角月吐明蛩吟亦知候夢中逢故人談笑共杯酒勿云千山表默坐能邂逅秋雨老菰蒲澄江明橘柚想見登臨處驪珠滿衣袖秋草何青青秋花亦叢叢上有弄芳蝶下有悲吟蛩清霜日以厲搖落隨西風所寄終不移捐軀以相從惜哉時不與幽恨何其終吾愛荆隱君忍窮剛自怒生涯魚乞水文采豹藏霧憶昔垂兩髦朝夕親杖屨只今皮毛落真實尚如故秋風欺逺客索索語庭樹何以慰相思長吟不知曙由竹壩望錦川桃李春色如畫有懷陳邑令涉淺上輿梁慿髙眺鄉縣灼灼桃李花層層逺皆見兵餘草根盡此地芳菲遍氣暄雉雙雊景淑鶯百囀邑里齒故繁絃歌俗丕變懷賢思如渴敷政速於傳孰是潘安仁而猶宓子賤鼓吹入朝曲笳鼓覲皇州銀鞍鞴紫騮九衢白石靜雙闕彩雲浮介胄揖上將珮珂趨列侯清光邇廷陛喜色動宸旒􅊀陳塞下事起進幄中籌披甲復上馬望京將起樓赤丸躍劒室精彩拂星流萬嵗奉明主節旄歸海頭無倪舟太虛以為川元氣為我舟傲睨八極表恍如乘桴浮問津建德國弭棹逍遙邱回首太行路摧輪多悔尤夜汲如夢復如醉長夏困炎熱披衣聽琴築古井來新汲呼童下兩綆隨我有孤月雪乳泛瓶罌寒光洗肝鬲百年幾瓢飲所適初不擇寧須好事人記此王粲宅題李溉之别業紅雲島曲折藏一邱蔫錦千樹桃東風落紅雨點綴宫錦袍春漲緑未波晴光漾輕舠承明自厭直不是秦人逃九日同樂大成諸公小集甘雨不時降浮雲清旦隂賜衣候南極吹帽眺東林陽烏斂精彩征鴈流逺音為客戀故土還鄉乖宿心蕭條黃菊徑憔悴碧蘿岑賔御得晚合朋樽勞夕斟涼月照前席清風吹我襟美人隔千里遑恤故意深灼灼芙蓉花乃在幽澗潯夜分更相即秉燭調素琴雞武關亭亭雞武關盤棧石奮角俯窺井千尺仰視天一握長林細若髮峭壁立如削兒孫立羣峯蟻垤視嵓壑江流走其下怒響雷震薄猿猱相戰栗金碧氣參錯東陋鐡堂峽西卑劒門閣乃知天設險所以嚴擊柝遐方減氛祲行旅若郛郭我生亦何幸長嘯倚寥廓洪贊曉行兩山勢環合嵐重路不分須臾上東旭帚掃羣峯雲聯巒髻鬟擁斷坂綺繡文涼飈從西來禾黍揚清芬野老倚杖立草蟲鳴相聞悠然故園思欲返麋鹿羣君恩諒未報華髮徒紛紛傅夢臣淮漕使遺愛詩鹽貨重古今淮漕蓋其首出節付羣材詢謀欲經久豈惟國用足亦欲民生厚官居等傳舍其政固多苟課額嵗以增紛紛誰與守煎户日困窮吏職又習狃追徵急星火犴獄常紛糾懸鶉不掩脛破甑或無糗窮隂不得滷往往死鞭杻鄉閭人所懷今也棄而走倒懸而不救詎為民父母傅公由荷橐選使自朝右下車未云幾剔蠧什八九清風抑豪梗甘澤活枯朽將更積年弊上疏明析剖民瘼置不問誰當執其咎蠲蔭十萬額措法貽厥後吏民總歡躍如釋萬鈞負至今淮甸間歌頌不容口公今位中書大展經濟手賡歌南風絃坐見人財阜孰云惠一方海宇躋仁夀
