body:
  text: 伊濵集卷一元王沂撰賦函谷關賦客有逺適於西土兮聊游盤乎關東窺河流之奔放兮眄髙掌之遺蹤衍平臯之如席兮豁函谷之谾谾觀天險之固䕶兮據五達而隆崇廼喟然而嘆曰遐乎邈然姬徳之衰也有真人焉致虚克極兮守静曰篤遊物之初兮而立於獨綴明月以為佩兮製青霞而為服厭中區之溷濁兮朅逺遊以觀復乗素蜺之脩幡兮綷雲蓋而虹旗駟青虬之連卷兮先雲浮之陸離矞狂奔而警蹕兮走招摇與黔雷焱騰踊而㳫颯兮曵光耀之葳蕤詔陵陽以疾驅兮吾將往乎南娭巨靈下襲而奔突兮颺紫氣之逶迤歴函關而弭節兮與尹喜乎相期著微言之元妙兮垂金薤之瑰竒曰無名天地之始兮有名萬物之母聽之而不聞兮視之而不覩唯恍唯惚兮以閲衆甫喜眩然而自失兮㣲夫子誰發吾之醯雞何天地之大全兮吾茫洋而不知廼谷神於元牝兮載營魄而髙馳相與過太乙之所居兮歴崑崙之嵗魁驅松喬與偓佺兮役羡門乎三危軼列缺之倒景兮飡沆瀣而充飢越八紘而朅度兮渉流沙而徘徊風樅樅而扶軑兮雲来迎而襂纚矍欃槍與旬始兮格澤歘其揚輝羾閶闔而謁帝兮帝亦欣然而来祇命西王母以上夀兮玉女鼓瑟而舞雲師乗虛亡以獨存兮超寥廓而忘歸悲人寰而下視兮擾羣蟻之紛移伊兹關之形勢兮為強暴之所恃若乃嬴秦虎視列國犬猘開關延敵鳥散麋沸又若羣雄雲擾漢祖龍驤項羽梟冽縱火擅強烽燧之勤井幹之固戰馬屯雲猛士如雨既已勢窮力竭變滅無餘河深華髙草生故墟聖朝以四海為家八荒為居普天所覆咸沾咸濡不烽不吏匪柝匪符示王者之無外廓四㑹之通途吾將觀紫氣之遥遥俟青牛之仙車傳清浄之言樹雍熙之輿陋文景之迫隘躡羲軒之元符溫泉賦客有遊於臨汝之山徘徊溫泉之上喟然嘆曰山之有泉猶人之氣也吹之則寒呵之則溫蓋其性之自然而無待於外也彼狃于靈砂暮石酷烈之氣惑于燭龍熒惑潛照之怪葢昧乎物理之大而囿于耳目之隘然泉之為湯者在在有之而驪山汝水獨以名著詎以乘輿後宫之所臨幸歟吾是以嘉斯泉之遇也當其盛時綺疏璇題玉璫璧英魚龍飛動眩人目睛及其勢徂事變光沉響息翳之以荒煙古木罥之以澤葵藂刺薪翁漁子之所灌沐木魅山精之所嘯集於是騷人墨客凝思寂聽登髙逺望嘆息成詠以為亡國之遺迹吾又以哀斯泉之不幸吾嘗歌乆視之遺詩想輿衞之雄麗煙霏靄兮千官風雨忽其萬騎三思之鬼蜮昌宗之狐媚涸斯泉之流而不足以湔其耻俄而白日西匿獰風振沙野羽嘯其叢薄寒鴟鳴兮枯槎灌莽杳而無際心慘惻其無涯吾亦按轡而去恐山川之神笑其言之誇也放山雞賦乆栖遲於山澤厭羽族之珍竒嘉兹禽之自得固殊智於羣飛抱耿介之貞性表瑰麗之妍姿煥繡膺兮丹頸炫披霓之仙衣﨑幽閒之容止逺人境之喧卑栖遐深以是適照滄浪而自怡匪華軒之是乗豈雕籠之能羈聊優游兮飲啄與憂患兮長辭何巧夫之艱險設雲羅以見縻旅燕雀而為擄傷羽毛之低摧詎文采之賈禍將狷潔而殃罹敢微軀之自保念疇侣之暌違適野叟之見售動余心之長悲始縳布之甚急旋釋儀而縱歸詎羊公之責報抑簡子之是希無求友而遭賣無啄食而觸機偶六翮之未鎩聊逺舉而遐嬉嗟微𩔖以喻大聊抒意而成詩勤耕堂賦冨州鄒福名堂曰勤耕莆田陳衆仲既銘而福請余不已乃為之賦曰浮西江以遐逝擇瘠土而歸耕躬劬勞而不貳庶善心之由萌時輟耒以太息感先民之所程苟嚮義之或違諒余心之未寜好風東来兮膏雨宵零升陽潤土兮氷渙川盈嘉植阿那兮羽鳴嚶嚶川原髙卑兮錦機紅青夜飯牛以悲歌晨擁犂而戴星忘駢胝之作苦幸襏襫之蔽形綿綿秧針衣被清泠荀令置膝兮武子過庭雖娟秀之可愛卒未知其所成既幽慄乎旱魃又明懼乎螽螟謹嵗功之云始分百憂之怦怦獰飇霣葉兮蟋蟀宵鳴𣺌黄雲之彌望鎌挃挃而風生舍蓋避堂祖疎辭榮顧耒耜之在壁猶盤盂之有銘託陋質於昭世旅譲耕之遺氓穫同穎之嘉禾數盈虧之階蓂從君子之好脩羌羽儀於上京躬勞瘁以踰紀亦含芬其吐馨詎桑梓之悠曠愧蒸嘗之弗營惟垂穎而顧本指南雲而效誠嵗冉冉其云暮渺悁悁之余情収疇昔之逸豫修初服以南征雪竹軒賦大梁王希孟榜軒雪竹師魯道人為賦曰江空嵗暮僵立萬木有偉青士強項不屈初秀挺以立玉倐錚鏦而響筑虚室生白若逃空谷柙鎮帷以懸犀裘堆膝而裁鹿擁殘爐而敧㡌甘龜手以肥粟清聲逺響倐斷還續起而視之羣仙鶴馭羽衣縞服雲情風纛空曠出沒豈居家之此君而籜龍之諸族也邪嗚呼噫嘻堅貞則有立潔白斯無欲虚心所以持身敷澤所以成物豈惟徜徉以卒嵗葢將繼君子之遐躅嘯臺賦阮嗣宗酒酣登臺箕踞甚逸眼空四海神遊八極既騁望以慷慨乃長嘯而自適聲清厲而彌長音磞硠而絡繹或徘徊而縈雲或激躍而裂石或逺響之澎湃或餘哀之剽急雲變色而凝飛鳥悲鳴而舉翼清飇振而若厲流泉咽而如泣研羣聲之至清含自然之鍾律滌埃壒之溷煩聊超然而獨立忽仙去兮不返遺兹臺之岌岌嗚呼噫嘻斯人之不可得也士固有大言而欺世虚名而無實然味言而察其志循名而觀其識則真偽之分奚啻白黒也當其慟窮途歎廣武豈昏冥之是逃抑遺世而不顧俾其遘辰得位以奮厥志則將伏南陽之軌躅馳東山之極摯惜其懐瑾握瑜乆幽而不試樂邱壑之栖遲銜杯酒以自肆貞而不諒遯以傲世過故臺而一弔動志士之歔欷望思臺賦出湖城而西騖兮眺泉鳩於中塗弔漢武之肆暴兮憫戾園之無辜忽孤墉之如塊兮曰歸来望思之遺墟吁趙虜之讒賊兮亂廼國猶摴蒱武雄畧其焉在兮曾不寤夫覆車初犬臺之召見兮冠歩摇而垂輸固將竄巧以逞志兮帝已湔拭其逃逋知銜毒以肆噬兮寜畏夫宗滅而身屠間茂陵之猜忌兮實惑神而信巫親文成而溺五利兮耗生民於怪迂挾蠱道以祝詛兮疑左右之是圖抑天道之好還兮聊假手乎憸夫彼長平與陽石兮加顯戮乎其孥探隱伏以或慊兮詐夜祠以沾濡瘞桐木於宫闈兮卒嫁禍於帝儲哀淺謀之狂傅兮爰昔鑒於扶蘇盗父兵以戮充兮冀忿忿之或攄獨寃結以誰語兮將何適而容軀懿三老與千秋兮銷惡運兮無餘焚横橋其已晚兮徒興哀於既徂築新宫以永思兮魂煢煢其焉如緬先王之儲貳兮唯端良之與居峙博望以延士兮雜衛翼以壬諛哀持身之不謹兮卒失勢以就誅帝復信譌而嗜殺兮不能慎夫厥初搆禍敗之弗救兮徵蚩尤以為符興余悲於千古兮聊盤桓以躊躇陟古馗之谽谺兮盼頽基之蓁蕪歌青蠅以一弔兮遂慷慨以成書不寐賦何杪秋之遥夜兮塊獨處兮心怦感嵗月之徂邁兮蹇邅廻而無成悵反側而不寐兮紛所憂其相仍聊披襟以容與兮聿發憤而揚清澹蒼蒼之天宇兮流孤月之熒熒横明河兮素練萬籟寂兮無聲練余心於元妙離塵垢之營營歌逺遊以激烈兮飡沆瀣之宵零存亭毒之正靈兮息擾擾之外慕履孔徳之窕冥兮超遺俗而不顧吾以元氣為車兮以㣲風為御𣺌遨翔于太清兮孰云桎梏之未固夫何美人之遥遥兮乗翠雲而容與哀吾生之孔艱兮淹躊躇而弗能去及行迷之未逺兮還吾返乎故宇聞至言以斟酌兮幸年嵗之未暮稽同人之先號鑑北叟之後悟聊肆志以從容復何憂而何懼看雲賦為吳閒間作太虚清明極靈無聲風雨霜露性命咸貞日餘惟星月遡虧盈昭回在上獨雲多形或魚鱗之錯錯或車葢之軿輧泰山崇朝六合同氣目不容瞬倐若掣幟已霑溉乎穜稑復覆䕃乎弱穉馬駞轀輬是知朔方氛祲正祥占臺書常何質無而神有而隱顯鉅細之叵量也元隱子于是延佇而睇之重歌曰我觀於天雲有物兮輪囷扶輿生𦕈忽兮變無化有亦其神兮離有入無反乎真兮九州百物象其精兮一氣之嘘龍或憑兮蒸烰歘霱油然昭倬又將焉名兮胡桃木賦吾廬之陽峙嘉植兮受命於天物莫比兮修榦巍峩鉅葉旎兮屹如承天中立不倚兮鴟梟不集矧毒螫兮逺彼邪惡斯明哲兮纍纍佳實薦之珍兮膏以自澤徳潤身兮厥材之良剖犧尊兮不青不黄而自文兮林林天壤寓奚異兮或斷溝中萬乗器兮使然者誰抑偶置兮曷若斯木徳之備兮明告君子以為類兮四言古詩短歌行南山采樵林木未凋北厓多薪欝何岧嶤白雲在巔驚風日飄豺虎相逐猿猴可招長嘯倐往睨彼柯條匪材不經中則乃遥荆棘鈎衣瀑流喧囂還顧舊鄉心旌摇摇商山採芝巢由避堯絶唱千載清風寥寥五十負薪行歌車塵彼獨何心我思古人和溪釣者圖流泉幽幽釣絲浮浮風濤既逺雲木相繆方之舟之竹竿恒持鯨鯢弗顧鰋鯉何為今焉在溪伊昔望海彼美釣徒志尚千載洪岡之東其誰與同欸乃天際悠然清風五言古詩古詩一以送克哷景兖入梁其二以謝張子文應舉訪余伊上兼簡汴中諸名勝山童照伊白日瘦埋雲黄雍容車騎都長卿薄遊梁文采麗宫錦鄒枚歛其光我飄山林牢三見天雨霜公如左右手易親復難忘交深出苦語愜於冬飲湯夷門二三友問我行與藏長吟歸田賦亂以囚山章桴槎在江湖行止非所期誰云山澤間見此鸞鳳姿人生㑹面難肯憚鞍馬疲遥迎長伊湄枯榆媚寒曦親友話存沒學問訪闕遺醉語雜嘲謔曽不我瑕疵君憐我疎懶我愛君坦夷而能致斯人孰謂余數竒傾葢即分襟歸馬三振鬐仰看孤雲飛摇摇心南馳山寒梅未破何以寄相思寒月侵山軒朔吹鳴竹牖夢中逢故人談笑共杯酒怪我趨塵埃短褐㡬露肘相望曉天星相思令人瘦丈夫屬有念虛名等箕斗曽聞子公書出此釣竿手平生張平子矯矯文章叟懸知月旦評應憶忘年友感秋六首寂寂重寂寂窮巷秋氣集逺家誰晤言披書了今夕斯文家舊物蚤嵗事雕飾橘柚本不遷敢望為羽翼謬䝉時髦知風雅共推激一從縛卯申坐覺憂患積緬懷下帷年我自適其適茅屋濕風霜青燈破寥閴蠨蛸懸壞牖蟋蟀語空壁豈無故林思奈此世故力已矣勿復云清愁漲胸臆我愛黄翁材筆力追二班校尉亦已侯老將猶行間憶昔懐刺遊為翁數解顔譬彼絶壑松䕃此幽谷蘭祕方不我諱汲深良獨難相思千山表惆悵遥夜䦨夢中不識路月明江水寒黄子富文章皎皎有仙骨當年牧羊處白石秋草沒相思欲面論夢想扁舟兀安得啟𤣥關玉佩聽清越分我金華雲烹茶對山月屋角月吐明蛩吟亦知候夢中逢故人談笑共杯酒勿云千山表黙坐能邂逅秋雨老菰蒲澄江明橘柚想見登臨處驪珠滿衣袖秋草何青青秋花亦叢叢上有弄芳蝶下有悲吟蛩清霜日以厲摇落隨西風所寄終不移捐軀以相從惜哉時不與幽恨何其終吾愛荆隱君忍窮剛自怒生涯魚乞水文采豹藏霧憶昔垂兩髦朝夕親杖屨只今皮毛落真實尚如故秋風欺逺客索索語庭樹何以慰相思長吟不知曙由竹壩望錦川桃李春色如畫有懐陳邑令渉淺上輿梁慿髙眺鄉縣灼灼桃李花層層逺皆見兵餘草根盡此地芳菲徧氣暄雉雙雊景淑鶯百囀邑里齒故繁絃歌俗丕變懐賢思如渇敷政速於傳孰是潘安仁而猶宓子賤皷吹入朝曲笳皷覲皇州銀鞍鞴紫騮九衢白石静雙闕彩雲浮介胄揖上將珮珂趨列侯清光邇廷陛喜色動宸旒􅊀陳塞下事起進幄中籌披甲復上馬望京將起樓赤丸躍劒室精彩拂星流萬嵗奉明主節旄歸海頭無倪舟太虚以為川元氣為我舟傲睨八極表恍如乗桴浮問津建徳國弭棹逍遥邱回首太行路摧輪多悔尤夜汲如夢復如醉長夏困炎熱披衣聽琴筑古井来新汲呼童下兩綆隨我有孤月雪乳泛瓶罌寒光洗肝鬲百年㡬瓢飲所適初不擇寜須好事人記此王粲宅題李溉之别業紅雲島曲折藏一邱蔫錦千樹桃東風落紅雨㸃綴宫錦袍春漲緑未波晴光漾輕舠承明自厭直不是秦人逃九日同樂大成諸公小集甘雨不時降浮雲清旦隂賜衣候南極吹㡌眺東林陽烏歛精彩征鴈流逺音為客戀故土還鄉乖宿心蕭條黄菊徑憔悴碧蘿岑賔御得晚合朋樽勞夕斟凉月照前席清風吹我衿美人隔千里遑恤故意深灼灼芙蓉花乃在幽澗潯夜分更相即秉燭調素琴雞武關亭亭雞武關盤棧石奮角俯窺井千尺仰視天一握長林細若髪峭壁立如削兒孫立羣峯蟻垤視嵓壑江流走其下怒響雷震薄猨猱相戰慄金碧氣參錯東陋鐡堂峽西卑劒門閣乃知天設險所以嚴擊柝遐方減氛祲行旅若郛郭我生亦何幸長嘯倚寥廓洪贊曉行兩山勢環合嵐重路不分須臾上東旭帚掃羣峯雲聯巒髻鬟擁斷坂綺繡文凉飈從西来禾黍揚清芬野老倚杖立草蟲鳴相聞悠然故園思欲返麋鹿羣君恩諒未報華髪徒紛紛傅夢臣淮漕使遺愛詩塩貨重古今淮漕蓋其首出節付羣材詢謀欲經乆豈惟國用足亦欲民生厚官居等傳舎其政固多苟課額嵗以増紛紛誰與守煎户日困窮吏職又習狃追徵急星火犴獄常紛糾懸鶉不掩脛破甑或無糗窮隂不得滷往往死鞭杻鄉閭人所懐今也棄而走倒懸而不救詎為民父母傅公由荷橐選使自朝右下車未云㡬剔蠧什八九清風抑豪梗甘澤活枯朽將更積年弊上疏明析剖民瘼置不問誰當執其咎蠲䕃十萬額措法貽厥後吏民總懽躍如釋萬鈞負至今淮甸間歌頌不容口公今位中書大展經濟手賡歌南風絃坐見人財阜孰云恵一方海宇躋仁夀
