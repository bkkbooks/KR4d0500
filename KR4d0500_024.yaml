body:
  text: 伊濵集卷二十四元王沂撰行狀張君仲實行述故兩浙都轉運鹽使司知事張君仲實曾祖宗尹宋贈朝議大夫祖宋武德大夫閣門宣贊舍人父泉忠翊節先生諱楧字仲實其先秦州三陽川人五世祖循忠烈王佐宋髙宗南遷因家錢塘先生幼而警敏絶人能刻意學問言動蹈繩墨雖在綺紈不流不侈甫冠學藝大成是時宋社既墟而文物典刑猶存巨人耆艾士若兵部尚書陳公存參政中書文公及翁禮部侍郎鄧公光薦太學博士劉公辰翁皆降詘年德相與交好譽望四出蓋自景定咸淳間士淫於舉業以磔經破道之學槖籥而風聲之先生獨斬斬於流俗鋭意矯復古學一切掃除芬葩組繡而空之於時翰林承旨趙公孟俯以文墨論議特起東南先生稍後出名嶷然角立文辭肆博其學富而醇於經闡明奧旨抵異剗偽與濓洛紫陽表裏而涵浸渟蓄洞見根極大侈厥文閎肆雅奧茹道德之旨逹世務之要於詩尤自喜溫麗間淡氣質渾渾辭非一律橫從窈眇而自合於繩削又何其工也為人亷靖自將尤篤於嗜善其遊皆當世秀人偉士與剡源戴表元帥初漁陽鮮於樞伯幾吳興陳康祖無逸錢塘戴祖禹今祭酒巴西鄧公文原善之尤厚其事親以孝聞始終翊節蓄學弗售而先生不事産業基址日益以貧而竭力致養宜寒燠具豐柔滫瀡弗忍一日去左右其隙則教授學者户屨鱗鱗然其聞言氷釋觀德心服勸飭礲溉以成厥器甚衆初用舉者起家為杭儒學録非其好也翰林學士徐公琰亷察浙右素聞先生賢甫至致禮與相見器之即薦宜充本朝文學選翰林承旨閻公復亦竒其文雅咏言以賞識二公望崇一世不妄與人數從騎吏入下里舍論談薄晏學士大夫咸多二公之知人而知先生之微求諸人也頃之江淮尚書省選正江隂儒學尋遷宜興州學教授轉教平江府儒學先職是者轉噤吟尸厥官先生所至端矩彠嚴指誨峩冠逢掖翕然知所樹立庾粟庫錢整棼剔蠧修明紀綱士得以勸敝得以興而學校風俗為之一變矣大抵先生之學以明斯道澤元元為已任恆謂我之所以自著者在行事不必見諸空言雖宦而不遂仁而不年其所設施不足以發厥藴然其志可知也轉徙郡文學更二十餘年人皆為之欿然而先生怡然不介意每去官歸輒與學者講貫如平昔若終其身以誨人為樂者平生故人超侍從之列備文儒道德之任或聞先生一入帝城要途可跬步至也謝曰親老矣得一席之位以行志三釡之祿以為養斯可矣庸何望其賢以兹益信先是有以工書薦者拒之曰與其以書進吾寧窮以終也江浙行省丞相府辟掾禮曹今平章髙公時參知政事素善先生亦風俾即署時首相目指氣使可鑠金石先生固辭卒弗能奪也其正行直道乃如是久之調將仕郎主廣德縣簿丁母憂服除擢兩浙都轉運鹽使司知事談者謂先生宜在朝廷備訪問計簿非厥事而先生處之斡旋綜理若決流抑隊可為後法考績而代不蔇浙西道亷訪使者曹啓薦曰張楧學完行尊鄧善之劉損齋儔也方朝廷崇儒術尚亷素之時宜特遷江浙儒學提舉以奬恬退不報先生亦以老不復言仕矣以泰定二年二月二十四日終於家年六十六葬於是年三月墓在大慈鄉龍姥池北初宋大理少卿牟公巘號大儒讀先生之詩唶曰非今之所謂詩也桐江方萬里於文學少許可以昌黎有李漢紫陽有黃幹擬先生學士大夫以為俞而先生不以標望髙人好奬後進一有所長輒誘厲奬藉之以故所成就纍纍知名嘗手江浙文柄其權衡鄉貢士得人居多嗚呼可謂醇明篤願之君子矣生平微所嗜好顧喜藝菊嘗謂所知曰菊貞素孤潔吾庶近之因自號菊存先生未嘗著書其所論述皆因事而襮既殁子集其文章詩為學古齋藁若干卷拾遺若干卷其披尋紬繹緝綴今古羣書類聚法制度數造物立器解名釋象曰格物編又如干卷讀者可以知其志之所存也嗚呼先生而位止於斯而年止於斯然能自立於不朽視夫得悖乎道處非其任其彰醜於後者孰為窮孰為逹亦可以無憾矣母朱氏娶劉氏句容縣簿沆之女繼室牟氏子五人炬熽爥燠燭燠前死矣五女子其已嫁者三人梁郭瓉杭吳某壻也其一人未嫁而前死一尚幼也孫七人既葬之三月其遊襄隂王沂序次其言行大略而歸之先生季子噫沂言亦奚益於先生也然先生之殁大夫士識與不識皆聞而哀之則其遺論在人多矣詎無能言君子為之著述俾信於天下後世哉張君信甫行述張君諱誠字信甫其先河中人考諱鈞金季徙家華州已而歸其孥河中子四人君其幼也君為人內自飭勵無外飾大抵於仁厚最隆也其事父母飬能致其樂喪能致其哀其治家規畫纎悉備具以故於研窮博洽之功未暇也然明敏異甚書一讀輒能通大旨兄三人長甫冠而卒次恕次仁友愛甚篤相謂曰吾等幸鍾世德丁日繁衍微規約何以為觀乃象唐張公藝於堂又樹屋以祠其先春秋視牲省器皆不以屬子若孫俯仰齋栗如見其享之者已祭列子婦堂下申栁仲塗之訓咸栗然警懼已而歡然相接其兄既早世君撫其長幼千五百餘指咸得其宜捐重幣延師以教諸子姪入其門尊安其卑卑慕其尊一時皆稱之其視族人愛以均於衣服飲食自奉尤約至人有急歸我則推財赴之無錙銖顧惜意鄰里嵗飢輒發粟以救嘗學醫疾者歸之無親疏逺邇皆為之盡其術貧者或資之藥物衣食嵗具豆糜食飢者恆百餘人天歷初陜西牧弄兵既渡河居民劒炊朝不謀夕閭里惡子席亂劫掠有掊君金帛之積者兵既定事露或勸君白有司君謝曰聚散物理之常彼先世嘗相好矣吾忍之奚以見諸地下耶卒不暴章人以此多之其與人少合所與合不阿其意守令以休沐造其席問起居或詢以政治得失終不能以勢利及也遺戒諸子曰吾昆弟同㸑無間言若等克紹吾志即死靡憾君享年七十四娶孫氏子三人長克謹次克慎早世次克寬承襲教世其家為國子伴讀孫二人曰某曰某克寬將以某年某月葬君於條麓之先塋泣且拜請於王沂曰先子有馴行德不克顯於世兹將乞銘於浙省參政祭酒富珠哩公先生其哀而述之余曰吾雖不與而父接觀若云則知爾父之可銘也謹序次如右故贈中奉大夫江浙等處行中書省參知政事護軍魏郡公胡公行狀維胡公系出於虞有為周陶正封陳者是為胡公其後曰建曰廣以勳名著漢歷魏晉宋齊梁曰質曰昭曰謙之曰奮曰威曰諧之曰僧佑曰頴史繼有書迄公先初為大梁之鄢陵人在宋金繼為顯官天兵墟汴公考提其家渡河故今占籍相州為相之安陽人天興火剽之餘雖鄢陵葬有塋塋有碑其文剝缺不可識而牒莫得而詳然奕世載德畜而不發至公之子侍御史以儒學政事顯名朝廷而胡氏遂顯矣公諱景先字彥明以子貴封奉訓大夫知頴再封朝請大夫同簽太常禮儀院事騎都尉安定郡伯進封翰林直學士亞中大夫輕車都尉安定郡侯贈中奉大夫江浙等處行中書省參知政事護軍魏郡公考諱用璋以孫貴纍封嘉議大夫禮部尚書上輕車都尉魏郡侯母祝氏贈魏郡夫人妻王氏贈魏郡夫人享年八十以致和元年二月六日無病而逝以其年五月十日甲子葬安陽縣孝明村之原祔以夫人王氏子二人曰彛正議大夫御史臺侍御史曰規中書兵部掾女三人長適鄭某次適王某次適李某皆士族孫二人曰伯敬侍儀舍人曰伯夀尚幼也孫女二人長適大司農侯公孫某次適樊某初公考禮部敏逹有志操種藝自給以德行化鄉里鄰有棗樹垂舍傍棗熟墜地命左右拾以歸其主其厲志如此與人遊不矯矯為異亦不翕翕為同以故人莫能親疏久而後知其篤也居嘗愛眉山蘇氏治生不求富讀書不求官譬如飲不醉陶然有餘歡語遂自號曰陶然翁隱居而終祝夫人智識過人逺甚畜馬有夜盲者僮擅靣謾市人取直歸以自媚夫人遽云還其直且謝曰童不以質而輒汝紿吾不忍也公承德襲教力學不倦嘗慨然嘆曰辭親干祿孰若竭力以供子職屈已從人孰若隱居以遂吾志故終身未嘗言仕其事父母飬能致其樂喪能盡其哀事兄有過人之行推已屬人無不致其厚兄殁待寡嫂嶽氏亦盡禮教畜其孤厚如巳子同里人有貸錢為本業子本相埓至數十萬貧莫能與息主責勢孔棘聲自縊公聞捐家資俾償之里人泣謝持劵納公所公謝火其劵嵗飢出倉實以賑其鄰里鄉黨既匱又賣田繼之至熟衆將償公辭不受里有喪其子弱家無所有為具衣被棺木飯含以斂藏之經理其子尤盡恩意既長俾有家願傭以報德公不許盜有竊其牛羊者已而又竊所乘馬公知賊處一不問人嘗具饌公食肉而甘問諸庖人庖對法以兩釡合以泥封褁中置肉火其頂趾公曰釡得無損乎味於適而器於弊吾不忍其仁厚天性然也其平居則恭謹恂恂遇人不為畦疃或欺而侮之亦不變以故鄉人皆樂其和而畏其莊其長老教子弟必以公為法曰為人如胡公足矣其孤寡飢饉之人相謂曰自胡公亡使吾無所告依其見於言行者如此王夫人鄢陵望族性行孝謹處內外親疏之際盡其宜事夫能成其孝教子能成其才子官於朝豐顯矣鄉里以為榮而卒亦不見其喜子罷官歸或貧匱以不足於飬為憂輒喜曰此吾所以教子也吾敢不安於命哉吾無待於外也其子居禮部喪甫除服匝月起而陜西行御史臺治書侍御史時夫人春秋髙以就飬辭夫人止之曰西臺臨分省四朝廷視為重地且秦中嵗凶人相食賢者急病而讓夷而忘父之訓耶無庸我憂也此夫人之德見諸外者如此侍御由丞相府掾起家工部主事職十有二遷為侍御史官十轉為正奉大夫初河南嵗大䘲使請發倉以賑救者足相躡於道行省拒弗許侍御史時為河南省左司員外郎乃代判省牘擅發米二萬石所活五十餘萬人其僉河西隴北道憲也隴北道近邊吏往往闊略文法乾沒無所忌侍御按姦發伏振擲利害窮治賕十有一人繩以法濫繫者釋八人豪大吏屏息纍足目公曰是不可犯也部內肅然為中書右司都事西域僧卦釋囚以袚除者內侍奉旨引富民子坐法當死者將縱繫侍御白宰相復置之獄其為御史為員外郎左司也練習朝廷典章故實亦臨事明敏果斷引大體闊細故色和而語莊矯矯無所屈皇上入正大統聖朝故典錫賚親王宗臣庶官衛士金幣帛以萬萬計期月間舉故典者再用事者憂之請括金民間以充用侍御時為户部尚書稽內府之隱得郡縣上供之實與夫內帑藏積之羡不足則令鹽商入銀以凖幣朝度有法若家計然論者多之其為治書也時皇上委任大臣垂拱仰成而侍御振舉紀綱以闡明法度至於以道德勸講傳經啓迪人望物論咸曰是堪重任者是皆履正蹈義所至然樹藝德善在公有不得而辭焉者公之夀考康寧食其祿飬而侍御入則侍帷幄贊國論退而承顔侍膳雍容膝下可謂盛矣天之施與善人豈非信哉公既殁如干年皇上嘉公之能教厥子為才臣命明著公之休德遺澤章示萬世以假寵胡氏之子孫於無窮以勸天下之為人父者侍御將乞銘於御史中丞浚都馬公以狀來請沂謹序次其實可傳於後世者如右謹狀哀辭天台趙公哀辭天台趙公嶽甫遊余父子間二十年與先君交為莫逆於沂則師友也公既殁之二年先君捐館沂抱痛終天繇洛南奔喪先友雕喪殆盡公亦邈不可得矣念無以致其哀者乃為辭以哭之公諱許嶽甫其字也上世為蜀人今為天台人起家以台州文學掾至年七十還政官八轉為朝列大夫職七遷為明州路治中年七十二終於家公學博而醇文宏贍而不浮與人交盡其義不隨時勢冷熱為向背行已居官一於忠厚不馳騁衒鬻以投世干顯故知之者少而公不易其意也其為溫推官時樂清縣民陳漁于海它舟貰其釣陳舞稱以紿之怒且鬬攫其及囊衣委舟順流去陳賂遺巡􅗲誣以剽劫之罪捕得掠俾自誣二人以瘐死獄具公審鞫知其寃即解縱其從九人治巡􅗲罪狀辭服民歡呼聲動海上以為神明公為政大概類此故所至有遺愛辭曰倬彼赤城仙聖所宫中流日溪屈蟠蛟龍厥材孔良楩楠豫章虎豹翬翟有炳其章淑靈和清扶輿委鬱萬物不得異人間出篶生我公有蓄弸弸既焯其襮亦宏厥聲寧國之治蘇僵博瘠初以詆去民實戴德于甌于閩有偉其迹驅其蝥賊以殖黍稷彼疾其驅公車徐徐世懦而恃公恬其居順退以年媚於林泉身焉逍遙秀眉蒼顛嘯歌偃側世無不得子孫順慈化其餘澤既夀而康亦熾而昌君子之祥邦家之光彼天如何不俾百年馬鬛峩峩日溪之阡日溪茫茫公豈其藏乘雲跨箕至於帝旁嗚呼天乎既喪吾父又奪夫子撫膺痛哭念我何恃穹穹厚厚有時而毁余心之哀其何能已祭文祭魯子翬參政文嗚呼天於斯文忍斫喪之胡為哲人相繼而萎多士何以為繩衡天下何以為蓍龜此學士大夫所失聲而驚呼涕泣而歔欷嗚呼惟公氣虹霓而􅋵冰雪學河海而文星斗取之既博而成之粹飬之以深而稟之厚故其器不止於一能學不期於偏就進位於朝則鳴鳯之儀講道於家則洪鐘之扣既徹牖以並納亦隨材而獨誘如雷雨之先物咸頴發而苕秀流蘋藻以芼頡潔黍稷而饙餾文章之選禮樂之司師氏之位侍從之躋既耀其華厥聲亦馳或阻為崖或巧為機公坦其𠂻不見瑕疵有穹其勢有赫其威非義所在公不詭隨至於弛張有時進退有義何堂堂而山立忽星隕而颷逝嗚呼維公而遽死邪吾道之衰乃至此耶凡我同朝矧曰同志契濶山川阻親含襚終天永訣寓此薄醊
