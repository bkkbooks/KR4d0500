body:
  text: 伊濵集卷十一元王沂撰七言絶句詩芍藥茶瀛洲憶昔較羣材一飲雲腴睡眼開陸羽似聞茶具在謫仙空載酒船回灤水瓊芽取次春仙翁落杵玉為塵一杯解得相如渴㸃筆淩雲賦大人揚州四月春如海綵筆曽題第一花夜直承明清似水銅瓶催火試新芽余往年試上京鄉貢士於集賢署邢君遵道惠茶號灤水瓊芽今俯仰七年而遵道捐館久矣其子克世其業攜荼過寓舍為賦小詩三首山陽聞笛之感同一慨然也木芙蓉白露江清水殿凉館娃宫裏宴吳王美人醉起更衣晚密帳溫帷翡翠粧小孤山書所見春風江上碧如苔上有祈靈水殿開江北女郎南仕客夾紗團扇栁隂來河東道中綿河流水暖生煙罨畫春山半映天霸業銷沉誰與問行人猶指介推田官渠楊栁未勝鴉山路春寒不見花日暮介休城下過帽簷斜側避風沙和杜德常早春二首鳳城晴日媚游絲城外人家雪半扉莫倚小桃春事早便教蝴蝶奈寒飛市橋官栁占春濃氷破龍鱗碧映空聞道漢家三十六一時迎燕轉溫風春興古壕晴緑不勝舟落絮殘紅蕩漾愁山鳥喚回春色去又催斜日下城頭雪巖蕭寺雪巖曽訪坐禪僧衲被䝉頭喚不譍說與擔囊行腳者石頭橋滑要人登題尚縣尹詩卷心在春暉寸草中挂冠端有古人風安仁謾說閒居賦不似陳情表最工送湖州張教授三首詩人合住水精宫採得蘋花思未窮紫笋甌中消白晝碧瀾堂上試春風洞庭霜降橘先黃酒釀烏程水自香正是江南好風景夢隨君去過錢塘採菱歌斷緑楊風蕩槳吳娃莫惱翁驚起鴛鴦一雙去苕溪西畔霅溪東讀長安志書事十二首芳草離離卧石麟野棠花發不成春耕夫拾得盤龍鏡曽照昭陽第一人繡嶺宫前路已迷暖泉輕噴玉參差夕陽牛背誰橫笛疑把開元舊曲吹魚龍浮動玉蓮湯殿閣參差璧月涼羯鼓聲髙催衆樂梨園新按荔枝香內官扶下畫雲軿仙掌金盤露已凝好去通天臺畔望驪山髙處始皇陵待詔公車歲月深詼諧無那老侵尋誰教但索長安米不羡長門買賦金鴻都門外馬頻嘶薄暮塵飛咫尺迷寶劔微紅漬餘血鳴鞭夜出灞陵西翠微煙泠草迢迢百二重關王氣消却是梨花寒食夜月明秦女自吹簫玉碗何年出茂陵西飛青鳥竟無慿石欄照見苔花碧山鬼時來弄漆燈茂陵玉碗出人間青鳥西飛竟未還山鬼時吹漆燈滅石欄花老碧苔斑弄影驕驄逐鈿車胭脂坡下栁藏鴉忽聞長樂鐘聲動忘却金鞭碧玉家漢家賜第灞陵東衛霍邊廷第一功莫種朱門楊栁樹年年容易換春風五陵佳氣晚濛濛擁蓋鳴珂處處同盡道鬻珠尋董偃誰能載酒過揚雄和馬伯庸見寄詩韻四首淮南叢桂婆娑緑借問騷人若箇來歌罷小山招隱賦風吹書冊滿床開故人南望隔長淮不及寒潮日往來聞道賜金供置酒八公山對玉樽開清福堂前步緑苔捲簾何處燕飛來山中藂桂留人住嶺上梅花莫謾開今朝把酒忽惆悵驚見淮東驛使來為報相思似春色南枝開盡北枝開綿江綿水溶溶淡夕暉杜䳌聲裏送春歸落花無數依芳草零落文君舊錦機過華清宫三首昔年繡嶺宫前路曽嘆開元鶴髮人今日我來人不見野棠花似昔年春珠殿遺基滿緑苔空餘繡嶺鬱崔嵬開元舊曲無人解山鳥猶啼阿濫堆白玉芙蓉水氣凝依然御路直青繩祿山舞破咸陽處知在雲間第幾層春晝山鳥無聲春晝長一簾幽夢了春光垂楊直恁多才思故著清隂護海棠李早畫金人射鹿故家鞍馬亦豪雄弦箭如誇數助工只恐平原麋鹿盡角弓原不耐霜風洛濵探春二首銅駝巷陌幾斜陽又見天涯栁色黃一夜東風能爾惡梅花狼藉馬蹄香山寺聞鶯驚客意市樓沽酒壓春寒極知花事歸桃李冷落殘梅更好看寒食二首枯桐突兀立空庭寒鵲驚飛繞月明不記墻西有叢竹夜深何處寄秋聲北去南來了一年書生身世只堪憐思親欲寄平安字難覔東吳萬里船畫眉石隋宫百斛分螺緑何似文君鏡裏山千載餘妍化為石𤣥雲不受古苔斑題楊元仁所藏畫竹石上湘雲擁翠翹美人望望隔秋宵釣竿掛向珊瑚樹擬掣鯨鯢候海潮宿觀音寺紫羅山口梵王宫一樹淩霄自在紅我悟色空心似水禪床閒卧月明中斷香浮月磬聲空古像荒涼慘淡中猶以聲音為佛事髙灘流水竹林風題米元暉楚江清曉圖沙際潮生沒釣磯逺峯雲破吐修眉是中應有滄浪客閒把漁竿詠楚詞慶歡堂盡敬忘劬在色難馨香夕膳潔晨餐吾生此樂知無日空向南陔賦采蘭瑞應圖紫房葉底粲扶踈莫遣山童擷野蔬老圃能為天竺字神仙不解世間書栽花玉洞避秦人仙實偷來漢侍臣試問圍棊橘中老商山何似武陵春茂陵仙姿淑態夢依稀方士瀛州採藥歸桂館煙消九華帳劉郎還道是邪非黃堂東夜詞二首呈全子仁大參簾底移琴錦帳張梅花枝上月如霜羽書忽報諸州捷敲折珊瑚一寸長茜色紗籠絳蠟殘綺窗斜月轉雕闌當筵賦得陽春曲喚取銀箏按拍彈貴妃缺伸圖睡覺深宫日正遲流鶯飛上萬年枝起來却背東風立猶似華清按舞時宫詞宫鴉催日上宫墻天仗雲開五色光多少龍池楊栁樹清隂留得蓋鴛鴦海波涵碧繞紅墻影射龍舟瀲灧光知有才人弓箭立沙頭驚起兩鴛鴦發成都三首山禽言語各清圓馬上時聽當管絃拂面南薰吹衆緑行人昨日度西川鹿頭西望錦官城千里川原掌樣平今日鹿頭還北望聨峰疊嶂翠相迎路入新都勢漸髙錦官城樹細于毫不因劔外無嚴武却是尊前缺薛濤王母醉歸圖宴罷瑤池入醉鄉醒來又見海生桑詼諧不悟東方朔偷得仙桃獻漢王又西王母圖白鹿閒騎佩捲霞漢宫猶望紫雲車殘桃欲種千年實却羡羊家蕚緑華中山道中四首中山去京五百里客子倦于三月程借得郵亭暫容膝古槐隂裏亂蟬鳴渡頭秋水深沒馬沙觜菰蒲髙出人我亦江湖釣竿手征衣又帶帝京塵皇家昔歲祠恆嶽乘傳詞臣自作碑今日重來追往事青山偏映鬢絲垂迎人孤塔亭亭立送客青山滚滚來日暮摩笄城上望夕陽西下鳥飛回題秉燭圖秋河織女夜如年小立昭陽花樹邊莫倚天階月如晝忙催阿監舉金蓮登李太白捉月之亭訪溫嶠燃犀之所覽草廬吳先生蛾眉亭記宋漕使韓南澗及學士歐陽圭齊樂府李溉之長歌慨然有賦牛渚磯頭捉月亭古今臨眺總文星風流往事慿誰問天上飛仙醉不醒吳氏雄文久勒碑韓歐樂府世稱奇淋漓醉墨長歌好尤憶山東李溉之越王臺越臺西去路茫茫日暮風吹百草長草際牧兒時隱見去尋臺上未歸羊題猴馬圖雄姿不受絡頭絲野性能忘失木悲安得長林連曠野驕嘶芳草掛藤枝九歌圖霓旌羽蓋望繽紛江水楓林思逐臣莫道九歌空諷楚那知三户竟亡秦筆精吾愛李龍眠滿紙蓴絲滑且圓多少郢中歌舞曲風流還向畫圖傳宿桃源宫月滿空山竹滿亭石泉留客語泠泠夜闌忘作丹邱夢貪誦黃庭一卷經馬嵬華清宫畔是驪山合近溫泉葬玉環若使廟堂姚宋在鈴聲不到劔門關蛾眉玉質委塵埃方士靈香海上來一種妖魂招不得馬嵬何似習仙臺題二屏武陵溪畔數枝紅移在維摩丈室中結習已空花不住更消啼鳥喚春風右桃花畫眉日暮盈盈翠袖寒玉容寂寞晚香殘飛來好鳥多才思喚得春風滿畫闌右梨花題睢陽五老圖夜闌天祿照青藜雲卧商山賦紫芝何似翛然五君子讀書渾忘髮成絲和謝敬德題杜宏道西巖小隱詩韻十載含香侍禁闈故園芳草望人歸山應有意為青眼雲本無心化白衣東華立馬語匆匆一别西風又斷蓬揮麈不須談世事抱琴時復送飛鴻笑脫朝衣掛碧蘿却從鄰叟借煙蓑門前有客休迎肅只道西山爽氣多聞君結屋近西山知在燕南趙北間黍熟東皋多釀酒杖藜吾欲扣柴關春江待渡遊絲飛絮攪離心莫放蘭舟出栁隂分袂渡頭愁幾許桃花晴浪半篙深樂潜齊書事六年流落放歸時好似能言老令威自問毰毸翎翅短不知鯤化與鵬飛倦禪時作橐駝坐窮妄羞為猛虎吟今日回光還照色向來求佛本無心檐上秋香日日新也施朱粉媚時人萬松好在黃千葉老棘風霜亦自春詩翁老作枝江令辭吏歸來四壁空潜德欲書先友記淚河傾灑白楊風獨憐今代張平子學海源源赴百川歲晚夷門兔園册飢吟滿眼濕新煙先生屢作退飛鷁尚吐白虹牛斗間憔悴侯芭抱𤣥草一杯遙酹玉泉山石塘文章天與力九鼎十鼓驚時人天間如海養羣駿獨棄江南一角麟送孔生之鹽官詩禮相傳自過庭還因㑹計著聲名寧論積雪飛霜句佇看調和傅說羮送郭仲實知君時倚月波樓領取南湖十頃秋回首東華塵土裏有人相憶並鞍游墨梅煙冷吳宫幾斷魂飄零江北未知春畫圖一見參差是猶怕青腰玉女嗔一聲羌管月明天零落徐妃白玉鈿惆悵香魂招不得瑤臺十二鎖寒煙花光墨梅玉笛聲中作雪飛含章人恨曉粧遲氷紈依約春風面莫問南枝與北枝羅浮招得玉妃魂曽倩花光為寫真凖擬明年林下見風姿還似卷中人題淮隂侯廟旌斾逶迤出井陘何人掉舌下齊城漢家攝足分封日合把黃金鑄酈生海月圖氷輪洶湧出雲濤萬里遙分玉兔毫望見瀛州方丈否乘槎語欲問盧敖洄漣亭詩三首亭下春波照眼明濛濛飛絮亂新晴傳呼驛吏休催馬待我慿欄聽曉鶯斷碑文字費窮研絳守名髙長慶年一段江山清勝地無人收拾舊風煙吏人移石放泉流百斛明珠散不收化作雙龍舞亭砌寒光二月泠涵秋易元吉猿圖舞劔有時矜矍鑠留環底用化嬋娟何如子母空山裏澗飲巖棲樂自然蒲坂道中鸛鵲樓空草色新杏花零落野渠春清波搖蕩東風影疑是崔徽自寫真妬女祠詩二首妬女祠前春草齊敗墻重看昔年題只愁花落啼山鳥路入秦川更向西東風吹雲不成雨馬首黃塵翻海波欲過并州重回首髙城不見意如何題菊隱紙筆不事陶令子蓬蒿沒人仲蔚居何如寄跡萬人海坐對晚香聽讀書鳳翔驛二首粉白猩紅記去時歸來風雨洗芳菲一川野菜黃花滿小蝶叢叢占夕暉浮甑香粳膾錦鱗蜀薑巴筍厭芳辛一杯脫粟和羊酪始信今朝是北人題白海驛沙龍海白漢離宫武帝曽來看射熊霜露不寒仙仗暖旌旗十萬障秋風寶雞驛詩二首去年山桃花滿枝歸來結實小垂垂林間鸚鵡應相問馬上尋詩客是誰路入褒斜虎印泥天連蜀棧子規啼今宵却是中原客行盡青山到寶雞題邢氏家傳駕鶴羣仙不可追卷中重讀舊題詩去天尺五邢家宅春雨年年長玉芝即事午醉醒來坐晚涼一杯湯餅菊苗香山城好箇清明節啼鳥落花春晝長浦口雜咏次劉吟所江浦蘆灰酒最多江頭人唱竹枝歌坐看畫舫髙低處又是潮來水漫波蟠桃圖老樹春風歲歲芳氷盤佳實厭甘香瑤池笑殺西王母何事千年始一嘗
