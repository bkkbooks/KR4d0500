body:
  text: 伊濵集卷二十三元王沂撰碑樂平縣尹康君遺愛碑平棘康君庭玉之尹樂平也密而不煩嚴而不苛教民趍農桑通溝洫以厚民生興學校以媺其俗又以其餘力封壇壝理傳置悉如法其識事如蓍龜操守如氷霜憂民務如家事衛良善如生芻不為機巧刻察而治獄不撓曾無嚴聲惡色而吏縳不得逞里歡户懌咸曰有惠愛於人既去官邑之里㕓林野之民願伐石以紀其政以耆老閻惟寅之狀來徴文曰邑民有與大姓爭田者大姓力能動縣州吏曲文為道地民憤死其妻藉以中之逮繫者四十人獄具君求得其情民泣服釋濫繫者嵗大旱麥既萎死而菽粟未種君薰祓禱羣望得雨逺近周浹變瘁為榮易憂為喜民曰君精意所致也君名國器早以明習法律推擇為吏歷官和順南宫二縣簿故能深知民隱所立卓卓如此嗟夫理民莫近於守令也今凋郡敝邑相望蓋能推其功惠及民者鮮也君受代在任之嵗月與衆人同而民思之不已亦難矣哉乃取其民之所頌言而次第之曰樂平之郊載歌載謡有綽其政其聞孔昭聞也曷以宜民而已宜民曷以以其夷易獄訟之濫繫者充斥君來聽之髮櫛絲績時澤之愆我民焦然君禱而㴻錫之有年遺秉栖畝囷藏露積富我鰥㷀繄君之錫原有喬松隰有豐草無壯無稚祝君夀考式爾後來視君之為太史之辭我民之思真定路饒陽縣主簿吕君遺愛碑頌至元之初詔天下勸農桑興學校革弊修廢而海內悚然知上之求治矣於時羣下遵職惟恐在後而饒陽縣簿吕君以治行聞嵗滿代去其民聚而謀曰我民之德吕君至矣顧無以自效盍以君善政刻於石乃俾邑之士尹彬張思禮走京師請余曰吕君之為饒陽也以平恕質慤為主不矜智飾名每事輒分别可否而使其政皆由長以出以故為之長者聽為之民者思先是賦稅失其平民往往轉流君正稅籍墾姦蠧若疾痛嗜欲在已復其業者五千餘家嵗輸米五千石武强出入圭撮若家計然於賦役度勢不可蠲除者然後第甲乙調發與民為期㑹如補倉廪治梁道貴不煩而民不擾滹沱水囓堤府調陻塞君賦葭芻均更繇旬而集府嵗買桑楮藴絖給受有法無均否之弊無㑹集之擾凡民有訟曲直君濯手擲爪徑决於前不以屬吏詿誤若小過輒誨諭遣去民有爭分財訴户役積嵗不能決君為辨之卒使感悟而去久之政洽豪猾屏迹鰥寡遂飬弛壞更革乃興學校建加封先聖碑與其長二春秋釋奠以宣教化以故嶷然有能名部使者二千石舉其材將用矣而我民思之不忘公其賜之文以慰我余謂為政莫難於為縣也而簿為尤難凡民事委曲當有所操縱緩急也惟其長之同則奉法之吏從而繩之不為其同而惟其志則為侵官為立異若吕君者不矯矯為異不翕翕為同能使為之長者聼為之民者思蓋人有所不能及也不為之頌則為善者何以勸焉吕君名栗字士寬世家中山之無極其材方嚮於用其可頌者庸詎止於是歟詞曰昴畢之分饒陽其邑流聞王城有偉其績曷以致之時維吕君匪飾匪雕璞玉之純此張彼弛補刓葺弊庭絶滯訟濫獄無繫流亡既來君能撫之我無爾暴爾無我欺驅我蟊賊膏我黍稷我倉既盈爾廪維億何以祝之福祿如茨何以昭之琢辭于碑墓志元故應奉翰林文字從仕郎致仕郭君墓碣應奉翰林致仕郭君既葬其孤汝立請于禮部尚書張公國維曰先子官次行治既載太史楊俊民幽宅之銘維墓有碣所以明著其體聲美實以飭我子孫於千萬世其辭未立敢因公請乃屬其遊李濟卿以狀走京師乞文於襄隂王沂序曰君諱士文字從周其先廣寧人中徙錦州至君之大父又徙真定故今為真定人大父諱安世載德弗耀父佑掾農政院以君故贈從仕郎真定路靈夀縣尹母傅氏贈宜人君早為部使者陳公天祥知辟掾不就巳而用薦者為欣州文學掾改真定文學遷教授大都學調陜州逺安縣簿改太常寺禮儀院太祝又不就以應奉翰林從仕郎致仕卒於元統三年三月癸巳年七十有四以其月丙午葬於真定縣柏堂原之塋以配宜人傅氏祔子一人汝立女二人長適趙祖昌次早卒孫男一女一未名也初靈夀君殁京師君尚幼徒步往返護其喪歸哭泣無節垢塵積首見者嘆息終喪事母至孝飲藥物必經手尤刻勵就學博聞强識屬文謹繩尺於書工篆𨽻游於集賢學士焦飬初國子司業硯堅之門而與處士默菴安某磨礲灌食以求其所至以故名出衆右其掾文學也嚴知約善教誘為學者所歸今翰林承㫖許師敬時二燕憲尤器重君其教京學也名益著論者謂君勢且顯而任事者亦意嚮尤甚君終不肯强起天厯初祭酒蔡公文淵薦君教國子而君已老矣君為人介特樂靖退言動必度於義於勢與利無秋毫顧計心晚號西泉日與學士大夫講評以遂其好嘗考燕南河東鄉貢士其得人為多屬疾垂殁容止如常呼弟子李鳳理髮正冠遺言里中親疏各盡其意噫是豈無得而然哉用雖不盡其才而言足以見其志學雖不大於人而譽聞於一時其自得者夀考於身其有餘者以褒崇其親以流澤於後是不可無銘也其遺文若干卷繫銘碣上曰彼囂吾靜以守則勝彼棘我徐以求則迂不囂不棘維學之力兆此新岡歸安其藏琢銘斯石過者必式故將仕郎翰林國史院編修官賀君墓碣賀君名據德字天爵太原清源人也初試國子伴讀後中泰定四年進士第丙科授將仕郎翰林國史院編修官既滿乞外補以至順二年八月丁酉終於京師僦舍春秋三十三以其年某月某甲子葬於其鄉之先塋次君初從今翰林侍讀學士富珠哩君學雅為故國子祭酒宋君誠夫今國子司業謝君敬德器重其家故寒也自童幼孤苦無慢情戲色侍母以孝聞出從友朋以矩法自持為學勤苦旦不頮水夜不解帶翻研覆精必以巳所自到者為是由是於場屋之文膏潤氷釋義理溢發既編修史館行加修名加聞若將施之而固止之斯其可哀也夫初科舉行士之䇿名者纍纍智運術展於清資顯轍執契而取君既為館職矣天與之榮如此而又奪之之峻如此豈暫顯之而終蔽之是殆不可曉者也既沒之如干年當至元之初清源縣大夫孔禮字仲理石以表其阡以監察御史吕君思誠幽宅之銘請文昔孔子遇舊館之喪而哭之哀脫驂而賻之門人譏其已重而孔子辭焉曰余惡夫涕之無從嗟夫吾銘不愈重於脫驂乎君可以無憾矣繫銘碣上曰孰夭而屈孰夀而伸其天其人磅礴氤氲復歸而真承務郎南陽郟縣尹郭君墓碣君諱泰字通甫姓郭氏其先陳留人在金季有長千夫者逸其諱天兵定河南君之祖全集蕩析之民為百户𨽻武宣王察罕麾下既聞即命為官長以撫其衆始徙家襄邑故今為襄邑人考元贈承務郎汴梁總管府推官母氏李贈恭人君早從舅氏故參政李成肅公學練習典章律令因革損益至大間朝議修通制用薦者與編緝書成補中書户部掾有能名遷河南行省掾而名益顯丁母憂服闋授承務郎尹南陽之郟縣他州邑訟難决者部使者悉屬君已而以疾歸調監衛輝路驛不赴以後至元戊寅閏八月終于家春秋五十有七配韋氏封恭人子男三人長榮祖國子伴讀欽祖繼祖尚幼女二人適士族君既葬之七年榮祖以榖城縣簿劉中孚之志求文其碣曰君為人和平質簡不矜智取名其施於為政亦然至有所必行人亦莫能及也初天歷皇帝之入汴起萬夫長之罪廢者命守潼關以拒西軍而遊田沉湎自恣間縱帳下惡少肆剽掠軍民洶洶如驚鹿巳而潼關失守坐法下閿鄉獄其徒破械出之走郟縣匿逆旅舍君聞往捕左右曰彼將家子勇健多力未易當也盍請于大府君曰吾備位長民有罪可縱乎既就縛護送汴君應賞不下或勸其自陳一笑而已此行已居官已試者也是宜書銘曰君之為政小法必慎及其臨義則奮而進俾擴其施詎止于斯奚嗇其為惟後之詒伯姊墓志銘伯姊王氏先君宣城公之女嫁東垣侍其氏為嘉議大夫浙東亷訪使同朝之子婦侍其君通之妻笄而柔嬺靜約動應儀法於刀尺針縷不習而悟於圖史知大㫖於孝友天得也長而擇所歸仰恭俯慈宜於家方其盛時中外聚指數千嵗時饋祀以恭先之而恩意所逮踈戚如一舅殁姑老分任家政侍其君名宦未立卓越不羈賔客過從車騎魚貫擊鮮置醴彈絲吹竹歌呼遨放窮日夜不厭而家業少衰矣吾姊相以儉約納諸繩檢斥貨簮珥珮服奮厲營畫秩秩有序以儲以積至有田以食有廬以居飭其子以學不倦此其德性智術非偶然者人皆謂宜夀而康克備成福不幸年三十八以卒嗚呼女如是足以知其賢又足以知吾祖考之德行於家也以延祐四年八月二十二日卒於姑孰即以其年某月某甲子葬于姑孰溪青山之原子男曰某嶄然有立王氏世家襄隂今為大梁人吾姊為金監察御史諱鋭之曾孫浙西道提刑按察司經歷諱振之孫宣城諱宗仁之女為之志者其弟沂師魯也銘曰秉是壼彛一其初終振彼單微實保其宗在德靡虧奚報弗隆曷以告哀納銘新宫鍾教授墓志銘客有挾五行書踵門來見曰鍾萬鍾試告以嵗月時具道余生之辰月宿星斗而金佐之用是剛介自將不能俯仰俗尚謗譽相尋若素所聞見其然者余灑然異之問其所傳戚然曰吾先子早遊江南得李虛中學而周覽旁浹星厯書以翼其術推人之夀夭貴賤貧富憂樂竒巾而不失繇是名聞江淮間晚而劬躬教子萬鍾未及飬而遽大棄之葬又無以識諸幽終天之恨也公幸哀而賜之銘即死無憾翌日袖繁昌縣大夫張純仁之述一通來授余憐其志為序曰君諱震字東叟太原人髙祖㑹仕金為小官曾祖耀先祖夢熊夢熊子三人益成益禮益友益成始徙家浙右辟宣慰司史以殁君之考也初君挾其有遊姑孰繁昌間一時士大夫多神其伎謁者浸衆君應之一以誠篤時微諷默導以救其失晚用薦者為隂陽教授池州卒於至元二年丙子二月十五日春秋六十九娶虎林何氏子萬鍾也銘曰奚術之微奚居之卑庶乎道之為歸嗚呼鍾君其尚近之劉宜人袁氏墓志銘夫人姓袁氏濮州臨清人父諱某以長者稱鄉里母李氏夫人年二十有二嫁東昌邱縣劉氏為從仕郎德州判官熙之配儒林郎國子助教源之母至元三年三月二十一日終京師之官舍春秋七十六即以其年某月甲子歸葬臨清縣廣濟鎮之先兆初德州先配吳氏既殁子淵尚髫也夫人拊字恩有加俾克有立及夫人有子今助教與淵友愛尤篤助教之幼既捐重幣求師教之及壯又遣至京師齒胄子于學淵悉所有以資其費無所靳居數年明試于有司收其科歷官州縣入列于朝德州與夫人皆以助教貴授封夫婦康寧夀考助教迎致京師食其飬祿而宜人遽卒其可哀也夫助教同余官國學居相鄰也故其子請銘不辭而銘曰子登王朝夫老邱園謂宜百年象服魚軒胡嗇其報維祉其後維瘞有銘萬世不朽沈伯雋墓志銘君諱茂實字伯雋其先有為齊太子家令者曰約嘗徙家吳興故世為吳興人至君之考又徙家錢塘今為錢塘人曾大父諱謙為宋承信郎監武義酒稅大父諱行義保義郎准備平江節制司差使考諱元龍登仕郎應浙漕舉君少蓄學問發為文章詩嘗往來新安方回萬里西州史孝祥敬輿之門用薦者補録紹興儒學母病棄歸養居久之改杭儒學録歷石門洞書院長丁父憂卒喪遷太平儒學正先是庾粟庫錢弗以豢士一切靳嗇贏則掩取自封殖又虞暴章得罪乃竄易為簿書他日為清㸑誑士惴惴然恐户外之屨入也君獨裕人薄巳弗樹乃私能俾長者聽二者服日從四方之客與夫鄉邑之老登蛾眉亭俯大江釃酒髙㑹鳴絃賦詩汲汲然恐招納之弗廣恩意之弗周也以故人士舉慕鄉尊尚之君欿然飲其德也嘻可不謂賢哉晚歸錢塘從容語諸子曰吾嘗築室塘栖樂其溪山吾圃樹菊二百菊孤淡貞潔介然有常吾庶幾近之吾將隱矣明年君疾不起年五十五泰定元年十二月十九日也又明年乙丑二月二十三日癸酉葬烏程縣崇孝鄉蘆溪之原母張氏娶姚氏有子二人曰黼曰黻黼包山書院長孫男二曰康曰庠其著述有古刀尺野人談録視聽録菊泉集姑孰槀菊泉樂府藏於家君亷靜寬慎貌和而內有守世俗之所為有不為者誠有若其自况也葬期及黼以貴溪縣簿薛基之述來請銘故不辭而銘之曰約于身豐于人維篤於仁厚厥有艱厥夀克咸厥後經歷張君墓志銘大梁之張氏有家江南以明法飭行顯掾行省以卒者孝叔有子承德襲教以繼厥聲為嶺南廣西道肅政亷訪司經歷以卒者諱復初中修字也少孤刻勵就學卓犖有大志貌魁岸嚴整不可犯嶷然善為官所居聲威流聞居平樂易長者也初辟浙東帥府史日本賊變生倉卒嘄呼白晝操利兵火官寺闔府劻勷君突出白戎帥部衛兵以距敵格殺其渠賊以故不敢迫而圍竟解蓋君之勇略如此頃之遷廣德尉不赴用舉者擢浙西道憲吏繡衣使數倚决難事君治之恆若簡而有餘以材髙遷行察院史尋調將仕郎知事平江府非其好不就也又辟南臺掾御史薦君練臺憲典故可以持憲一道遂超遷從仕郎經歷廣西道踰嶺冒瘴沴卒鬱林驛時泰定元年七月甲子也享年五十八官為封傳護送以歸其配解氏以其年十二月甲子葬于祥符之原先墓次初君為吏精敏果伉發伏振弛擊姦强擲根節機張鍵閉靡漏毫末一時在勢者爭出氣力引挈之君亦慨然將有以為也而遽止於是豈非命也夫噫嘻命之不可空揣而材難恃以自見也久矣彼蹈汚陵巇剪剪以覬幸其偶得也又左睨右眴而恐失之是本何理哉君世為大梁人曾祖某祖某皆仕金季母氏鄂吞君遊余父子間相厚善將葬使來乞銘余故不辭而銘曰嗚呼張君胡厚其有既不申厥夀亦不昌厥後天耶其偶然耶我又何嗟
