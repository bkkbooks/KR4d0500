body:
  text: 伊濵集卷二元王沂撰五言古詩清水驛東出虎頭關畏途復多雨林端望山驛屋脊翳復吐板橋馬行竹逕禽哢聚江流猶蜀道客子已秦語聨峯抱髙臺欝欝多草樹傳聞漢武侯於以駐師旅遺鏃雜刁斗土花蝕金縷空餘舊營壘隱隱皆可數徘徊想英風彷彿見眉宇壯圖雖云屈陳誼吾有取草凉樓驛鳳州黄花驛山路石齒齒少年躍馬来自云巴省使壘磈橐中裝蠻氊雜珍賄馬鞍未及解喘息汗如水莫辨驪與黄塵埃翳瘡痏驛卒相股栗槃水前拜跪須臾驗館劵咄嗟具甘㫖持盃未投箸叱吒㦸其指前途須駿足快若雷過耳吏也前致辭民飲食無米小邑無權竒連槽才百尾使嗔欲裂眥極力加鞭箠以索縶其足以鞭梏其耳驚呼聚老稚懇告未遽已時我坐堂上顧視顔有泚吾聞一馬值其價千金比豈惟數家産往往鬻妻子清時法令具恩澤及行葦詎期赤子輩而横遭毁恥長歌紀其事以告司風紀盤龍閣江流轉山根怒若雷霆鬭兩崖束天窄了不辨昏晝閣道勢凌虛蜿蜒工結搆鑿石駕飛梁俯視明欲透霏煙撲馬尾空翠冷衣袖江花落我前山鳥啼我後物情豈不佳一墜那可救整鞍望所歴險絶吾敢又長吟紀壯遊援筆泚巖溜秋日道中雜詠三首釋悶偶出遊時光感流轉晚禾雨中熟秋草沙際軟延賞遂永懐縁竒遽忘逺田翁候門久籬落吠山犬采樵南山顛往来清澗曲地磽材木尠世亂斤斧數所以澗畔人清風一竿竹超超出塵網朝暮恒自足髙舟上灘遲厚筏下灘疾出塞怯横行還家顧深積相傳即墨下復道聊城急偉哉齊大夫清節故無匹聞吳侯去疾重理快閣賦柬江閣竦巍構崇墉䕃長堤地靈侈南紀文采麗東曦白龍卧積水金魚揚素鬐流霞粲成綺列翠逺以夷景適意先快賞同趣未稀古人忽已往名彦復在兹取材庋層棟疊石壘重基翬飛出天半虎眎臨水湄政通士和附恵洽民恬嬉優優如練句磊磊落木辭一美信難越千秋恒若斯眷言載筆侍永懐求友思孤遊限羈旅跬歩惜暌違翹首詎能即撫心安可希和答克哷景兖宋文野謝子玉歐陽復初連偉度五君見寄詩徴君廣平後髙節陵首陽文星歛竒耀古劒埋寒光隂求金玉人適此逍遥場雖云貧非病肯以圓斵方雅歌樂豐芑戎事藏中璋舞雩伊川春願列弟子行廬陵文章家千古聲巍昻敢嘲座無氊但喜書滿床琅琅尊罍古落落科斗章渠成亦秦利坐君鄒魯堂柳營賢主人薰沐道徳鄉遐追白鹿迹近襲滄洲芳蘭蕙紉雜佩芰荷製衣裳非公無此客冠葢相頡頏白首連將軍葵莊樂迷藏坐令矍鑠翁負暄朝倚墻揮毫氣凌雲横槊心未忘期君蟠桃實酌我流霞觴謝公養疴卧髙風何激揚妙語不肯吐縮手猶未遑含光世已驚懐璧古所傷固應夢春草卧看蝸書梁長懐詠五君倦筆愧三長山王一時數竹林非杳茫相從能㡬何回首海生桑詎知龜九頭敢附驥一驤五年身百憂我觴如沸湯賴兹金石盟不改松栢香冬至日于思容侍郎座上分韻得初字官閒睡正美簷鵲時起予豈其得氣先而聲和且都覺来一室中静見天地初帝鄉豈不戀嵗晚思吾廬昔年拜家慶共此一日娛忽忽三十載窮愁生白鬚營營聲利場擾擾冠葢區顧惟枯槁姿廼與二妙俱矯矯漢廷尉妙語傾驪珠翩翩金閨彦清言響瓊琚邂逅一樽酒嘉殽雜山蔬焚香閲晝永添線良不如懽餘動歸思目送南飛鳬家貧願嵗豐黄祲朝可書題松澗亭亭石上松下有潺湲水清聲雜逺響坐聽醒心耳時逢蘇耽鶴或見琴髙鯉我欲往從之蒼蒼烟霧起榆次驛古道明草花峭壁竄蒼䑕山迴榆次口堠指并州路野人習阻險髙下藝禾黍泓澄澗流斷錦石燦可數豈無登臨興信美吾非土緬懐全晉時表裏金湯固戰國既鼎分形勝各盤據霸氣一消滅城郭非復故問樵樵不知問牧牧無語立馬望長安蒼蒼歸鳥去雨後同廖以善廣文看山杪春意不懌攬轡登髙邱山雨夜来過繞城空翠流爛然雲錦屏遐眺不可周蒼蒼龍虎氣上拍天際浮美人共佇立指顧復遲留金精峙東境雩嶺按西頭周遭亘長陸迢遞俯平疇層層桃李樹嘉木枝相樛余方滯覉旅眷眷懐舊遊還當凌絶頂歴覽大九州滴水崖髙崖何亭亭有泉出嵓竇下為珠貫繩滴石石欲透跳波注巨壑鏘若琴筑奏逺響驚魚龍清音雜猿狖隂連棧道􅉸冷逼山木瘦停驂酌甘潔三嚥不敢潄詩成若為書峭壁苔蘚厚菊隱粲粲石上花泠泠谷中水豈惟制頽齡亦以佩君子釀酒既甘烈供蔬復芳美仙源不可到望望白雲起鄒吉泰拉諸公遊珠林訪子髙進士予以事牽賦以為後會張本公子好吟咏名山多往来昨聞珠林去賔客盛英才沙磧逆灘轉浪花迎棹開林中肅飛葢日夕具尊罍載歌伐木詠逸興何悠哉俯仰兵革際㡬人同此盃探題憇禪刹乗月坐莓苔相如偶未至豈失後命催託此大雅音歌之向鄒枚江山若有待别日共徘徊次韻答仲修感懐士生汨流俗浮雲蔽朝陽洗心浄氛埃孤月懸清光蟬蜕聲利區豹隱道徳場不著虞卿書但寫陸氏方廼悟玉不琢孰為珪與璋又知純璞殘始備犧尊行虛舟任縱横桔橰謝低昻神遊狎鷗海意得夣蝶床載歌秋水篇亂以逍遥章自愧聞道晚敢云或升堂惜哉山水窟信美非吾鄉誰能見河清誰云采蘭芳是身雖臭腐寜堪揎軒裳俯愧鱗淵沉仰慚翼雲頏欲辭簡書畏深入林泉藏詰曲厭機穽卑陬懼嵓墻何時縱壑魚江湖永相忘不學避風鳥深矉魯門觴臼頭何醜悍越女何蛾揚馬何了得失欲訊吾未遑鵩何了淹速作賦私自傷樗櫟何散材松栢何棟梁鵬鷃何髙低鳬鶴何短長我欲問大鈞大鈞何蒼茫誰云廣陵散同調陌上桑誰歟挽跛鱉擬逐蛟龍驤澆君談天口試我門冬湯不如兩忘言宴坐凝清香紫霞滄洲晴波漾金沙雲錦若可卷剥啄者誰子驚鷗去人逺豈無芙蓉製奈此秋日晚借問垂竿翁仙源路深淺野田花戯答友人陂水浄以渌原田美而遐盈盈田中苖的的原上花秀若元圃雲粲如赤城霞誰令貴反賤惻惻行路嗟緑草被沃壤繁花翳塵沙昨隨南畝田今入西隣家輝輝間陵道莽莽接水涯且復事固蔕寜聞勸燒畬飛飛媚黄蝶聒聒閙青蛙無如野田好請子問蓬麻抱疾二首抱疾乆在告閉門徑生苔孤鶴向我立修翎舞毰毸雪毛落竹間翠光照玫瑰汲井煮仙藥鬱懐為之開安得體順適百嵗平無乖乆病事藥餌體中未和平出戸歩履苦候問勞友生兹晨秋氣髙褰裳下堦行行少即據床坐聽飛鳥鳴少小學讀書老大轉無成逢時愧苟禄靦顔竊文名每遇有志士瑟縮如吞聲龔生後来者胸臆涵六經葢世少知已三十無官榮門有車馬客門有車馬客請賦從軍行將軍素英武鐡騎守長城玉匣魚腸劒光芒掣飛雷走馬沙場中才堪百餘戰承㤙歘徵起所願解重圍寸心逐黄屋殺氣如雲飛望中條山黄流不可渡驅馬歸桃林遥遥中條山秀色横古今隱者今何之試用物色尋應歌紫芝曲閒卧白雲深笑我與時乖感我違素心不知山中趣強作山中吟仙人山林隂䕶宿雨棧道泥潦積凌兢馬蹄滑使我心寒慄東登朝天嶺竒險無與敵廻觀仙人嵓相去不盈尺驚風低長林􅋾􅋾衆崖壁絶壑響奔湍懸藤絡崩石十年住京華學館多暇逸我行非王事斯地何以適澗底燦金沙分明虎行跡山深日易昏驛吏勸行疾哀三良三良昔殉葬死有千載名康公徇戎俗廹以亂命行作俑且無後傷生焉得仁翹翹子車氏卓卓秦之英如何同日逝兄弟無一人殉死不殉道亢宗義為輕所以仰天嘆悲哉黄鳥鳴曹公狎忠義王子失權衡自餘效顰者𤨏𤨏不足陳先賢有名訓忠則良可珍哀嚴陵生文炳久客遂長往至友罕儔匹焉知天地寛罹此羅網宻畏塗窘髙歩遐筭屈短日誰為石與阱而謂膠在漆䘮亂總弗支紛紜竟何益蛩悲咽吟榭芸敗滿書帙呼之不聞聲握之不能即諼堂樹忘憂蘭砌藴兼璧覩此増惋傷哀哀淚填臆次韻陳希道和答鄙句遥遥黄泥坡望望清伊陽落落我與君共此明月光平生農馬智謾説古戰塲坐令籋雲駒長鳴思九方我懐愧涇渭君才自珪璋回頭蔡克兒亦在交游行新詩妙五字家法窺子昻過我蝸牛廬坐君獅子床雞虫了得失虎豹炳文章髙懐自竹樓清夢猶雪堂願從玊局僊騎鯨白雲鄉下視笑湘纍採擷紉衆芳憐我失收身紫鳳倒短裳胡不接羣飛羽翰同頡頏試看春蠶巧作蠒思自藏又看老狐黠安居穴垣墻那知鼎鑊憂不與爼豆忘且當置許事萬慮付一觴北斗不挹酒南箕空簸揚虛名一畫餅癡兒日遑遑炙香不足喜棄捐亦奚傷長吟感興篇仰眠看屋梁妍媸果誰分尺寸果誰長人定能勝天胥言非𣺌茫君家太邱翁晦行如瘦桑紀諶與羣泰十輩争騰驤持此欲夀君春醪若為湯會看虞賔後汗簡垂馨香横翠堂天宇浮修眉木末堆髻鬟逺煙雜嵐翠政爾明滅間拉笏者誰子目送飛鴻還楊宗魯行義詩關中有一士行義舉國推昔在垂髫年挾䇿不勒師慈親已鶴髪兄弟相怡怡嗟哉董邵南名與淮水馳鄉閭表君子王烈相與期辟書来興元結束告庭闈豈無毛義喜氷蘗以自持皇皇綉衣使如獲璧與珪羅置鴈鶩行條理皆得宜擊彊如摧枯趙葢相攀追平反共一笑我慕雋不疑錦江與南詔稱譽均一辭天歴盗弄兵盟歃起滇池殺吏火官寺奔潰勢莫支㣲服竄巖谷草木充朝飢蠒足報蜀省鵠立忘其疲我欲進短䇿無由至丹墀指陳利害端了如鑑中窺隱隱巴道路悠悠漢旌旗坐令萬黔首危脱劍頭炊遷擢薇垣曹訂謨佐龍䕫見待以異禮翻然忽言歸包胥泣秦庭忠憤知者誰魯連不言功耿耿空自竒未㡬丁父憂泣血雜涕洟䘮祭尊禮經觀者無瑕疵是年嵗大祲關陜多死饑宗族二十䘮馬鬛髙峩巍施恩及里閈義塜何纍纍腴田均四弟耕耨俾以時蔬圃聊自給抱甕甘胼胝緬懐申屠蟠髙節有光輝又嗟晉王裒竟廢蓼莪詩蒼天不虛應禍福各有隨馴烏祭墓前甘露零松枝豈惟淳風還坐使薄俗移我詩非為君為世陳良規發赤城赤城夜来雨新漲沒馬膝曉行鶴門嶺􅋾􅋾亂峯碧秋髙川原濶禾黍紛已積居人望翠華父老扶杖立牛羊散在野晴曦漏雲隙崖巔掛虹霓草際鳴螻蟈既忻寵光被復協栖遁迹行行幽興得覔句寫崖壁停立望蒼茫亂飛歸鳥急同劉文原仙客坐瑞芝亭税駕息元圃塵思積盈襟朋遊適良晤冠葢同幽尋花發洞門杳鳥鳴修竹深遐觀達萬變内顧惜分隂余懐抱耿耿流運逝駸駸俛仰一時好悲哉葵藿心夀萱堂二首階前萱草緑屋上慈烏飛慈烏啼朝陽萱草含春暉香浮尊中酒綵製膝下衣持夀鶴髪親年年樂無違萱草生堂階慈烏不逺飛吐花解忘憂返哺鳴相依豈惟擇地生而亦知所歸何以守此心所保終不違題聽雪軒論文憶李白對酒懐謝眺如何竹牕友獨夢寒江釣明發望鍾山千峯玉相照嘉樹軒為胡士則賦南山有佳木濯濯皆十圍瑞露沐柯葉朝陽借光輝女蘿既有託好鳥亦有依青青與冥冥所保終不違不違復不斲美玉終在璞所期嵗云晏刻作雲門樂九月十一日鄰冦逼境倉皇南渡感賦鄰邑舉烽燧長驅冦南平中宵始聞警挈家遂逺行倉皇具舟楫所志惟弟兄初營暫渉水將謂復還城歸途逼烟燄戎馬亂縱横父子兩隔絶慘哉生别情慈親力疾起負掖同遐征飢分路人食渇飲田婦羮兒童不遑息踽踽昧前程為謀若不早臨難乃無營前事杳難測逢人空涕零存亡有至理瞬息且偷生放鶴亭白鶴招不来青天飛片雲應隨紫鸞車往見三茅君雲上僊風過空香萬里聞覽古楚國憤竒士伍奢真可憐憸人費無忌䜛間平王前䜛奢未及止思去二子賢賢哉子胥智乃出無忌先弟兄永訣别父子相棄捐貫弓向中使去就何翩翩吹簫道中飯脱劒江上船艱關歴他境慷慨張空拳公子不可説専諸能解懸退畊伏中野决䇿如轉圜二國適多釁五年方見宣操兵遂入郢殺氣如霏煙不得費少傅斬首謝厥愆徒令楚舊主乃辱吏士鞭報楚既得志謀越徒進言屬鏤早受賜鴟革往不還忠因怨毒發孝以忍詬全樹檟志弗遂夫差隨上仙悲君讀遷史今古慨悠然雲巢巢居巢何許西山白雲是仙風過其上逺聞笙鶴至推户欲見之氤氳漫弱水舒可彌六合卷之膚寸耳聚散了無跡吾心亦如此知風既有鵲知雨亦有蟻問君君不言手揮白鸞尾野鶴為述律存道賦九臯有元鶴故巢遼海東常為仙人駕雲上乗剛風云胡白鴈来城在人民空獨立振玉羽心馳寥廓中只今覽徳輝下與威鳳同宵警金莖露夕棲瑶樹叢回頭視雞鶩啄粟坐樊籠進學齋昔我種嘉樹于彼南山岑風霜偃薄餘雨露灌溉深既脱斧斤戕復無牛羊侵寒暑相代謝萌蘖而十尋材可梁建章隂亦成鄧林青黄或犧尊窈妙揚瑟琴翩翩媚學子斯言可為箴
