body:
  text: 伊濱集卷八元王沂撰七言律詩過彭澤縣靖節休官迹已陳水光山色為誰新九江屬邑名千載東晉高風秪一人石上孤松猶翠黛宅前五柳自青春南來欲致生芻奠憑借當時漉酒巾送鄭子安經歷之浙西憲司遊觀東吳天下稀賓筵憲府更光輝西湖秋泛芙蓉水北闕霜迎獬豸威山際驛樓紅半吐煙中官樹翠相圍使君旌節應西下目斷巴江鷁首飛寄許大參夢中曽上庾公樓楚岫縱橫翠欲流别後武昌魚可食重來溫室樹經秋因君樂聖銜杯句憶我垂綸載月舟無奈龍沙霜露早綈袍欲著重回頭去年風雨菊花時曽誦灤京百首詩今日六龍隨警蹕却憑征鴈寄相思長吟明月同千里欲對芳尊把一巵别意短長何所似湘波不盡碧參差寄題曹新淦赤壁圖誰向臨臯夢鶴飛畫圖風物尚依稀清霜木落黃泥坂斷岸波回赤壁磯故壘銷沉遺戟盡孤舟縹眇弄簫微高懷最憶金川守千古希賢思不違遊元虛庵留題詰屈人間不用悲馭風騎氣欲何之逺求勾漏空千里甘隱吳門自一竒白鶴歸來人換世青山老盡客題詩支頤忘讀參同契貪看楊花落硯池臨江驛嘉陵江色淨於酒嘉陵官船輕似鴻水禽羣飛夕照外晴嶂落影亂流中棹歌不解巴童語甑飯欣看蜀客風喚馬夜投山驛迥隔林遙映一燈紅鞏縣道中用文野送别韻秣馬芝田日又遒扶鞍弔古且遲留殘陵衰草寒雲際故壘斜陽野水頭千古徒爭兩蝸角百年能費幾狐裘道旁翁仲應相問又是邙山第幾秋木齋為方積賦昔年種樹未勝巢老幹如今屋脊高屢許狙公分橡栗時招木客醉香醪衣巾白日驚蒼雪枕簟西風夢海濤歲晚淹留吾倦矣借君叢桂續離騷贈采詩熊思齊還清江清江故舊久相違聞説尋詩欵竹扉阻對高軒維白馬謾從空谷賦緇衣日暄官路梅花早霜熟郵亭木葉稀最惜揚舲不相送臨風極目思依依百丈山賦贈廖自強之清江清江風景似桃源百丈山深隔縣門峯引碧蘿垂草閣水深蒼峽到書園舊時節士何人在近代詩家幾輩存文學只今懷檄去登臨猶得及春溫槍竿嶺紫菊山僧贈我叢叢菊紫蓋光涵翡翠明青女何妨妬顔色徐娘元自有風情龍沙秋意晴偏好鴈嶺寒香晚更清回首故園人在否花前樽酒共誰傾七月十三日書感去年學語囀春鶯早解回頭譍唤名豈謂女生為寄物翻悲吾老未忘情丹砂猶記新塗囟文葆空憐舊繫綳今日龍沙千里濶秋風吹淚欲霑纓霍山道中太行高讓霍為鄰祀典褒崇輔嶽神桂醑香銷疑化雨靈旗風動不驚塵丹崖翠壁層層路野杏山桃處處春華髮詞臣無補報停鞭回望祝堯人題陳則虛散木軒萬彚林林造化中始知才與不才同青黃肯效犧尊用長養還均雨露功點易研硃枝滴露談元揮麈座生風客來欲問南華旨間倚枯根目送鴻送姻弟劉子彥應辟畫船衝雨發官河束帛徵賢是禮羅天上午門新日月海中春水淨風波經筵進講先三禮名世登庸重四科自昔珠林推俊秀茂才應制蚤鳴珂嘉陵道中路轉嘉陵入渺茫巴童蕩槳棹歌長山雞傍驛如泥賤竹𪕋登盤覺笋香石棧苔紋煙借紫江干梅子雨催黃空愁夜宿琅璫驛無奈鈴聲斷客腸華陽宫方壺别館墮何年下視孤雲一握天旋斸黃精供野飯相連青竹引山泉詩中我愛陶元亮林下誰逢葛稚川鶴駕不來明月老小窗無地著風煙謝司明復贈東坡帽故人贈我東坡帽因帽思人亦我師只恐鄰翁偷學樣還憐稚女道相宜養丹未用顔如玉耽酒何妨鬢似絲為報西風莫吹落尊前留戴菊花枝題馬伯庸賦劉氏溪山圖道人昔作朱門客溪上春風草自芳藂桂曽聞招隱士塵纓凖擬濯滄浪蘆洲繫艇鳬鴉墨石壁題詩苔蘚蒼誰遣漁人解橫笛夢中疑是在山陽華隱者圖二令陳君舉善為鵬舉而作余與子高自立二公留止山房同推隱者之意而賦詩焉原上春風語鶺鴒溪南新結得華亭堆床書卷聞鐘起破的詩歌按節聽幽澗自多流水操好山長送入簾青知君已熟淮王趣招隱何人敢扣扄送高道崇歸仙巖宫青鞋偶爾犯塵紅夢寐仙巖翠拂空賀監風流真可慕長康癡絶不妨同摩挲金狄千年後灑掃漁磯一笑中後會參同較同異定煩騎鶴過神嵩發長安留别王善甫尹文質諸公未到長安一解顔故人連日費追攀相看寒食清明裏况復周臺漢苑間長樂花香濃勝酒灞陵樹色巧遮山獨嫌清渭無情極照我塵埃鬢欲斑題張尚書復修姑蘇驛詩卷和子翬韻樓船載酒太湖秋曽向寒蕪弔舊邱圖畫如今傳勝事江山依舊記清遊館娃宫壞香消徑鬪鴨闌空水滿洲聞道徵黃飛詔下都將遺愛付吳謳送烏希説編修之會稽降香仙掖朝回響玉珂使星光照鏡湖波看君獻頌傳金馬記我臨書换白鵝風送蓬萊潮信早煙消天姥月明多相逢賀監如相問擬向滄波理釣蓑書事坐看槐庭日影移頭原如舊鬢先絲十年不調已過半萬古垂名何所為得俸只充沽酒用賣文那辦買山資傳聞官長催供課下馬時揩病眼眵和樂村書觸目淡淡春雲弄晚晴桃花竹外數枝明垂楊卧雨欲無賴幽鳥呼人如有情塵事膠膠遊興懶流年冉冉客心驚簡書縛我原來急不是歸田計未成送丑時中之西臺照磨故人别我入秦川開幕遙臨玉井蓮恩賜猩袍如昨日歸騎驄馬看他年路經函谷山多雨春盡新豐草自煙相見勾稽間北榻尺書時到廣文氊送宋翼卿西臺照磨寄丑時中管勾送子函關西復西青門柳老惜分擕雲深魏闕人回望路熟秦川馬自嘶攬轡定酬他日志拂塵間看去年題芙蓉幕下如相問擬向秋風釣故溪挽胡汲仲先生少日嚴徐召漢庭暮年孤節魯山清頽波砥柱文章古滄海浮雲富貴輕兜率空歸天上夢少微端惜世間名眇然人物知誰在淚灑西風慟老成先生英氣欲橫秋投老青山映白頭幾見詩書曽發冢誰知涇渭自分流詞源衮衮無遺恨天網恢恢不見收江漢遺書今好在雲間無復謫仙樓題史左丞小車行春圖左丞林壑魯西郊矗矗新亭自結茅几畔有書都可用世間無客不求交小車春晝遊麟藪修竹秋天養鳳巢我老只今多白髮願携琴酒過塘坳為劉子高賦少日東南事壯遊憑高弔古思悠悠山中樓觀神仙府江上雲霞帝子州别塢松風琴入奏平湖花雨棹聞謳只今投迹山房裏坐看新圖歎白頭為楊子立賦秋華亭上雨初晴山入溪南箇箇清笻竹客來松徑杳蹇驢人度石橋平當筵俠氣龍騰劒把酒清歌鸐載笙共羡君家好賓客畫圖詩句總高情和吕仲實過故宅射麋山下草先秋畫戟朱門一夢休故櫪西風思騕裊壞墻陰雨蔓牽牛曽聞為將無三世謾説承恩只五侯古往今來多少事夕陽不盡水東流書李敬叔别蒲城詩卷二首十載承明把一麾急流勇退脫塵羈蓴鱸亦預知機事松菊能忘歸隱期伊闕風煙應好在壺頭勳業竟何為漢庭屢詔求遺逸從此彈冠亦未遲紫髯如戟氣如虹肯使微官負此公一笑偶逢山水國論文誰信馬牛風相期要出功名外得意還留道義中朱轂風塵何足顧不妨留眼送飛鴻題傅汝礪上省掾凌伴明詩卷少年英氣鶚橫秋曽佐軺車作逺遊丹徼煙嵐明漢節彩毫珠玉散蠻州省郎待士能高誼才子論心肯暗投燕市黃金買竒駿未容歸倚仲宣樓題伊嚕布哈贈行詩卷銅章笑解出龍泉老稚歌謠一口傳可但鬻衣爭刻石仍聞遮道願留鞭何蕃素得諸公譽陳實終居四長先昭代掄材重循吏聲華從此到星躔題趙家墓碑雙碑峩立趙家墳不似靈光獨偶存承露盤空仙墮淚繫牲石在字堪捫桑田滄海餘喬木文采風流到逺孫見説家庭有餘地好隨春雨種蘭蓀題栖碧山卷何年李白去騎鯨流水漂香路杳𡨕自種紫芝分藥圃間乘白鹿看仙經石床花露朝來掃茅屋松風夜半聽老我京華塵土裏苦吟應笑鬢星星用吳間間韻題解辰公詩卷洲橫白鷺似金陵卓犖才名舉國稱滄海千年來野鶴玉壺一段貯清氷泮宫芹藻同誰賦快閣風煙與客登望見香城山似筆他時諸子看飛騰題張孝子詩卷武衛張生膽滿軀千重鐵騎視如無論功合上碧油幕破的爭傳金僕姑大漠窮沙歸戰馬高臺落日下馴烏人生忠孝能如此不愧山西大丈夫江閣秋風為表弟曽性道賦江上青山閣下鷗白雲飛去水悠悠長蘆落鴈來千里枯木寒鴉度幾秋曽見鎍飛餘古塔猶聞鐘響出高漚晴天縹眇涼如洗間把魚竿踏釣舟元日雪端門瑞霧曉氤氲片片天花落錦茵萬蓋鳴珂翔鶴氅九重傳鑰報雞人靈和柳色迷金縷太液波光皺麯塵待詔東方窮欲死還隨草木見陽春弔胡招故隱西風凛凛灑塵寰千古幽光不可攀往事空尋管寧傳故居誰弔陸渾山高情能致巢由上大節終全漢魏間一盞寒泉薦秋菊悠悠心送白雲間送馬編修南康州判萱草叢叢手自移留花不發待郎歸書成東觀藏金匱船過西江著綵衣酒釀鵝兒香稻熟鱠飛蟬翼白魚肥懸知佐郡多餘暇一笑承歡樂未違過金閣山金閣遙看縹眇居空香何處度飈車曽逢野鹿銜丹訣定叱山祗守素書白海波翻虹飲後青林風急雨飛初羣龍應解仙翁意要採新詩作步虛送濟南張太監奉祠歷山張侯奉幣傳天語乘傳祝釐虞帝祠從此百神聮職地一如比屋可封時國人先賦緇衣句太史還書封禪詞始信馨香在明德豐年協氣滿靈旗送廬州推官孟景章吏隱無如古合肥畫船南下疾鴻飛風煙入興詩成易魚稻常登訟自稀錯節會看逢利器軺車應為布霜威兒寬古義人知少見説新書待子歸和劉助教見示詩韻龍岡五月曉生寒喜見書囱日影團小草自憐承雨露野鷗何事逐鵷鸞愛間僧祐常多病投老揚雄強作官禪榻茶煙時一笑免教街吏報平安古寺秋日梨花簷蔔林中縞袂鮮西風吹夢賣餳天倚欄翠袖霜欺薄照水氷姿月妬妍魔女自知花作供徐娘猶解玉為鈿粉香零落蒼苔滿日暮驚回野衲禪七夕宿雲山寺三年埋沒簿書塵暫借禪房養病身貪夢蓴鱸歸故國不知牛女會天津蛛絲綴果空傳巧犢鼻懸竿未是貧讀罷楞嚴萬緣靜西軒月色為誰新追挽烈婦謝夫人金華婺宿儲貞烈浙右于今有幾人化石宛同星墮地投崖因見海揚塵姓名久著鄉邦重文字相傳簡帙新永念不移悲令子悼亡有感惜安仁陸渾早行有感歸心搖蕩若懸旌幾度欲歸歸不成地褊未堪長袖舞愁多空和短歌行沙頭春漲半篙緑竹外梅花數點明夢裏陸渾山下路何人知我此時情寄李時中津亭官樹葉黃時把酒船頭話别離待詔依然窮索米還家何事悔看棋空憐鬢髮驚秋早豈有文章結主知書到淮南又搖落定將佳句慰相思寄蘇昌齡别後瓊華幾度芳花前顧曲憶周郎竹西載酒金錢盡江上懷人碧草長給札期君賦雲夢解纓容我濯滄浪相思莫道無來使佇看飛鴻拂建章寄馬伯庸法星光裏見文星知向東南攬轡行十道使車瞻斧鉞六朝詞客樹降旌長干浪靜魚龍息北固霜飛草樹明千里相思難命駕夢隨潮到石頭城和薛翰林韻寄洛下諸公緑陰門巷鳥聲中却掃無人過敬通洛下笑談山繞座江南消息水連空舊遊如夢了無迹病客觀心漸有功欲向伊川買修竹風流他日與君同送劉遂初修撰覲省烏鵲檣竿送喜頻西風衰柳潞河津朱雲况肯留東閣汲黯何曽歎積薪國史新修多直筆朝衣暫脫見間身懸知别後登高處醉撚黃華憶故人登姥山二首路轉巔崖虎鼻峰上方日晏始聞鐘晴嵐密護岩西竹香霧輕浮澗底松山果欲凋還共采林僧久别乍相逢玩竒行遍燒丹處拾得仙人九節笻武婆山上白雲層每欲追遊祇未能昨日偶同子弟往幾時重與故人登借騎道士朝天鶴問訊仙姑駕海鵬共醉中山千日酒頭巾倒挂樹西藤出河南省考試院呈夷門故人圍棘重開字落鴉霜袍鵠立靜無譁城頭又見千年鶴海上空歸八月槎貪訪舊交多白髮不知故隱正黃花相逢可惜歡娛地不置清尊但煮茶送舒嚕萬户鎮雲南故人分閫鎮滇池不獨威名草木知南詔酋豪親俎豆西州父老識旌旗清猿夜永聞常慣丹鳳雲深望轉疑若過劒門關下驛拂塵尋我舊題詩試院柬顔仲偉胡居敬陳心吾解開先高允憲諸公薇垣試藝棘圍開參相求賢體聖裁班入禮門催下鎖令傳兵衛擬銜枚龍光貫斗星潛動海氣連城雨欲來蠡測管窺思報稱喜聞多士待掄材題胡氏柏友亭君家種柏長龍鱗歲晚相看似故人每愛棟梁才獨古亦憐金石韻長新囱前芳草春來好門外高車客過頻安得雲松高百尺結巢歸隱願為鄰􅊈陽縣􅊈陽縣門僅容駝􅊈陽縣廳垂緑莎春歸蜀道海棠盡地近隴山鸚鵡多飲澗居氓羞汝癭負鹽遊子和秦歌回看天際來時路萬疊嵐光海湧波幽居同劉韶賦春泥門巷雨聲多潤浹荒畦露淺莎石砌落梅疏影竹鑑池流水細通河坐深還愛青氊舊老至其如白髮何海內太平寧有象詩成聊復醉時歌猗氏道中道經猗氏望中條秀色浮空海上潮中有幽人甘隱遁每令行客想風標柴門石徑依然在松蓋雲旗不可招老我山林負真趣東風吹鬢影蕭蕭寄李伯強同年銅駝陌上又秋風醉把黃花意未窮塵土十年雙鬢禿關河千里一尊同恨君不識孔文舉笑我欲從張長公别後相思隔伊水石樓明月鴈聲中
