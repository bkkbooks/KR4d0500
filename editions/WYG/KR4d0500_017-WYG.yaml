body:
  text: 伊濱集卷十七元王沂撰序遊伊川亭詩引延祐之間余吏伊上暇日訪求先賢故蹟得伊川亭遺址於郡治之東山曰司諫許公道真之所遊止者元裕之中州集云也方公之謝事而歸而常相羊肆恣以悅其意於山水之間而一時遊且宦於是邦者為斯亭以遂其樂此古迹盖信然也不知亭幾時廢獨斷碑立草棘間為之喟然太息圖復其舊居無幾余去官不果明年春三月與二三子履訪其地攀援而登掃花席草酌酒相勞捫碑讀之悵然至於日入相顧而嘆曰許公逡巡當世進則效其忠退則全其樂可謂自信特立也已想其杖履於兹也負崖之軒凌虚之檻賢豪魁傑日相徃來登臨眺望之樂山川雲物之勝既以自適其適而歌呼起舞上下角逐爭相後先者亦有以同其適也豈非盛哉百年之後化為荒墟霜露荆榛之所䝉翳狐虺猩鼯之所遊蟠薪人牧子之所歌嘯而躑躅興懐之變又何其悲也然自前世無不皆若此而迹許公之詩以傳後而俾後人低徊俯仰者則不在於斯亭之存亡也二三子咸賦詩以紀其事而余為之序菊莊詩序菊當秋髙露凝始華故其氣也芳烈華黄故其色也正采擷暴燥為藥劑滌而肝昏瞀藴熱故其味也苦神農書載其功輕身延年故飲潭水者恒得上壽屈原離騷録與橘桂芝蘭蕙茞為伍故以比君子忠貞潔白有特操者近時業藝植者灌溉培養接根剥芽益盡心力而花豐碩妍麗色朱紫碧緑縞緗元黝斑駁間雜變化至數百種色香味非復菊矣於神農所書大不侔於離騷所比忠貞潔白有特操者又何其寥絶也雖然荒山野水之濱風霜所偃薄草蕚所埋翳豈無忠貞潔白有特操者歟又豈無飲其水而壽者歟東蒲張鵬翼藝菊滿家名曰菊莊同里之士孫隆平求余書鵬翼於菊將如神農書屈原經所謂歟抑將變化百出以娯悅世人之心目歟余故序以問之送劉掌儀序古之人何其安於禮也其在宗廟朝廷籩豆簠簋牛羊酒醴之薦交於堂上而天子諸侯大夫卿士周旋揖讓獻酬百拜其煩且勞如是宜其交錯紛亂也然樂作於下而禮行於上雍容和穆終日而不亂可不謂難哉盖其家有塾黨有庠術有序國有學校有司習之有素閑之有具於衣冠飲食有其度於言動視聽有其容其安之者勢固然也去古既逺三代禮樂之名雖存然其說之不可求其制之不可考由其用之者非其素所習也亦其勢然哉今也俾民得以見先王之禮者學校釋奠而已而國者又天下之所觀也非習之有素閑之有具而欲其周旋中節也難矣哉此掌儀所以設也凡春秋二仲布儀物肄樂舞犠象籩斚之列興俛折旋之容弟子員鴈行立惟掌儀是聽冠帯搢紳之人圜橋門而觀者惟掌儀是聽其於禮非服習而安之者若是然乎初劉任時以經術行誼為諸生所推補焉未幾服方領習矩步者靡然嚮風曰是習於禮者也祭酒司業既已名聞矣將擢郡博士任時安於此有不安於彼哉雖然儀者禮之文也持其心養其性者禮之本也子既習其文盍亦求其本若然則異日為公卿大夫一於是而已獨郡博士乎哉節婦胡母詩序濟寧胡士元來請曰吾祖母氏張年十有八歸我大父大父不幸蚤世祖母時年二十六家故貧舅姑春秋髙吾先子兄弟尚㓜祖母獨任家政繕塋塜嚴饋祀供徭賦躬勞苦隨先後緩急為撙節以保有我家事舅姑能盡其孝教養諸孤俾男有立女有歸縷積粒儲至有田以食有廬以居方其憂戚窮匱人以為難處而未嘗亂其志及其老而嵗時慶賀子婦諸孫詵詵在列里舍榮之而其自處彌約年八十四臨終顧謂諸子曰吾保助汝家振於既墜至是無憾矣郡二千石上其行於朝表且復又曰初吾家青州之濟河天兵墟金先世昆弟四人以節死獨吾曽大父以垂髫免祖母之烈既昭於世而吾先世竟泯泯矣先生其為我書余曰婦教廢久矣若夫人之賢雖出於天性亦子之先教行於其家也曽祖諱成祖諱立立子三人曰徳曰義曰慶義生士元士元以經術侍帷幄嶷嶷有聲其祉所施在是大夫士知其事者咸歌咏之而請余書其端元統三年三月二十日襄隂王沂書於國子學之西齋馬節婦序晉馬氏年十五適同里王懋卿時舅没姑老既而喪其夫抱在髫之孤馬氏鬻父母遺笄髲間物以營窀穸羞甘鮮伺顔色以養其姑不足則又縷絮緝絁以佐其闕家素寒也撫之至於有立有歸今春秋七十有司上其行表其門矣歌曰壯士在險身或辱婦也秉義潔冰玉挽笄解髢化拱木粒聚絲蓄佐不足山樞蟋蟀固晉風婦也髙節烈士同自奮單弱保厥宗牲不掩豆祠春冬婉也有歸童冠巾疇濟登兹智且仁懐清有臺髙華嵩名與汾水流無窮李仁妻貞節婦詩序婦人名不出壼其以貞節稱者當哀其不幸而體其不得已今既表其閭又從而詠歌之無乃放於文而没春秋之義歟抑於可哀之中又有可勸戒者歟亦為子若孫欲顯揚親之志篤而託於辭以求不朽歟故代之東鹿軍有李仁者配王氏仁早卒王年廿九孤顯祖甫髫也克自振單弱不亂其志緝絁縷絮勤以自給年六十三當天厯二年州里上其行旌表矣其所謂可勸戒者歟婦教廢久矣若王之節出於天性是可謂賢也已此余所以書而大夫士所以詩也歟節婦陳氏詩序宋社懸墟襄陽以蕞爾之地北抗天戈士有效死前驅者曰襄邑郭某其妻陳氏年甫二十六子生九月矣飲泣設祭想魂乎千里之外自振單弱保有其家以成其子以不亂其志享年七十五以殁孫有名元益者因國學生同郡李文求余書是家夫效忠婦持節其於死生之義盡矣當用兵襄漢時士之自奮行陣以樹勲業者相接踵也郭之殁雖無表於世其妻能若是必有過人者矣今元益兄弟五人以謹厚稱里中天之施與善人何如哉柏舟詩於鄘國殤歌於楚士大夫動以三百篇歌為法可㣲以繼其聲耶是為序節婦劉氏詩序豐州民于國寳其名于妻氏劉既孝且貞于既早世身嫠子嬰姑老失子啼不成聲勢有孔棘義不得寧自振單弱守節如城脫笄解髢若涕涶輕縷絮緝絁以經以營以祠春秋豆不掩牲其姑以養其宗以承服難體順惟日兢兢老肆而安㓜强以成二千石吏聞於朝廷嘉其節行既復既旌壯士在險身或侵陵婦也秉義玉剛冰清詩以歌之式揚其馨走也作序抽思非精趙節婦詩序國子伴讀趙守義請曰初祖母魏氏之歸我先大父也逮事舅姑惇行孝謹宜於我家大父仕江南不幸卒官時先子尚㓜祖母年未三十抱嬰扶喪觸風波瘴霧之毒冐貙虺蛟鰐之險歸止舊舍繕塋塜誨勵諸孤已而親戚憐其早寡或以改適間之輙怫然曰人而獸行耶居久之舅姑繼没攟摭經營乃畢大事納我諸孫於儒今守義又得綴弟子員其可忘其所自耶先生其為序將求大夫士詠歌之余謂婦職壼行尚柔乃今趙母扶㣲捄阨振壊而興老者待以安㓜者恃以立没者賴以歸盖其明智過人材又足以立事故始終能成其家而不以流寄囏阨少易其意學士大夫有難能者也易曰坤至柔而動也剛趙母以之是不可無傳也節婦孫氏序節婦孫氏事嘉於陳文靖公而筆於余友何君巨源之文其所傳必不妄婦以節行旌非古也先王之治自内始而化行於江漢汝墳之間其有執節不二庸何顯世敝俗偷情勝理欲奪義其能以節名者不有以章之則奚以振頽靡昭貞烈也孫居顛頓囏阨之中而能不亂其志奮勵經理絲蓄粒聚以續烝嘗事老以安怙㓜以立義徇良人力保謝宗化行姒婦張亦守義弗奪有烈如此其顯揚也固宜然則人盡所天忍恥再醮者聞孫氏之風能無愧於心乎任安之孝行詩序冀之武邑有篤行君子曰任君者世長左都威衛百夫少孤致孝扵其母定省以候晨夕温凊以節寒暑甘㫖以供口體敬恭以伺色言既䘮不飲酒食肉哀摧杖始能興廬於墓三年除䘮事其兄甚篤凛乎若嚴師莅側既喪廬其墓三月言必戚哭必哀一以禮為師既退老於家年九十餘而飲食倍人儀狀甚偉進拜于前者不知其已老而子國璞以謹厚自將世其職國英以力學自奮植其家諸孫詵詵樽席之側以承以翼以佚其老宗工秀人賦以誦之其從游諸生王居貞為余言如此余未及識君觀君之孝於親者可以知其恭觀君之事於兄者可以知其厚迹其恭且厚可以知其夀考於身流澤於後天之報施善人何如哉是不可無傳也君名惠字安之官忠顯校尉兄潤之政之享年亦九十云丁伯堂孝行序伯堂者完州人也早喪母父繼良貧不自振以伯堂嗣同郡馬敦謙已而敦謙妻物故女利其家貲謀之壻勸父俾勿娶伯堂得其情迺為敦謙繼室已而有子且立矣而敦謙卒伯堂既營葬哀毁骨立或人以其非馬氏子間之伯堂供子職自若也先是其父繼良徙家河間繼室劉生子一曰仲謙劉殁繼室趙生子二人繼良垂殁顧言仲謙曰汝兄嗣馬氏存殁未可知汝其為我求焉即死弗憾至順間伯堂客京師遇仲謙言其父命如此乃相號泣遂歸丁氏之河間拜父墓問二弟安在仲謙告以嵗大祲鬻於鉅室髙氏矣乃訴於官捐貲贖歸竟同㸑焉王先生曰俗之壊久矣大夫士於其厚或薄如君之所存盖人之所易到而余次第之者盖有警也送蹇生序襄陽蹇敬之年十三而喪其父事母以孝聞後四十年而母殁敬之水漿不入口三日躬自陶甓而墳之且謂其友曰親之存也竭吾力既殁而遂怠焉是死吾親也吾廬吾親墓側庶乎吾心安焉國子生脫寅為余言如此余為之嘆曰冬温而夏凊昏定而晨省子之職也而未可以言孝愉色而婉容承顔而順志可以言孝而未可以言至必也事死如事生事亡如事存而後曰孝之至也敬之有焉余嘗慕申屠子龍周磐楊炎之為人以為世不多見而敬之孝行如此使充之以學問則其所就可涯也哉孝行叔方序孝行叔方任縣民事母孝母嘗患目疾巫醫皆無功叔方焚楮設誓旦暮禱於天十年不懈忽一日平復如初鄉閭以為孝感致然余聞天之髙也地之廣漠也鬼神之不可知也人能感動之者誠而已故曰孝弟之至通於神明叔方知此道使終之不惓則其為孝當何如也說克哷穆騰字說監深州郡克哷穆騰西域人世居什納什勒國唐初西域主阿喇愈氏始用其國言撰字修書以教其人以故能通者皆命爵賜姓以褒寵之克哷穆騰之先有能通其書與字者故因其地而賜姓什納什勒國初天戈西指其四世祖某以技藝得故徙中原占籍趙之中山監郡君與其弟舍克布問名與字於余史稱漢使通西域采玊石以歸然則玉故西方之物也而周官書玊人之事用之於廟祀致命於諸侯或以覜聘或以治兵夫祭祀聘問征伐皆國之大事也其器必以玉盖物之備五常者惟玉為然故君子貴之也而況什納什勒氏為西域之鉅族則必知玉之所以為貴矣監郡君故余名曰瓚詩曰瑟彼玉瓚黄流在中夫必至寳之器而後能受至精之物字之曰清之名舎克布曰璋詩曰奉璋峩峩髦士攸宜夫執玉髙卑容之俯仰君子常以言休咎矣是可不敬乎故字之曰敬之夫思其名之貴則知其所以自貴思其字之美則知所以全其美惟其曰貴曰美則知所以自修矣傅亨字說余觀子産晏子之論禮曰禮之以為國與天地並又曰禮為天地之經而民實則之何其言之相似也而荀卿乃曰性偽於禮義猶器偽於埏埴木偽於斵削擬之二子又何醇疵之不侔也又曰無埏埴而後土安於土無斵削而後木安於木無禮義而後人安於性彼其意欲滅禮而存性也禮亡奚以論性土柔於金而冶不能銷冰脆於木而工不能斵性之所無有者聖人能以偽為哉無埏埴則不如無土無斵削則不如無木無禮義則不如無人以為無之而後安者是無人而後可也二子之在春秋先王之澤未熄其言之醇固宜若荀卿之言陋矣所謂道廢士之為横議者衆歟雖然禮之本非天地不因禮之文非聖人不備故曰動容周旋中禮盛德之至也國學生灤京傅亨為字曰禮卿取易所謂亨者嘉之㑹嘉㑹足以合禮者也生於經術明易其儀容合於禮其文辭粹澤合繩尺嘗充上京鄉貢士將用於時矣故余告以始於天而成於人老子産晏子之言可法荀卿之言可戒也哉薛生字說楚人有二璧其徑相若也其色澤相若也而一者千金一者五百金或問曰徑與色澤相若而價倍何也對曰其一側而視之厚兼寸是以價千金夫物薄而能久者未之有也洛人浙省左轄薛公之猶子理問字於余余謂凡物莫不有理而理之義重玉非以其縝而栗温而澤歟斯君子之所以比徳也夫縝而栗温而澤理之至也然其貴必以厚斯君子之所以躬自厚也歟故字曰子厚理也勉之處則為和氏之璞出則為王者之器無俾人曰是石之衒夫玉者也吕元禄字說三王之盛教化既成士皆世其道徳畢命之言非謂其盛時也將教法既壊而然亦膏粱之性難正也欒伯論公族大夫使惇惠者教之文敏者道之果敢者諗之鎮靜者修之夫豈有不由禮者哉況於三王之教耶門䕃之徳裕視進士之牛相孰賢先儒亦嘗言之矣元禄勉之沃哷允常字說海於天地間不獨有所納抑亦有所施也人徒見其滔滔百川靡晝夜而東注自古至今不見其盈溢而不知其氣之騰乎上也蒸而潤者謂之露嘘而霈者謂之雨飛而結者謂之霜雪雨露之生成霜雪之收藏而澤之被乎物者廣矣故曰不獨有所納抑亦有所施也其納也無窮其施也亦無窮可不謂有常乎人之為學也亦然虚其心以集衆善推其仁以及萬物其體也無窮其用也亦無窮非有常者能之乎沃哷袐書問其名與字義於翰林供奉陳君衆仲而學士歐陽圭齋又廣其說而重請於沂昔人謂從欒伯之言可以滋從范叔之教可以大余復何言雖然虚其心以集善推其仁以及物者亦在懋之而已徐完字說浮光徐君復初名其子完完甫冠請字於王沂沂曰天生斯人五性具焉萬善備焉曷嘗有不完者哉由其禀或乖於純秀之㑹情或汨於嗜欲之偏放之不求邪之不伐於是本之完者有時而虧矣古之人知其然閑之有具養之有素是以其完者益完及其徳之成也盎然其盈溢沃然其光明巋乎其髙浩乎其深盖有言語不足以形容者其美豈不至矣哉沂字之曰仲美夫美非自外至也與之者天充之者人充之則於天之所予者無負傳曰飽乎仁義所以不願人之膏粱之味也令聞廣譽施於身所以不願人之文繡也故曰美非自外至也完惇慤淳靖而力學問吾知有以成其美矣尚懋之哉劉瑛字說學者劉瑛始字廷玉其游賀伯更謂瑞應圖載玉瑛為寳不斵而成五常並修則見史書漢文帝幸雍郊祠五帝新垣平說立渭陽五廟當有玉瑛出請易之曰廷修余謂方士怪迂之言儒者所不道而周官書玉人之事貴而純焉賤而駁焉用之於廟祀焉致命於諸侯焉然其温潤而栗理則皆玉也其制則皆琢磨而成也而瑛獨曰天成亦猶金有馬碧有雞也耶河出圖天地有自然之象洛出書天地有自然之理物之自然而成形其為瑞也固宜夫祭祀聘問征伐國之大事也其器必用玉豈以其物之備五常者惟玉為然故君子貴之也而况不斵而成者耶夫物猶以備徳為貴而况人乎子也思其名之貴則知所以自貴思其字之美則知所以全其美思其曰貴曰美則知所以自修知所以自修則其瑞世也宜哉
