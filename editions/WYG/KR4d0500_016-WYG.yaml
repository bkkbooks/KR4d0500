body:
  text: 伊濱集卷十六元王沂撰序贈伊埓布哈序古之為教何其異乎今也其為學也亦然舜使契為司徒教以人倫父子有親君臣有義夫婦有别長㓜有序朋友有信而夫子教顔淵曰克己復禮為仁非禮勿視非禮勿聽非禮勿言非禮勿動是皆先立其本者也今之挈挈乎詁訓文辭之末者能若此乎工師之為厦屋其於基必廣以固而後委羣材會衆工度髙深圓方短長之宜而礱斵焉而結構焉而黝堊焉而斧藻焉苟狹而不廣圮而不固則棟橈是懼何帡幪為古之為學亦然大本既立而後别理欲分義利殊公私善惡學以聚之問以辨之寛以居之仁以行之由是致廣大而盡精微極髙明而道中庸由是而位天地而育萬物今之逐逐然施丹漆於糞朽者能若此乎其為教也如此其為學也又如此人才之不古若也宜余為此歎久矣奈之何徳㣲官薄而言不信於人也國子生伊埓布哈由分積優升貢於有司求余言以為鄉榮余懼其狃於小成汨於今學故告之以此詩不云乎天生蒸民有物有則知有物而不知則雖曰已學吾不謂之學也已生無疑於斯言杏林詩序漢仙人董奉為人治病法多神驗病愈者謝金帛之饋植杏為報嵗久蔚然成林古所謂人貌而天者仙之謂也余聞醫有相道焉弱者恃以强脆者恃以堅危者恃以安而夭者恃以耆俾服冕搢笏于堂廡之上皆若而人則良醫良相之說不誣矣揚子雲言聖人不師仙厥術異也余謂呉季札魯仲連安期生皆古之至人得道而不死者其誼又曷可少哉俾子雲而知此庸詎悔其少作雖法言不作可也合淝蔚章父世為醫名其居曰杏林揭藝文為大書以表之章父子子陽尤精其技古之由技而進於道如葛稚川陶𢎞景孫思邈之流皆為列仙獨君異乎哉傳曰仁者夀章父父子朂之而已宗工秀人咸詩以美之而沂為之引元統三年十月十日襄隂王沂書于國學之崇術齋潞城元材卿壽八十詩序上黨古晉地詩唐風言晉本唐之俗其民被堯之徳化勤生以儉嗇樸厚而純固以之治生則殖其家以之養生則遐其夀最得古之遺風國子生郭徳恒潞人也為余言里之望元材卿者其少也于田畝能盡力樹藝於物能操其竒贏既起貲益折節為儉既老不肯少懈既致蓄藏能竭勞振乏紓逋已責以徳其里以教其子若孫年至於八十尚能書細字儀狀甚偉聲音滿室拜於前者不知其已老也余謂雖誠一之所致天之所施與亦其風土之厚信若詩之所謂也詩去今餘千載矣士大夫歌蟋蟀山樞葛生之篇慨然有思深哉之歎況見其人歟從而賦之以表陶唐氏之遺民以俟如呉公子札者觀隱軒詩序言出而為詩原於人情之真聲發而為歌本於土風之素方其未有詩與歌也豈無言若聲哉尚而擊壤康衢之謡降而越棹謳楚舂相情有感發流自性真又若遼交凉薊生而殊言青越函胡聲亦各異於是有唐儉魏陿衛靡鄭滛盖有得於天地之自然莫之為而為之者矣余嘗怪世之宗唐詩者陋中州是盖不知一代之文有一代之體猶大而忠質文之異尚小而鹹酸之殊嗜夫以一已之好惡而欲人之我同惑矣三百篇以降由楚漢迄唐宋金二千餘年作者盖盡心極力而追之然卒莫與之並詩豈易言哉太原李君文美早從遺山元先生遊其為詩與樂歌質不近俚華不至浮婉約而達敷暢而則甚有似乎遺山也既没之年其里之士相與集其遺文為如干卷曰隱軒集以傳於世隱軒其自號也國子伴讀康某來求余引余故推其淵源所自而書且俾學者知學之必有師法也如此是為序太微詩序音之數不過五而五音之變不可勝聽也味之和不過五而五味之化不可勝嘗也色之數不過五而五色之變不可勝觀也故音者宫立而五音形矣味者甘立而五味停矣色者白立而五色成矣道者一立而萬物生矣一也者其道之本歟及其至也視之而不見其形聽之而不聞其聲循之而不得其身無形而有形生焉無聲而五音鳴焉無味而五味形焉無色而五色成焉其全也純兮若樸其散也混兮若濁濁而徐清冲而徐盈澹兮其若深淵汎兮其若浮雲若無而有若亡而存噫其亦㣲矣哉雖然孿子之相似者唯其母能知之玉石之相類者唯良工能識之道之㣲者唯聖人能論之顧余之陋烏足以言㣲哉滹陽章元傑早為黄冠師入茅山事劉宗師弟子王集虚嘉其信道之確也授以杖笠曰是他日能昌吾教者已而果然㕘政中書許公為書太㣲二字以扁其居而元傑問其說於余故以是告之熊石心詩序至元二年秋九月沂望屬車之塵於龍虎臺過昌平㑹熊石心教授袖詩見示且出翰林待制揭公曼石銘其先之辭知其為豫章人也與之過劉諫議祠望西山酌石泉捫古碑而讀之留三日而别明年夏五月石心携其稿如干卷過余京師客舍求書其端觀之則知其單遊逺寓憂嘆愉樂之情必發之於詩載大江過洞庭轉彭蠡魚龍之宫羆虎之聚風雨明晦寒燠之變一發於詩過陳蔡梁宋趙代之故墟覽山川之形勝風土之媺惡民俗之澆淳又發於詩觀光上京仰宫闕之壯麗人物之繁庶其接乎耳目者紛然層出而心之所屬者又一於詩而發也士生文軌混同之時不能遐觀逺覽以見於文辭而懐居養安以没者獨何人哉石心之詩翰林供奉黄君子肅稱其不雕刻為工故其語質無憔悴之態故其氣平惟其語質而氣平故真而不襍余謂言出而為詩一原於人情之真聲發而為歌皆本於土風之素此盖有得於天地之自然莫之為而為之者古之作者皆是也所謂真而不雜者有味乎其言也哉是為序曹大榮詩序大同之豐州居民曹大榮家本農也以儒術飾其躬以孝友篤其行父晚病風大榮時寒燠奉甘毳視藥物之良者而敬進之積十年未嘗一解顔而笑夜則禮北斗乞以身代父父既没治䘮一尊朱氏禮兄大舉早世三子甫髫也教育之猶已子其族姻里閈乏絶者給之負債不能償者已之其行若此鄉人合辭列於州大榮固謝曰是人之常而欲揚名於世耶余友祖輔卿為余言如此輔卿不妄人也故余道大榮之事不疑吾先世家襄山之隂金季遷徙南北大同吾土也聞其山川之形勝風俗之醇古固已翹翹褰裳奮懐欲訪其遺老問里之社與先曽大夫之故居及聞大榮之行誼則又銳欲連墻而居共井而飲幅巾杖履相徃來也昔隴西恥李陵之降而祈縣名王烈之鄉詩不云乎維桑與梓必恭敬止余為之書孰曰不宜東溪詩序抗思於埃􅅽之外娯意於清泠之濵樂漁釣而甘蔬鱻此士之髙舉深遯者也今楊君俊卿將家子職軍旅自號東溪豈真有慕於髙舉深遯者耶抑其厭豪侈之習而思洗濯於山水間耶其友京學提舉鮑君仲華為余言俊卿致孝於親信於友温密以禔身恭慤以勤職而無絶俗離世之想其為詩紆餘不迫而無憤鬱不平之氣其所以號必有以余聞而笑曰今夫韶夏濩武之作衆人聴之或以不知而不愛或一心以謂有鴻鵠至將繳而射之雖近而不聞故溪山泉石之美未嘗無有也惟好之故樂之惟樂之故名之今巧宦善富震世埓國者勤其身以營一世不知饑之食渴之飲其於山水之樂何有澄瀾鏡波摇曵蕩磨鳬汀鶴渚間錯烟樹立芰圓葭揚芳吐華釣磯蘆艇出没掩映千態萬狀心移神曠鷗鷺相狎風月相答當此之時不知世間孰貴而孰賤孰失而孰得也君自號之意有在矣仲華笑曰然子其為之書以求宗工秀人詠歌之俊卿與仲華同里同年學同師今由滁州萬户府鎮撫移鎮無為州云王氏夀八十詩序諸生張震請曰震祖母氏王理家有儀矩身處其勞而佚子於學臨諸婦甚嚴凛凛如奉槃水猶莫能當其意於内外姻屬承趨賓接無一間言閨門千指無敢私烹炊者用是震等得綴弟子員今祖母年八十二内外親伏臘燕聚長少訢訢就列舉酒為夀皤然危坐訓其子若孫皆持身之大節鄉先生之評賢母者皆曰吾祖母而聖朝詔賜髙年帛吾祖母必在其間先生其筆之以求大夫士咏歌以祝夀考益昌延於無期也余嘉其情而為之書城西小隱圖詩序去都門而西羣山蒼翠叢出岡嶺起伏峯巒蔓延炊烟林霏變滅異態過者莫不躊躇相羊而喜翛然不能去夫豈既饜於塵埃車馬之煩囂而欣得於山林登覽之樂而人意物境若與之期者此城西小隱之所以為勝隂君彦暉之所名而好事者之所以圖大夫士之所以咏歌也士蹈其義者鮮矣逐逐然印組為務者狃於利而不知返隣猿􅎜之居厠麋鹿之遊者安於故而不肯出二者皆非義也隂君出則跬步乎市朝處則俯仰乎山林無留禄之譏無絶俗之弊豈所謂無出而陽無入而藏柴立乎其中央者耶如在堂詩序沛國師君具瞻準程氏式為木主祀曽祖以下倣朱氏儀為祠同室異龕以奉享嘗署曰如在國子助教陳君繹曽既為之記且求大夫士為之詩請沂序其端昔有學祠於宋子車者子車曰禮樂之節牲幣之數我何敢愛然祠之所貴者誠因春氣之來而怵愓焉因秋氣之徃而悽愴焉祭之日僾然肅然如見所祭則誠之所修在子乎在我乎誠者其存亡形而屬荒絶乎噫一氣之所感通何如哉是未易以有無論也傳曰致愛則存致慤則著顧在已者耳雖然君子生則敬養死則敬享思終身弗辱也詩云明發不寐有懐二人諸公之為師君詠言者其在斯歟鮑仲華詩序詩造於平淡非工之至不能也昔之業是者齒壯氣盛挾其英銳其探逺取絢爛為綺繡明㓗為珠璧髙之為顛崖峭壑浩乎為長江巨河引而躍之為驤龍舞鳯及其年至而功積華斂而實食嚮之英且銳刮落則平淡可造矣是盖功力之至而然不以血氣盛衰而言也苟㣲志以基之㣲學以成之恃夫才驅氣駕則嵗邁月逝顛秃齒缺其見於言辭者若寒蛩之聲槁椔之色且求與盛年比不可得尚何平淡之敢言噫獨詩乎哉滁上鮑君仲華早以詩名諸公問翰林學士袁公伯長稱其言完氣平不刻削以為工而合乎理之正有得乎歐陽氏者如此其知言哉而仲華欿然不以其能自足晚而肆志琅琊山水間以寫其懐以昌其詩而庶幾所謂平淡者故其自序亦屬意韋應物陶淵明余慨夫五言之道近世幾絶仲華獨知所希慕此其志何如哉其功力所至盖將與滁之山水俱傳故述其所以然者書其編端文實老人者仲華自號云靳母王氏詩序始余居虎林聞於潛縣大夫靳君汝弼聲名公既没而縣人思之至順間余遊京師史舘楊君士傑為余言其里母王氏仁厚莊靜能讀論語孝經曹大家書劉向列女傳始於為女中於為婦終於為母皆盡其道問其夫則於潛靳大夫余於是嘆於潛之為理亦其妻有以相之也初於潛之没王氏於羈旅囏阨中教養二子徳固徳潤皆為成材能世其先人余又嘆王氏不獨相其夫又能成其子可謂賢也已今年八十五耳目聰明秀眉華髪子婦諸孫詵詵在列其夀盖未艾也夫壽所謂五福徳者福之基也惟王氏有之余觀古后妃至於諸侯大夫之妻内修法度輔佐其夫而兎罝之人江漢汝墳之婦女皆承其化篤於禮而詩人歌之若王氏之善宜歌於風而被之於無窮故余為之書戴孝子詩序漣水戴子玉蚤以孝聞既喪母慕劉師貞作像以事之朝夕反告羞甘鮮奉匕箸如常所以存亡形致隆敬也大夫士咸咏言以表其行因李敬叔請予序讀其詩則參議中書許可用翰林待制劉時中奎文學士李溉之之筆參焉同年也同舘也吾知其不妄以詩與人者敬叔又與余言子玉恂恂蹈規矩其衛身也肅括其為吏也謹文法其教子也儉以嚴其視族人也愛以均得耳目者如此是可謂能子矣嗚呼孝非一家之行也始于一鄉推之無逺邇而化表於金石示之後世而勸其效有如此者使子玉持此心久而愈篤則不獨化及夫人而天錫瑞物神見祕祉將見其園廬丘隴之間甘露醴泉三秀之珍叢生而湧出駢枝連理之植蓊然而交䕃而白烏馴兎之翔集其間也余備員史舘當書之以彰聖代政治之純而俗化之厚宣延風美觀示將來子玉朂之毋俾觀人審其作輟而已也孟母慶夀詩序蘭陽居民孟母以絲蓄粒聚大其家以訓誨不倦成其子年八十四蒼顛秀眉耳目聰明子婦諸孫詵詵在列搢紳先生為誦歌之其孫文式請余序余觀詩人之歌其后妃至於諸侯大夫之妻内修法度輔佐君子則見於闗雎葛覃卷耳樛木之詩而其效之見始於子孫之盛故次以螽斯延及于男女之及時故次以桃夭其化之所被者逺則見於兎罝之人江漢汝墳之婦女鵲巢采繁言其徳其職也草蟲采蘋言其禮其法也夫婦之懐思者不失其義則見於殷其靁之詩男女之嫁娶者不失其時則見于摽有梅之詩上不忌而下自恭則見於小星之詩下不怨而上自悔則見於有汜之詩又若泉水載馳賦歸寧也柏舟凱風賦寡居也緑衣終風日月竹竿之怨也雄雉擊鼓伯兮之思也碩人之言容飾之盛至矣備矣而詩壽考者無聞焉將治化隆洽而壽亦修短不同人道之常耶迺今洋洋誦歌若是豈其子之心顯揚其親者切而求之篤耶抑升堂以介望夫彤管之儀者將同是樂而不知其言之不足耶亦履霜踐露䀌然有以悲感而形於嘆羡也耶雖然漢制長吏存問髙年嵗時致帛絮牛酒初不間於男女聖世有賜帛之令猶其遺意也然則誦歌者可不知其所自也耶綵衣亭詩序余嘗過成臯之墟覽山川形勝弔楚漢之遺迹彷彿臨望意其民俗剽悍上氣力少禮文也今熊生樞貞確端懿氣象甚茂研精經術不告劬勩是以知王教誠中和之所致古所謂風俗與化移易信矣樞因余友集賢修撰同初請曰樞之曽大父别駕字繼先以孝聞鄉里名堂曰綵衣宗工秀人咸為歌詩今樞居之輪奐日以葺草樹日以茂英辭妙畫未泯泯也而吾大父之音容日逺矣泫然不知涕之流落也先生其為我序之余聞其言又以知生賢固世教所奬成亦其教行於家者使然也余生也後不與而祖接觀其名堂其孝於親可知觀子之承徳襲訓其澤於後者又可知此大夫士之所以咏歌也蕭東崖詩序東陽故為文學郡縣沈隱侯賦八詠而詩人騷客角立傑出禹錫謂教得邦人解吟詠非虚言也蕭君蘭坡於詩險不入怪巧不近浮行雲流水姿態横出其得於隱侯為多建安中徐陳應劉馳騁於一時識者謂兩京餘澤猶十七尚存自後文體屢變工而愈下麗而益靡庶幾古道者惟隱侯耳蘭坡詩律斂情約性因狹出竒吾所謂有得於隱侯者其子和之欲板以傳世求余書其端余舊聞東陽佳山水欲登八詠樓訪黄初平之遺迹弔唐悦齋吕東萊陳同父學術之同異未暇也今讀蘭坡詩歴歴在吾目中矣奚必賦逺遊哉盧祥伯挽詩序古之人有功徳材行志義之美者其子若孫懼後世之不知既銘而掩諸幽又揭於道其與遊者則又感疇昔之好聲以寄其哀若田横之客歌薤露蒿里後世則又與其功徳材行志義之美而發揮之若杜子美之賦八哀今之為人子孫者徃徃請諸人為之盖其褒揚親之心也切而然亦詩之感人也深有不待夫金石而後傳者昔阮思曠有飾車人欲以葬而難之思曠曰車而使人憚借何以為也遂焚之工詩者心乎思曠寧忍拒而莫之與耶江右處士盧祥伯殁其子順孫璹孫既葬曽君傳道狀其行實云盖隱遯而非自潔者余因推而序之其亦思曠之心也哉
