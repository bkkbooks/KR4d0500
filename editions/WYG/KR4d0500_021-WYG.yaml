body:
  text: 伊濵集卷二十一元王沂撰記芳潤堂記懐玉山之陽有溪其流清瑩秀澈橋横焉若鰲負虹飲故其地名曰梁川背山而面溪有屋數十楹則廣信鄭伯飛燕居之堂名曰芳潤取機文賦語也堂之前有池池有亭曰若舟取易乘木舟虛也據堂之左有樓曰覽輝取賈生所賦鳳凰覽德輝而下也伯飛田有秔稌之入居有山水之樂賔婚燕祭之具可給也仰有蒼翠風雲之變化可挹薪翁逸人之廬可指數也俯有清淺渚蓮汀芷之芬芳可擷文鱗縞羽之潜泳可緡而弋也䕃有長杉藉有豐草抗埃􅅽之外窮耳目之盛此伯飛有以遂其樂也伯飛因其游任丞良臣以圖屬余記余謂文以載道也王迹熄六藝闕世之纉辭者涉其流不探其源摭其英不食其實雖敦腴鮮縟馨香可愛求其根柢濟用則蔑如也文不適用奚以文為易之象扵履險必曰涉川舟以濟險也古之人若賈誼陸贄以文立法制削强悍其扵用猶舟之濟險也然士之以文華其身而為世用者徃徃蹈悔冒耻而不知止若鳳鳥者其隱見以道故君子取焉予與伯飛非素交也觀其堂可以知其學扵文觀其亭可以知其志扵用觀其樓可以知其審扵出處矣若夫登臨覽觀之樂與風物之美予歸隱江南尚能為伯飛賦之為范慶元芳潤堂記昔人論作文之法曰長袖善舞多財善賈生取古人書劇讀而精思之浩乎其川流薰乎其蘭馥研索日以富則陸機所謂潄六藝之芳潤者可言矣雖然辭章之靡麗者易工而義理之精微者難究其益思所以務學乎致飾語言不若養其氣求工筆劄莫若勵扵學氣完而學淬則雖崇德廣業亦自此進况其外之文乎文者技之末也河汾王氏嘗以定君子小人之分矣生可不知所擇哉范慶元問名堂之義故書此以告之崔府君廟新垣記須城有祠巋然宅扵北郭之阜曰崔府君廟闔境有禱輙應如響民事之謹廟建扵國初殿宇中峙丹碧炳煥而崇墉缺焉負販者得以憇芻牧者得以㳺曾不若折桞以樊吾圃也噫瀆甚矣䖍奚以揭靈奚以妥哉故贈鄆城縣大夫王君汝楫懼焉廼垣以繚之伐石命工皆已貲出既成而緻宻堅整截然矗然稱神之居過者加肅非祈謝潔齋而來者不敢入其知所嚴奉者哉維神生著令猷殁司幽府靈實烜赫在宋特封䕶國顯應公其後隂施滋厚寵數益崇威神洋洋無所不在故牲幣之薦在在而是盛矣哉傳曰明則有禮樂幽則有鬼神今夫世之嚚子憸孫父兄之教不入禁網之設不畏驁然自棄扵非道拜祠下望神像則凜乎肹蠁之聞肅然敬心之萌遂至不復為惡是非神之有並乎禮樂歟郡邑乾旱水溢螟蝗札瘥之菑雖世治吏民亦莫能免扵是有禱焉隨感而應變沴而豐易憂而喜又非有並乎禮樂歟幽明之理夫豈二致然則須城之民可忘鄆城嚴奉之心哉建廟始邑人王氏嵗久其名逸鄆城既殁之如干年其子京畿漕運司判官德實因余逰謝君潤來求文廼書以志嵗月時至正四年三月朔也秘書監記至治之世必有圖籍之藏此書省之所繇設也初太祖皇帝經營天下扵文儒之事未遑也世皇定江南收趙宋圖籍大儒老生之論注騷人墨客之文辭與夫荒遐幽絶餘欵墜刻星翁樂工兵書厯法方言地志佛老所傳及勝士良工繪事之精書法之妙竒絶之迹起上古竟宋金季莫不萃焉信乎觀物者必扵其㑹然非至治之世則物亦莫能㑹也於戯盛哉是故官書省者皆當世聦明魁礨之材詎獨漸摩文學之益葢以待上之用其重如此則其制度沿革可不彚而編之以明朝廷好古樂善之勤而勵學士大夫之行也哉著作商仙翁以賢相之孫優㳺冊府嘉上之厚其禮秩而欲貽法扵後世也噫此其志可量也哉有容齋記劉彦時作堂為燕居之所既成請余曰漙也褊心有所不受狹中多所不堪懼君子之棄而淺丈夫之歸也思有以廓其量廼取諸書有容德乃大義名堂早夜以覽觀焉庶乎古者佩韋之意也余嘉其志從而告之曰今夫物之虛其形而能受者器之圓方是也然受則有量江海之大黿鼉魚鱉之所錯袐怪神異之所儲珠玉寶藏之所産然受則有涯若夫天地之所以大則無得而損益也故自其德名之謂之寛自其寛之所居名之謂之容而世謂之有量量以識擴而識以學進也雖然傳稱黄叔度汪汪如千頃之波澄之不清撓之不濁其有容若此叔度之賢無以見於外者其學亦莫得而考也豈其資之近道而學之不講是以言論風㫖無傳耶嘻司馬遷班固迹其人言之實而書而後人猶有竊議者叔度筆扵范􅁮而人翕然信之豈有其實者可得而擬議而抱虛徇名者無得而窺也耶名者實之賔也以實則莫學而非道以名則莫學而非物詩云人知其一莫知其他吾子勉之而已礮神廟記龍沙克哷景兖甫世長千夫鳴臯山下新作礮神廟報功也初天兵之揃金墟宋也其先世皆有功天厯初年天兵戰靈溝景兖甫又有功師還祭扵廟告功也至順三年十一月景兖甫命其子瑪克夲走京師屬沂記沂謂五兵之器皆神司之礟亦然葢其力之所摧撃聲之所震壊光氣之所薄曜鋒刄未接固已落敵人之膽矣非神能若是乎沂徃年官伊川與景兖甫㳺最厚嘗觀其春秋教士閱習以程其能摩厲以作其氣旗旄鐲皷魚鱗雜襲士皆賈勇自獻靜如磐石動猶飄風機械便習之利歩趍遲速之節悉如法其精神所㑹何如也其神豈不昭昭然哉故沂書其端原且綴以詩俾春秋歌以祀焉曰他日之石䂓以工皷之機氣成行充風雲前驅獵復隆轟然電星流虛空翹關扛鼎羆與熊頭蓬衣葆履鋒庸較厥技兮奏厥功若泥在陶金在鎔欃槍掃影祛豐隆狼折其角弛厥弓崑崙已頺河不東震赫萬國罔不龔岳祗瀆鬼來㑹同義軀斯完隕􅇯躬凱旋盪滌霧與䝉神揚厥軄士氣雄開乾闔坤鴻濛崇錫以英簜疇其庸鶴鳴山高萬碧叢嶢楹繪桷飾以彤神之來兮宴新宫靈旗夭矯纒隂風神之去兮窅莫從光怪欎律飛長虹刑牲釃酒肴核豐鳴簫考鼓聲逄逄五兵不試衣不戎御勇韜力和爾容神兮妥靈蠖蠖中而我見獻無能容題䟦御書九霄二字臣沂忝待詔宣文閣竊觀皇上運筆之妙鸞翔鳳翥勢若飛動而從容法度之中及觀賜布衣臣胡震宦九霄二大字則知天縱之聖肆筆而成已見扵居潛之日昭回之光震宧獨先被焉可謂榮也已雖然鸞鳳冲霄必假羽翼曷以新豐逆旅自期哉題治平䇿要洛陽少年號為通逹國體新豐逆旅若素宦扵朝其書與䇿如日星之垂而江河之流也士生際盛時沐鴻化其可黙而無言乎題歐陽興世帖文忠公與其姪通理書云歐陽氏自江南歸朝累世蒙朝廷官禄吾今又被榮顯致汝等並列官品當思報効歐陽氏之承德襲訓者衆矣在今盛時嘗表顯眉山蘓叔黨之後而不聞歐陽氏之有仕者豈無其人邪抑潛德晦行而高不事異代之節耶元裕之壬辰雜編載安平都尉完顔斜烈在金季猶知尊異詎其盛世而反有不録者耶則知潛德晦行者多矣今觀廬陵歐陽永叔所藏紹興三年録其九世祖太平守興世省劄二通又與公族諸孫翰林直學士國子祭酒元功㳺始悟東坡有云君子之澤豈止五世而斬葢得其人則可至扵百傳信哉書王麓庵帖後麓庵先生以醇儒碩德冠映古今其志節之偉謀慮之精固非賛嘆之所可及今觀此帖筆勢低昂意象軒豁而法度森嚴豈所謂從心所欲而自不踰矩者耶嗚呼非其胷中有以大過人者何以及此捧玩再三不勝敬歎庶幾來者得以想見前軰風度以致高山仰止之意云題林先生訓子帖余㓜時侍先子官江南識蜀郡林君彥立其文章詩刻厲清峭斬斬然不肯蹈襲前人一言半語其逰如𢎞農楊載仲宏鄜劉汶師魯皆敬畏之延祐間余㳺京師又識彥立之弟今奎章閣照磨彥廣清修好古克似其兄時彥立已捐舘舎三年矣相與感嘆久之後廿餘年當至元三年正月彥廣出所録先訓首其言淳懇切至乃知彥廣季昆克名扵世克承其家者有自矣書聚星圖後德星之聚以賢也天人之相應如此不扵朝而扵州里動天象扵桓靈之世何居天之佑漢甚篤也漢曷以承天耶兩家三世咸有名稱豈天之生才私扵荀陳耶亦其承道漸訓不扶自直者衆耳故人樂有賢父兄也噫聚扵州里而其美若是聚扵朝則其美何如耶題譚濟川傳後黎獠弗安厥居席險阻之勢伺可乘之隙作兵仗合衆為宼殺良民火官寺其情狀之可嫉者若此朝廷嘗命將出兵以薙獮之汝楫以下邑一簿樹戰功則其建大將旗鼓者從可知歟身被創長子死而進擢不聞則其賞罰也又可知歟宼之益張也民之重困也固宜康誥曰殺越人扵貨暋不畏死凡民罔弗憝孟子以為此不待教而誅者也噫俾人人皆汝楫則宼不足平矣若夫致其信義而單車獨行若龔遂張綱祝良之類者此難以責汝楫也題胡古愚大拙先生傳大拙先生扁舟江湖而不逺世以遯形曳裾王城而不飾智以徼名以為仕耶則操行欲蟬蛻乎流俗以為隱耶則文華可藻飾乎太平所謂寓巧扵拙而物卒莫與之爭若夫氏族與字則君其問諸軒轅彌明題宋獄空詔書曰刑期于無刑語曰必也使無訟乎此聖人不貴去刑而貴無刑不貴止訟而貴無訟也沂嘗承乏修宋史至刑法見太祖初即位尤重用刑哀矜之詔嵗輙有之刑部設詳覆之員諸路命紏察之使至淳化間又置審刑院扵禁中其重慎之如此中更衰亂而澤不熄亦其祖宗好生惡殺明慎用刑之效也歟而况廷尉持天下之平司生人之命其當時選擇之精屬任之隆宜何如也其能仰副欽恤之意以尊揚祖宗好生之德俾庭無留繋明允如張公者其賢從可知歟古語云活千人者其後必封吾知張氏之後其慶未涯也紹興之詔有云天高聽卑福善禍滛莫遂爾情罸及爾身置此座右永以為訓居是職者尚鍳之哉題許將手簡後宋南渡前士大夫例善書雖未能如蔡君謨米元章從法度中來然其天資所發徃徃無塵埃氣可喜也所謂女好無定姿恱目即為姝耶題觀泉圖毖彼泉水其清瀏瀏既出扵山亦經扵邱原則有坎陸則有岐汪汪洋洋莫知所之奔壑西馳經天東注夫豈性然勢激而寓歛此㳙滴至扵尋丈隨波同流惟海是向彼觀泉者朋簮童琴洗耳其操濯纓其心鳴雨林臻霏雪崖至時不待人圖不盡意漆園蒙莊妙契淵黙君子人與果行育德養正之功有漸無已朂爾後來是之取爾書塘烏氏碑後余讀詩緇衣篇而後知賢者之能世其家也再觀司馬遷表劉項方作敵士以智力自奮厥或弗類亦序建為侯王傳不一再或覆厥宗又以知武公父子固賢亦先王忠厚之澤有以成之也塘烏氏由雲中郡伯奮起西夏事世祖皇帝時方整六師以行天討推心膂之良寄爪牙之任者一遵成筭其摧堅獲醜必眡功輕重而賞能以此時備任使蒙褒寵則其材且能可知矣施不盡有以隕厥身子桓勇都尉繼以忠義自持從出征入衛功烈炳然則雲中之祉其後人者從可知歟客省使當天厯初視理之逆順挺身來歸干城斬獲所向無敵第勞行賞眷奬優渥又非承德襲訓之力歟其子當嗣爵既以萬户讓其季父又以鎮撫讓其諸弟詎特才且智克紹其先又以知其孝義之化行於家也其孫曽之蟬聨蔓衍也固宜於戯觀世臣之家則我朝之深仁厚澤何如哉大夫士之工聲詩者可無以繼緇衣之篇耶書性齋説後新安方成讀書之室翰林待制揭君㬅碩扁曰性齋取易成性存存之義也襄隂王沂述曰情者性之發性者心之理感而遂通者用寂然不動者體其靜也如泉斯涵其動也如流迤􅆔或濤瀾之壅决非捧土之或止求復所有斯克乎已卓爾不羣萬善具僃靡闕靡虧常目在是體立用行曰道與義其功何以卑禮崇智崇也效天卑也法地念兹在兹生生不已一真春融諸妄蟬蛻猗誰名齋新安方子敢賛一辭以廸來裔題彭宗徐字說後廬陵劉高仲先生名彭叔字曰宗徐且推原所以字之之義其說固美宗徐西江人也亦知西江有所謂南州高士者歟昔之人有起武子扵九京弔靈均扵湘沅者而况居其里覽其跡者歟其人去今且千載其風聲餘烈何如也聞之者亦可以興起矣而况慕藺而名相如者哉詩不云乎高山仰止景行行止宗徐勉之則高仲所謂大彭氏者於是乎在書姚許靜談圖後姚許二公以名德之重事世祖皇帝考其平生所立始終鉅細未嘗一念不在國家今觀靜談遺像尚足以見其跨越古今斡旋宇宙之意一時君臣之際何其盛哉二公逺矣其學術之醇議論之偉則未嘗亡也昔馮唐論頗牧之賢漢文為之太息魏相條晁董之對孝宣以致中興此余之有望扵來者云
