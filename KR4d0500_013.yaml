body:
  text: 伊濵集卷十三元王沂撰詔親祀詔朕以菲徳獲承宗祊八年於兹夙夜惕若欽惟二祖之創業列聖之持盈施及𦕈躬緝兹丕緒嗣王謁廟古有令規踐阼之初即當廟見重惟皇考以仁聖之資據倚仗之會臨御無幾中道崩殂億兆痛心憤鬱莫雪矧予繼體曷措厥衷顧子道之猶虧遑親祠之是舉迺者上元降監大義昭宣用薦鴻名庶攄永慕十月四日甲申奉玉冊玉寶追上皇考順天立道叡文智武大聖孝皇帝之號是日被服衮冕躬祼清廟祖考來格神人以和大禮既成庸脩庶政用彰孝治式慰羣情便宜事宜條列於后於戱神罔時恫冀多儀之克享皇建有極錫庶福以惟均咨爾臣民體予至意故兹詔示想惟知悉阿嚕圖為右丞相詔朕嗣纂鴻圖撫臨方夏爰立一相統理萬幾惟進退之雖殊乃國體之攸繫開府儀同三司上柱國録軍國重事中書右丞相托克托宣勞總治于今五年法度修明海宇寧謐朕方推心仰成登于至治而引疾懇辭政柄勉喻不回厯陳父子之繼承備述君臣之際遇體其誠至良用惻然載惟嚮者乃心王室大義是崇圖任之初再三避讓斯言在念朕不汝忘用嘉忠勤宜從息偃用兹撫徇以表謙光重惟政位不可以乆虛任人必惟乎舊徳知樞密院事廣平王阿嚕圖資全忠孝世濟勲庸幃幄周旋朕所眷倚今命為開府儀同三司上柱國録軍國重事監修國史中書右丞相凡中書一切機務悉聴總裁敢有隔越奏請者以違制論於戱化民成俗所以崇禮讓之風論道經邦所以専鈞衡之任體予至意祇服寵章封鄭王詔朕惟徳隆則爵尊王者所以優大臣之禮名遂則身退君子所以刑四方之風維時元勲夙稱全徳丕揚懋典敷告治廷開府儀同三司上柱國録軍國重事監修國史中書右丞相托克托器大而材宏智周而識逺曏自樞機之地入陳帷幄之謀憂國忘身精忠貫乎金石贊元熈載偉績溢於旂常外則海宇之所具瞻内則朝廷之所倚重紀綱備舉民物靖嘉惟方叔壯猷用享貪賢之助而留侯謝事屢形引疾之言每申諭以訓辭終莫違於誠請是用王以祝融之壤食以夀春之墟畀兹金印之榮旌夫玉鉉之貴式彰異數昭示寵章匪惟愜中外之情蓋以篤君臣之義於戱承鄭武公之烈咸詠乎緇衣之宜秉仲山甫之忠無忘於華衮之闕祇承休命永弼昌圖可封鄭王食邑安豐路主者施行辭芳潤亭辭為王君冕賦樊川之陽墟曰韋杜終南横陳潏水西注出雲兮見恠蛟蟠兮鳳舞觸石兮吹沙佩摇兮絃撫樛蔓蔥蒨兮繡錯棊布孕和含粹兮氤氲吞吐詎造物兮獻竒遺美人兮容與彼美人兮白璧黄金萟蘭九畹兮寂寞中林湛泠泠兮濯纓香澹澹兮盈襟藻飾羣物兮金玉同音何不息之妙理兮若有會乎吾心世師弗求兮遐想前列坦衢萬趨兮孰柅吾轍孰壅而流兮孰轥而芳歇曷歸來兮懐璧不沽觀逢以道兮太和與居胡截而鶴兮胡續而鳬夔何踸踔兮蚿何以扶薰蕕孰同兮河濟孰殊嗜痂何人兮逐臭何夫孰主張是兮孰為其樞羣囂我静兮制命在余山靈川后兮若余媚嫵左圖右書兮客有樽爼空翠明牖兮晴光摇户豹澤文兮藏霧鴻時飛兮遵渚幸年嵗之未晏折芳馨以延佇遊三塗山辭登三塗之峩嵬兮放意以肆志遺紛濁而髙馳覽天宇之宏大兮哀吾生之安歸羣峰叠嶂盤礴而纚屬兮勃乎若森列之萬騎煙横翠掃陽舒而隂歛兮何變態之或異飄飄乎若洪崖浮邱拍肩挹袂兮馭風騎氣而遊戱長伊清㵼於其下兮晨霏夕靄摩蕩乎無際波濤以為琴瑟兮林木鬱其旌斾白鳥翩翩而滅沒兮聲寥寥其哀厲欲訪鴻夷而追魯連兮聊笑傲以遺世夕陽隠於林杪兮映浮雲之霮䨴分園廬之脩直兮阡陌錯其棊置禾黍離離而彌望兮荒烟野草莽蒼兮千里悲故鄉之遥遥兮何其中之不自得而歔欷又若放臣遷客登髙望逺兮悲傷而流涕嗚呼噫嘻哀孰為之樂孰為之為吾能為兮吾將焉悲設問嵩問王子官於嵩治事之三日嵩之黧老鶴列以進問之曰蓋聞廣谷大川異制民生其間者異俗夫辨山川咨故實者吏之事也叟能一二其詳乎叟曰嵩之為邑也南馳三塗北揭陸渾柂以伊闕鐔以木門俶兮儻兮汨兮瀇兮鳴臯輢之伊川迤之崱􅤹其危渟涔其淵於是量之以制邑焉其山則岫者峰者斷者聨者若一髪者若縁絙者屹然起者窪然止者奔者蹲者鬭者倚者或傲㟁而出或侵尋而附或沛若奔鯨或頺若吼虎其氣秀而勢雄又若龍翔而鳳舞蓋作囿於羣山而擅竒於九土其水則發源灤川入於龍門瀎潏砏汃浟浟沄沄逆射横流百川皆集含崕懐石矢馳風疾跳波散沬瀺灂湁潗或若蚓結或若輪旋衍為滮池浸彼稻田其按衍則迤靡平衍紆迴夷延溝洫脉散隄塍綺連以稼以植以畜以牧于何不碩于何不育而賦以之出而家用是足若是何如王子曰傳不云乎沃土之民不材滛也瘠土之民莫不嚮義勞也叟以險固豐鬱為美其智曾季氏婦之不若也請置此而後載言他老曰南山之陽鷙鳥宅焉厥類不一有鶚有鸇原夫其所窟也孤岑九成絶壁千尺猿猱墜匿松櫪僵立仲冬既至天凝地閉元氷裂木勁氣折石而兹鳥下擊翕忽揮霍翾不可當若勇壯之卒㳫雜而走敵場星流風厲觸突猛氣又若哮闞之獸張牙奮鬛突怒而無畏奮奮烈烈或𤣥或蒼或若練色或若錦章趯然其立砉然其揚又若旗幟旌旃之張乃有椓杙所羇狎羽所賣勁翮暫歛雄心猶在近之使安呼之使狎賞其神俊役以佃獵若是何如王子曰禽荒者聖人所戒馳騁田獵老氏所不為是豈可以為美觀哉且飢則附人飽則颺去曺瞞之所知也叟不聞乎願言其上老曰嵩之鉛華山澤之寶也民用之富猶鐵冶也但至其所則見嵓巒紏紛連岡屬嶺盤紆突兀蜿蟺幽隠厥氣之靈磅礴委積萬物不得鍾此寶殖千夫運斤百夫施綆篝鐙索深鑱連出礦其聲登登其寶纍纍其負肩頳鴈行手胝酎以化之火以爍之無聲無形變化神竒既浣既濯出素清泚詭譎竒偉莫知其所以眩轉的皪璀粲相射皓皓紛糅縈積或若珠璣或若珪璧然後服牛絡馬擔荷負任以貨以鬻以征以貢上以富國下以富民若是何如王子曰傳有之近寶則公室貧此之謂也雖然飢不可食寒不可衣又何寶焉吾聞國之寶矣上帝之粢盛於是乎出民之蕃庶於是乎生事之供給於是乎在敦龎純固於是乎成不聞其以紛葩華麗為寶也老曰嵩之皮革宂氏所掌也嵗云莫矣霜飛風厲林衡逞技獠徒奮銳騰躍莽䍚蹴蹈寥廓星流飈舉騰山赴壑房僕姑腰繁弱置罝窮阻張罘林薄曳豐狐掩狡㦸麖麋搏彫虎元熊文豹應弦飲羽乃徹圍縱網殞胔計鮮爛漫狼藉而韋人收焉薄者厚者短者長者元者黄者赤者蒼者赩然醇者駮然龎者爛兮錦質燦兮報章蔚然而隂炳然而陽䝉茸曼衍雜遝麗宻韋氏掌焉以裘以席函人掌焉以侯以甲若是何如王子曰君子恥服其服而無其容不恥有其容而無其服衣敝緼袍與衣狐狢者立而不恥聖人嗟嘆其賢彼其之子不稱其服而君子知子臧之見殺也老曰長伊之濵羣山之陽有桀木焉松櫪檜槾楓柘栢橿根據幽阜族茂髙岡或岌然孤生百尺無枝若樹承露之盤而建太常之旗脩幹大柯輪囷鬱結凛然若髙冠長劍立於王庭而有不可犯之色半死半生風摧雨蝕蒼皮白枝躩挐千尺森然若鬼魅突鬢而離立若乃斧斤以時入者構雲梯陟峥嶸椌椌漰漰登登丁丁琅稜訇礉若大戰鉅鹿之野劍㦸相摩而有聲鹤列而伐捎殺摧壓又若巨靈之擘太華驅以千夫挽以萬牛軒尾相銜入河之流一瞬千里箭馳風疾巨細冒沒前後絡繹或低或昂遇者摧當者壊横奔若雷行又若周穆之濟師叱黿鼉而為梁於是應公輸之繩墨唯匠石之指顧離背縱横各有攸注夀安永寧含徳天禄規天矩地頼此而足若是何如王子曰東華君志有之髙山峻原不生草木松柏之地其土不肥土木勝則不安人且崇髙詭特非所以為美也請陳其上老曰登髙可以娱情矚逺可以放意此遊觀之樂而出乎埃壒之外者也傳不云乎登髙逺望使人心瘁故羊祜登峴山而太息景公美齊而隨以雪涕老將從公登樓而望其南木門諸山玉玦青環豈無列仙之倫飈車羽蓋出没於空曠有無之間東俯長伊其流洋洋莘摯所生於彼空桑想躬耕於畎畆𦍑肆志之揚揚西則錦屏諸峰混隠迭見若近若逺庶幾有隠君子焉顧吾何足以見北望陸渾林壑秀美遺空山之故居流清風而不已若其溪瀬潺湲之鳴於下雲烟晦明之變於上與夫荒蹊聚落晨汲瞑舂之狀各獻其技變化倐忽可以備詩人之遊覽冩離騷之極目若是何子曰居髙明逺眺望固先王之政然余有公事未暇也請姑陳其要者老曰嵩於禹貢為豫州之野於地志為韓分昔在夏禹之國夏政尚忠故其民好稼穡惡衣服而有先王之遺風當夫列國蜂起嬴秦虎視徙不軌之民聚南陽之地故其俗好漁獵喜淫靡棄本業尚氣勢或相隨而椎剽指人之藏以為費故其民啙窳强捍而難制嗚乎世亦多變矣而其見於習俗者亦朋比誇詐而號為難治若是何如王子悚然曰此豈溪谷山澤之民之罪歟三老孝悌不敎誨之過也雖然施澤於堂廡之上服冕搢笏使奸宄息而善良出者亦在彼而在此耶吾不得而知之也抑嘗聞之嵩居太室之西為天地之中其山川之勝所謂出雲雨見恠物而為長雄者也意其清淑之氣蜿蟺扶輿磅礡氤氲當其竒者必有魁竒卓犖非常之民豈獨發於紛麗葩偉而罕鍾乎人將鴻飛兮不反蠖屈兮不伸以終其身抑師道之不立無以行所知尊所聞而汨没於緇黄之學以全其真又不得而知之也吾將與叟濯大川之清流挹西山之白雲擊槁木而長歌以問諸伊山之神序孝經直解序學欲切而思欲近孝經直解之所由作也缾中之水知天下之冰堂下之陰知日月之行故善學者由近以及逺是經為指解者百家而疑者亦紛然出乎其間或論其文體類禮運閒居儒行等篇言其出鄒魯諸儒之手或疑其引季文子北宫文子之辭言其掇拾以成書或疑其為樂正子春之筆而嚴父配天之語雖考亭朱子不能無議焉范氏又謂古文二十二章今文十八章雖大同小異得其眞者古文也是果出於曾子否耶獨司馬氏謂其旨髙深幽逺固非一人所能了其又信然耶余聞天之生萬物也人為貴人之於百行也孝為大由乎親萌於膝下嚴滋於日長而愛敬之敎興然孝固主於愛也而要道至徳二章皆主乎敬何哉敬則愛心存否則愛心亡矣敬者又行孝之綱領歟顔淵問仁於夫子矣仁主於愛也而其答之之目主乎禮此之謂歟新安胡君恕之為是編也本之以古人驗之以世故廣之以賢士大夫之議論述其梗槩而成書使讀之者較然易曉學者因其易而深思其所以難則於百家之說庶乎無疑矣科舉程文序徐君勉之集本朝科舉程文自延祐迄至順凡若干人經義古賦詔誥章表策凡若干卷何其多也予得而閱之愛其光輝如珠聨璧合其雄壯如涿鹿昆陽之戰其古淡如太羮元酒之為味又何其工也作之者若干人而如出於一手厯年廿餘而氣象如一時又何其盛哉昔者魯君之宋呼於垤澤之門守者曰此非吾君也何其聲之似我君也此無他其所養然也我朝隆上儒術舊矣列聖相承以人文化成天下作新人材以故由嵓才里秀而超從官大臣之列備文儒道徳之任累累有焉惟養其中者至故發於外者如此其言可以典誥命其謀慮可以經天下是編也蓋其緒餘土苴而已然文章與時世相為髙下後之考於斯者其必低徊俯仰有不及見之歎是則勉之編類之意與周剛善文槀序昔之為文者大之如天地而人不敢以為逺幽之如鬼神而人不敢以為深文之為珠璣珪璧而人不敢以為華質之為瓦棺古篆蕢桴土鼓而人不敢以為樸是皆得於自然之理有所不能自己而作者後之人見其然莫知其所由然於是殫精畢力而追之其雕鎪藻繢刻畫破碎之工益多而文益下詎有意為之者未必造其妙而造其妙者在於無意而為之者歟傳稱禹之治水行其所無事也文豈異是哉余讀周剛善文如干篇俊徤而不迫衍溢而不流析理指事比物託喻䟽暢條達無間斷何其工也其視彫鎪藻繢刻畫破碎以求工者又何其寥絶也而剛善欿然不自足方將窮探逺取合衆美以為已用超倫類而獨得殆所謂不能自已而作者與嘻其可量也哉王叔善文槀序易曰公用射隼於髙墉之上孔子之訓曰隼者禽也弓矢者器也射之者人也其簡易明白若此故曰辭達而已矣韓退之言其始為文非三代兩漢之書不敢觀非聖人之志不敢存處若忘行若遺戞戞乎難矣及年益老而學益成則曰文無難易惟其是耳退之之是孔子之達也文至於是辭至於達而已余幼時侍先子官江南時宿儒老先生尚在聽其議論讀其文辭如是而充拓之逺也如是而含容之深也如此其精麗也如此其雄深也然其論者實理其序者實事又以悟文之果止於是而辭之果止於達也心既識其所以然及其自為之則不至焉既而曰夫既識其所以然而未至焉者不學之過也事皆然獨文乎哉其後年長而涉世不得殫嵗月盡心力追古之作者為並而足其所好慕其僅有之者未敢自謂能至焉也金華王叔善出其文與詩一編示余請序其端叔善之文華澤謹繩尺詩流麗富情致余所未至焉者叔善蓋已先我至又聞其先世潛齋樞宻以文名江左則其所得於家傳者又非余所能知歟愚忠集序洛陽少年號為通達國體新豐逆旅若素宦於朝千載之下其書與策若日星之垂而江河之流也士生窮達不足論論其所傳何如耳然則抱魁偉之才負該洽之學而生盛明之世可黙黙而無言耶野嗚由百粤之墟而遊京師其所上賦頌書策詞藻之工議論之卓諸公固評之詳且盡矣顧余之陋奚言雖然古人有言葑菲不以下體而不採故英華靡遺芻蕘不以賤品而不詢故幽隠以達揮涕集序為人子孫者孰不欲其親之不朽哉此銘誌所以作也惟其一于不朽故襃其美不本于理侈其名弗顧其寔為文辭者從而摭竒以動俗伸此而誣彼于是銘始不實於傳乎何有古之人知其然始有自誌其親者詎託之難其人亦其耳目之所聆矚志意之所識知非他所能贊道柳子厚歐陽永叔之所紀雖其醇疵或異皆能俾死者無所憾後之讀其辭感其志者䀌然不知涕之流落也吳謝君堯章集其家諸壙誌示余蓋自宋至今累百餘年謝氏傳序寖逺雖世有顯晦而行應禮義不絶其言之藹如也固宜其視墓諛而泛與者何如也李士晦文集序李君士晦既殁其子孟端甫集其遺文為二十卷曰文雅先生集屬余序未暇也已而孟端又沒余既悲其父子文章學問有過人者而迍邅流落卒不大顯於世且為當世之君子為國家樂育賢才者惜也讀其書其辭條暢雅贍其造詣皆宿於理雖不克顯於世其心所存如何也雖然彼赫赫為世所願者可睹矣吾於君父子亦何恨哉延祐七年君由供奉翰林出宰原武同余試河南鄉貢士始識之君為人外若簡曠而中純明諒直與人交盡其義不特其文之可傳也後五年識孟端於京師狀貌偉然慷慨有大志為文思致逸發不狃繩尺欲長雄一世又以多君非特文行之可傳而又能教其子也又八年余為博士孟端凶服過余曰先君捐館二年矣初君為御史西臺不合歸孟端繼拜御史言事敢道人之所難議者謂藴必發又止此噫其命也夫余游君父子間二十年而孟端之子曰纘曰緒為余講下諸生故余既序其文又厯道其父子事如此所以致情于故舊而嘆士之負材氣者其合難也
