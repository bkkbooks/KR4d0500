body:
  text: 伊濵集卷十四元王沂撰序送鄭希道之杭府幕官序至元二年余識鄭君以道於金翰林直學士揭君坐中掲君稱其學宏肆精實其文深沉雄麗其材開通敏給既而以道擕其為文數千言辱以顧余讀其文誠如揭君言因其文以知其學其材又以知其所立之卓也頃之以道補肇慶府經厯知之者咸賦詩以惜其去後四年以道之弟希道來京師亦出其文示余其辭贍雅辨達蓋能稱其兄者士大夫之論多以為宜在館閣而希道調官杭府幕將去矣世常患材難材矣患其閉距而不肯試希道兄弟中於弸而外於襮其進也又逢其時而乃相踵而去豈其用之弗切耶抑當取而或遺也雖然其積也厚則其發也必遲其養也深則其用也必大希道兄弟受大府辟積勞升王官聲既彰徹矣于其小而有聞於其卓而不試未之有也杭為宋故都行丞相府部使者實涖焉其長皆勲舊重臣而幕府時彦川泳雲飛希道雍容議論孚於名實之間而勤於上下之際吾知其非乆於外也聖朝文化聿興古文遺冊靡不畢講宗工鉅人方議修遼金宋三國之史書其善惡之迹興壞之端以為法戒而採摭殽亂之中論載殘脫之餘必聚天下儒學之士而後可吾又以知希道兄弟將繼踵而來矣晁生字序詩六月之篇曰文武吉甫萬邦為憲詩人美尹吉甫有是文武之畧故能為法萬邦也夫文以經國武以定亂大人之事也今晁子名邦憲其友字之曰世文毋乃躐成已之功而遽志於成物乎揚子雲曰正考甫常希尹吉甫矣如欲希孰禦焉夫文事武備不可岐而二也雖然江漢之詩終之曰矢其文徳洽此四國釋者謂武功不可恃必矢文徳而後四國洽也故召穆公承其意而作常武之篇謂徳可常而武不可常也晁子之取字也將繇吉甫之言以進其徳歟吉甫深於詩者也抑慕其崧髙烝民之篇而有所感發歟是詩之卒章有曰侯誰在矣張仲孝友夫吉甫之功亦張仲有以成之也然則晁子之欲成乎徳其必自孝友始送趙千户序五嶺之表百粤之墟吏失其猷羣蠻諸猺負險阻聚蜂蟻以思逞逺民將吏皆兔罿是求獨通判順安州趙伯逺圖上屯守方畧窣相是其言上聞建屯兵萬户府命君長千夫賜金符副以弓矢錦段比行因諸生王稷請言予聞猺與蠻蠢迪廣西民暴獷然俾其將吏皆若而人則冦奚以張俾君之畧施之早則致平乆矣雖然蠻獠所巢窟如何君所條方畧如何余不與君接不能知也余聞好則人怒則獸椎髻卉服之常情獲而殺之非勝殘之道遷而處之非順物之性顧其控御如何爾薄其征入簡其繩削義信以薰蒸恵愛以漸澤則豺狼而衣裳可也柰之何虎而冠者舞文以逞暴規賄以自殖是以有嘯呼其羣挽强機毒而跳梁者矣控御得其人則屯兵可以無事否則適重冦耳今之往者皆異乎前邪抑不免乎猶前也議者獨得而不思也邪余故次第所嘗論者以送之且勉廣海之凡為吏者也送安伯寧序元統初詔書擇中外臣使各舉所知以任守令于時江南行御史府舉大名路治中安伯寧已而燕南部使者又舉焉余嘗論今之守令以治理效聞者不過數人其材行可舉者卒亦罕見焉余陋且賤聞見少不足以知之也而安君能俾部使者知其材而舉之固難大名與建鄴地之相去也數千里而能俾御史知其材而舉之又難也余是以愧予之賤且陋果不足以知天下之材也既而余友國子助教康君魯瞻為余言安君之佐大名也濯手摘𤓰為民去害興利若疾痛嗜欲在已威令大行魯瞻余敬而信之者其言必不妄又以知安君之材為公卿大夫可也獨守令哉余方以陋且賤自悔以淺量當世之士問其廬往見焉聽其言知其材又似夫不止為良吏蓋毅然端亮之士也使中外之所舉者皆克如安君則郡邑無不理然而如安君者不易得也則余又謂安君宜在朝廷使天下被其澤不宜困於一郡然而不敢必者毅然端亮宜未易遇合也已而果知沔陽府夫水一也上者為雲雨下者為陂澤雲雨之所施者逺而陂澤近然而水豈有上下哉而余猶云云不已者閔良吏之不多見惜其不羽儀于天朝而使沔陽之人獨受其賜也故序送仙嵓道人序仙嵓道人髙君抱琴於伊上屬余自放川窮山阻間惟欲冩其憂思道其堙鬱以慰其伉拙不偶君忻然從余登北墉之巔遊嶽祠之亭西山爽氣照映几席寒泉脩竹爼豆左右若與洪崖浮邱翁拍肩挹袂其間於是引琴為鼓一再行熙然其南薰之和凜凜然其履霜之悲耿然其猗蘭之幽哀而不怨樂而不流俾人灑然以醒優游以有得超然忘其謗傷之中而憂患之境也余離席而嘆曰昔歐陽子序琴之篇謂其憂深思逺有舜與文王孔子之遺音而純古澹泊與堯舜三代之言語孔子之文章易之憂思詩之怨刺無以異於君之琴見之矣君於斯技其至矣乎蓋必有其本矣君去琴而笑曰歐陽子不云乎理身如理琴正聲不可干以邪由是以知君之過乎人者不獨其琴也因歌而送之仙巖道人􅋯欲仙眼如紫電眉横煙青鞋踏破雲水窟悟道不誦黄庭篇擁琴來訪方平老要伴仙山掇瑶草拂塵一奏幽蘭操目送飛鴻身若槁春林啄木時丁丁楊花風蕩縱復横洞庭始波木葉脱巫峽暮雨猨哀鳴深閨哀怨語兒女空床蠨蛸嘆思婦澤畔行吟楚臣放葦間挐舟漁父去恠君枯木著朱絃冩人心曲如其言世間擾擾筝笛耳誰為聴之誰為傳罷琴欲别笑相顧要我試草凌雲賦他年袖手嵩少間頭巾好掛三華樹送圖烈圖序天厯初廷試郡國髦士於時圖烈圖敬甫收甲科授承務郎集賢修撰聲譽動京國士林瞻望以為榮敬甫歉然常若不足於已者方且甘寂寞以自處日從耆艾魁礨士講論道徳以求其益既而同列者超取顯美敬甫方遷太醫院都司搢紳咸為嘆惜而敬甫泊然自如朝策一馬出坐幕府治文書暮歸掩闗讀書或不知其朝士也學既以立身而進不止材足以髙人而志愈下是乃所以為敬甫也吾聞觀人之術殆若射然其技能否見於抽弓執矢之頃不必汰甲貫侯而後見敬甫之自將也如此則其他日之見於事業者何如哉今也拜御史南臺羣情顒顒思見其能使古道可復見則敬甫所以自任者又何如哉余方跂足而望傾耳而聴期所言之一效也送劉秀才序江西劉子簡省其兄京師㩦詩一篇示余炳然琮璜之狀琅然笙磬之音也余戯之曰昔人有善奕碁者或偕之通都大邑見國手與居乆之執禮益謹而言不及乎攻守與奪救拒之法但日遊奕肆而已或問故曰彼之藝精矣其髙著已識矣特其淺者未盡識耳識其淺斯知其所為髙矣子簡咲而不荅也已而以思親告歸其交遊追餞于上東門外或曰古之太史必求民風陳詩以獻於法宫然後材不遺而志可見將近世人居位者或未能盡用古道歟降而後世公卿大夫往往器人於篇什之間故士由之炳耀於時者相繼武或詠原上草賦髙軒過而著聲或一誦氷柱雪車而名出盧仝孟郊右將今之人不貴乎詩歟抑子晦其有不求知歟子簡咲而應之曰我之來也賦棠棣之三章今我賦陟岵而歸也奚用舍之足言余於是知子簡之果深於詩者也故次第其說以送之送趙仲禮序初趙君仲禮同余在史舘聞其論天下事褒貶善惡計利害當否若鏡見象若决拾應機而發使人心暢神懌亹亹忘倦是時固以風紀地期君已而授經奎章閣每中臺有虚位則又意君為之迴翔者乆殊不介意飭身勵學益進而未巳其實與聞震發襮耀一時已而擢禮部主事未幾時果拜南臺御史戒行有日矣别且求言沂聞古今嘆才難有二不能必行難也不能必言難也能必行者執政大臣能必言者諫官御史也今君既居易之地故告以所難朝廷引忠鯁亮直魁礨博達之士布在中外清切地期其吐忠實陳損益協三靈之心洽四海之望也凡都是選者固以一人之身而繫天下之得失當萬世之是非也其不輕而重也如此君積是清慎之守明敏之為擢置乎此盍亦圖其易以思其難乎羣情顒顒思見為國家興太平之基士大夫褰裳奮懐望古道庶幾可復見乆矣是宜朝拜軄而夕建言所以協三靈之心洽四海之望者則非言之難知所以言為難也彼以中外之限趦趄簿書畦隴間淺事塞責者非余所以望君而詰姦以枝葉之濫得情以鈎距之巧為材者又非余所以量君也君計當世之得失已詳忿時俗之垢汙有素而嚮之難將見其易矣余雖竊食學舘亦傾耳而聴跂足而望期所言之一效以破其鬱鬱也雖然時其弛張息以休沐弔六代之故墟覽山川之形勝屬觴於遺臺濯纓乎清溪賦詩為樂盍亦思嚮之在舘閣所議歟於此而不忘則余之所期者可必矣送徐徳符序余少時居江南識徐君徳符時年未三十風骨爽秀自其大父雪江翁父秋山翁世善琴而徳符兼工詩與陰陽家學時與之抱琴擇吳山勝處掃葉席草坐長松鉅竹間奏古操一二見者以為仙也後三十年余承乏太史徳符長池州淮學既代来京師昔之秀整之狀今化而為蒼顔華髪昔之俊敏之氣今轉而為澹泊静黙而余亦不復如少年時氣象矣追惟疇昔相與慨然而京師之賢豪聞其家學欲聞紫霞遺音者争邀致之而余方從蹕上京出居庸闗過龍門峽徘徊絶壁之下亂石林立波潄其罅風水吞吐其音澎湃猶韶濩間作徳符能援琴冩之將見風雲為之變化濤瀾為之洶涌魚龍為之悲嘯余亦超然有得欲遺埃壒而上征徳符買舟南歸而莫余從也噫送翟生序翟文中早入國學與貴游乆處齒業俱進師友許其精敏而文中之名亦著矣既而為知已推擇草儀前殿贊禮明廷積勞除浙東宣慰司照磨以余嘗官成均求言為别迺告之曰學將以致用也照磨官雖卑而鉤稽金榖之數摘發案牘之乖窮竟滯濫之端皆其軄也文中無鄙其事而盡心焉則致用基乎此矣昔歐陽公少時令夷陵欲借書觀之而不可得乃從故府取吏牘反覆閱之於是周知情偽備察姦利枉曲乖錯之由而況軄此者歟宣慰大府也臨制列郡嵗上牒書壓架充棟又豈窮荒一縣比歟其後公代包孝肅公尹開封簡易而理論者謂過於包公而蘇文忠公亦以為政自任曰我從陳公弼歐陽公學來則夷陵閱牘之功又曷可少哉雖然公天人也況學者哉文中官滿而歸余將有徴焉送謝逢原序江南謝逢原侍其父遊京師飾金貂而職常伯者聞其有茂材除補平江財賦提舉司幕官逢原嘗從余同年友國子博士黄先生學器端識逺素行孝謹於清資顯秩可執契而取也迺今試之以金穀浩穰或謂屈其材余曰不然推其已行可以信其未行迹其不為可以任其必為世嘗患雅士視金穀之計若將凂焉而自喜析秋毫者下比商賈若夫不出度程之中而自足於經常之内獨非儒者事乎平江陸海衍沃冠於東南是司號脂膏地簿書出沒千蠧百穴而民有困弊者矣惟孝則能潔以將身惟謹則能宻於檢覈惟器端識逺則能宻扶顯相整棼剔蠧余知逢原必治辦是軄矣逢原其告諸長貳曰聖朝仁厚節儉恩及行葦籍稅取民不過常法宫掖之奉不踰制度理財者洗手擿𤓰因舊循常遵職而已若夫慘急以為風采趣辦以為有材則未之敢聞也諸公知逢原者咸賦詩以送之而余為之書送趙叔儀序河南趙叔儀始來京師居囂煩之域未嘗不静暇也混紛華之境未嘗不肅潔也其於學審所謂疑者而通之求所謂是者而正之以故余愛之且畏之也其後余敎國子叔儀亦鼓篋而進諸生旬沐嵗省皆散去獨閉一室未嘗窺户寒抄署講寢食失期往往心悟所以然作場屋文字機鍵開闔雲蒸川流腴澤粹好義理益發既而試于有司詘於不已知聞者翕然嗟之余謂不然大雅曰譽髦斯士又曰蒸我髦士非科舉所謂士也譽之所不加蒸之所不及科舉蔽之也以科舉論天下士失士甚矣柰之何雕琢技能以赴繩墨磨錯椎鈍以就鋒銳波流相蕩風聲相軋貶性勞力𡨕迷生死而不之悔噫與其毁闕而進曷若成全而退動而得於人之多曷若静而失於已之少也顓孫氏求聞達之要孔子告以先逺世患老子列禦冦敎人以後其身者固所以先其身外其名者固所以存其名也叔儀曷亦悔其少作一切掃除邪僻浮靡而空之求古人之統緒所謂廣大髙逺者厚積而薄發歛華而就實如木升而為材可掄如玉琢而為器可繅藉也詩不云乎衣錦尚絅叔儀其無疑於斯言送納蘭時序初許文正公至秦秦之學者則而化之始知窮理以致其知反躬以踐其實一切掃除華靡浮巧而空之入徳有其門進道有其塗同時有潛齋楊公元父者其學粹而正其操履堅而不渝文正與之抗禮者也秦固衣冠之藪澤由二公唱之以正學其後若劉無競吕伯充雷伯静蕭維斗同寛甫諸公潛徳蜚聲以師表一世其師友淵源尚矣陜右納蘭時字純中者文正公之外孫而贊善同公寛甫之弟子也篤志而善學持身以苦節其所謂不扶而直者耶同公既殁純中過大梁客覃懐舘於承㫖許公之門公知其賢欲薦之固辭夫古之人聞而知之於百世下猶若得其心傳矧其生也並世其居也同里親承面命而得其緒綸者乎純中歸而考其師說篤信而允蹈之則其所至詎可量也哉純中因國子學正祖輔卿求余言於是乎書送趙生序國學生趙秉忠請於余曰秉忠承訓於先生今將侍親守襄陽或謂秉忠曰國子生搦數寸之管書盈尺之紙坐可以釣爵位而子屈然自退於江湖千里之外雖有文采莫之覿雖有徳音莫之聞不幾背馳歟秉忠惑焉願先生賜之言余曰不然學之道甚易知而人莫能知者未得其本故也孟子曰仁之實事親是也義之實從兄是也夫人莫不有親也而知所以事之亦莫不知有兄也而知所以從之則所謂仁義之實固已盡得矣文章誦說皆其末流也柰何學校之政非古士生既不見禮樂之盛而科舉又橐籥而風聲之經明行修之路不足以勝分積優升之岐遂皆以漁獵剽襲為學忘已徇物為行惟得之務而欲之求本心之晦蝕而莫之憂余為是懼乆矣秉忠是行也定省之隙不馳情於外誘不棄日於無用其至於道孰能禦哉送劉仲栗序嘗觀朱博折逆文學儒吏曰且持此道歸堯舜君出為陳說之而吏莫能長揖而去固有以召博之辱矣俾如蕭望之朱雲博尚得而凌轢之邪因其人以求其所奏記稱說從可知歟噫道喪乆矣褎衣大袖之士誦六經以文姦言俾豪俊輕俠憑陵翫侮而真儒碩學與䝉其恥余於儒吏蓋有憾焉國學上舍生吳克寛来請曰劉克寛字仲栗者嘗吏廣平之成安縣不合去已而遊學京師且通國言出補郡文學掾敢求先生一言吾多其辭吏而學故書此以贈且有警也送鄧漢傑序楚王聘莊子莊子辭魯侯聘顔闔顔闔逃夫賢士君子固以不仕為貴乎余曰不然昔者聖人之治世也君有常道臣有常軄民有常業各當其分而無私焉故無非常之譽則無非常之咎無卓詭之賞則無􅉃厲之罰是故賢士君子從事于其間安其性命之情而已逮徳下衰君失其常道臣失其常職民奪其常業皆私其實而利其名故有非常之譽則有非常之咎有卓詭之賞則有􅉃厲之罰於是時也髙位重禄不近乎宗廟之犧乎此賢士君子所以持竿不顧遣使者而逃也旴江鄧漢傑世業儒通黄老學來遊京師知之者薦而為揚州通泰等處屯田提舉司知事戒行有日矣因其逰沃哷溥求余贈言漢傑學於黄老者也其出而仕也其以望世也歟其不卑小官也亦安其性命者歟雖然從事于道者道乆而愈安從事於利者利重而愈危此漢傑之所學也余何言哉送耿可讓序諸生耿可讓將歸覲請曰可讓大父良為人樂易慈祥其居鄉閭寛然長者也其視族人能愛以均其敎子孫不以逸曰所以守吾先人之法也今年八十六而夀考康寧耿氏世束鹿繼有顯人其出者以材能見於世處從官大臣之列而施其澤於天下居則行脩於家而譽聞於鄉日從子孫來西方之客與夫鄉人之老詩書樽席之側嘯歌息偃以忘其年以遂其志遭朝廷賜帛之典縣二千石且表其居顯榮一時其自得者専考於身其有餘者流澤於後有孫有曾以承以翼何其祥也大夫士咸為咏言先生其序其端可讓為人質厚恬夷世俗之所為有不為者又以知君之敎行於家也此大夫士之所以咏歌也歟送張光道序洛為中州文學國古多懿徳馴行之士風聲氣烈愈逺而彌存士之生是邦者豈無讀其書覽其迹而卓然有立者歟洛之士張君光道少遊燕趙間與其賢豪交遊歸而著書萬安山陽隤然遂其志也今年秋自洛而伊恵然見臨若有所請余嘉其儀觀偉其經術明其所謂卓然有立者歟顧余言何足取然嘗聞之無常産而有常心者古之所謂士也士之學欲其得諸心充諸身擴而被之國家天下也噫士散乆矣治心脩身之學之廢乆矣其在閭巷間者用力於空文而峙虚名其出其仕者赴時趣務馳騁於聲利噫惑亦甚矣是以孔子稱古之學者為已孟子稱君子欲其自得之聖賢之心寧以此而易彼也邪光道卓然可畏者也將同乎此邪抑將合於彼邪光道他日歸隠於洛訪邵窩遊司馬園濯清伊之流挹龍門之雲徘徊俯仰想其風聲氣烈灑然而醒淵然而識以求吾心吾身之事而足其樂於已者其視巧富善宦其得失固易知也又奚貴於余言哉光道於此而有得焉則信乎其所謂卓然有立者也送張子英序延祐間余客遊雄邑雄之士張子英者從余遊與之自定鼎門出水南徘徊獨樂園想司馬公之風烈入邵窩歎其人之不可見升龍門臨伊流周覽程夫子之遺迹則又踔而疎仰而悟跂而望凛乎其如將見之也於是歎曰先賢在是則道在是道在是則有為者亦若是吾黨小子讀其書思其人欲起九原而端拜受命也况俯仰喬木之下為親炙之者歟然未有爼豆而風聲之者非是邦之闕歟於是子英喟然曰斯責吾邑也小子奚敢讓其後五年余歸江南子英由洛而吳謁余曰昔之所欲為堂凡三楹迄成雖然三王之祭川必先河而後海雄學原于濂溪𣲖于横渠師資友輔而流衍於武陵之朱同時若廣漢若東萊相望而出學者復見天地之純全古人之大體迄於覃懐許夫子而規模益逺矣大江之南河洛之墟唯是風馬牛不相及也而續其絶而著其㣲而學有統道有歸詎非人心所同然歟合十賢而祠之其溯流從源之義歟余舉酒而屬曰善論學者亦然知紫陽自濂洛始則覃懐必自紫陽始繇覃懐而距於今若斯其未逺也吾黨小子亦有導河積石者歟子英歸而從其邑之士設籩篚錯罇簠升降俯仰以薦潔芳窅然肅然有在斯堂之外而發於心之所同然者此吾他日之所望也其表顯而封殖者庸詎止於斯乎子英懌然曰其敢忘祝規送劉伯温序什喇卜郎中至元五年閩盗既平明年夏秋嘉禾吳松江苦雨具區溢壊民田廬秋斂用㣲流移者衆江浙省遣使告饑朝廷議選通經術有材幹之士為元僚拯之山北道亷訪副使伯温甫往踐其任伯温雅與余接余聞而喜曰浙之人幸也夫客或曰當今賦出於天下江南居十九浙之地在江南號膏腴嘉禾吳松江又號秔稻厭飫他壤者故海漕視他郡居十七八兹者民方結草葦以自託於壊隄毁堰之上而海漕之常數莫登矣活民足用亦有其道歟弭菑沴以召和氣又可不深念歟閩既煩敝於轉餉而浙又若此菑沴之行固治世不能無抑思有以致然否歟吾見其難為也子以為喜何歟余曰伯温之少也從先生國子講論道徳以求其益其素學也可知其仕也為名御史為賢部使者其才又可知也學以禔身才以立事自公卿大夫至于牛羊倉廩之選咸宜焉况足國用召和氣者哉自通都大邑至于荒邊側境咸理焉況浙哉客又曰是則然且國家治體百司庶府其長實膺眷注付託之重庶務則一切責成幕府情浹義洽固無慮其鹹酸之不同圓方之不相入皦皦以立異容容以竊嘆求脫去而不可得尚何政之舉余曰夫鐘怒而擊之則武悲而擊之則哀誠意之感也若是伯温誠於已豈有不信於彼者哉吾知賔主相得于堂廡之上而民自得于江湖之外矣故曰浙之人其幸也夫遂書以為序
