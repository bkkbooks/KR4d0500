body:
  text: 伊濵集卷三元王沂撰五言古詩內白齊動息祛百慮紛華謝羣妍靜専外始定敬直內乃専悠悠天光發皎皎氷鑑懸反照但一室流輝昭八埏斂舒豈徒爾恆久貴自然如何蚩蚩者敢昧蒼蒼天紛持白黑辨而契內外篇荒蹊惑所入焉能探其元永懷保貞素橘頌乃陳言伊闕道中鞍馬間得詩二首夕陽明逺村槁葉索索雨遊子隨飛鴉翩翩適何許秋聲不可遏歸意不可禦稿秸欲栖場甘辛早登爼偶諧田園娛益見風塵苦遙遙伊闕道馬跡幾來去客愁日以新山貌日以古持此誰與言數遍道傍樹道逢薹笠叟嘆息東臯曲云有一頃豆雨荒秋草緑敢辭荷鋤倦但恐豆苖沒感之在無言相看淚相續賦得擕手共行樂别嚴元擕手共行樂臨别重歡宴落日照離尊流雲駐歌扇折栁君不聞采蓮人共見離懷不自適去意苦難變望望澄江濵危檣語雙燕贈羅仲矩重之金陵大明麗中天萬物囿臨照哲人感休運鼎鼎列清要都俞備八凱揚歷聨二妙亦有希世材幡然起屠釣誰同不賔者而敢犯譏誚濟濟鴛鴦行明明鳳凰詔文華擢上列機警越常調之子英俊年趨風昔長嘯筮仕司東湖寧親望南嶠雖成閒居賦豈免宣室召依依去南平杳杳向西笑要途諒特達下邑被榮耀殊勛倘可䇿于以答廊廟有感馮婦昔一申猛虎知善搏宋均美政化境內虎先却周處變所修白額首擒縛李廣莫夜歸彎弓射叢薄當其肆害時風生動寥廓四人異時起意氣撼山嶽操行雖不同天下稱去惡兵餘二三載虎跡宛如昨咆哮據當路白晝伺人攫南鄰魂未招西舍慘不樂耽耽莫之避墟里困蕭索何代無竒材古道仍不作題胡濟川嵇康牀琴圖先生家何在昔住稽山隂方牀日宴息上有焦桐琴流目視宇宙何人知此心竒才軼同列幽思積盈襟絶交書固偉養性論亦深誰讒卧龍質反使禍見侵寥寥廣陵散百世寧知音惜哉畫史輩不識孫登針留題𤣥妙宫仙家擁修竹境勝欣小停玉殿斷香白石門古苔青松月淡蒼蒼風泉逺泠泠清夢仍丹邱晏坐存廣庭于以淨塵慮于以朝百靈于以賦逺遊于以新宫銘寓吉安林塘避桃林兵警感賦六首汛舟水東偏擇地林塘口稍紓兵革難少待旬日久時時候邊警佇立屢回首路逢荷蕢徒坐石䕃髙栁及時事耕鑿煩慮復何有不聞桃林戰昨日竄羣醜泰運未有期凄凉在郊藪秧田既已插麥壟亦已翻林園富桑棗沼沚具蘋蘩朝耕暮還息啞啞相笑言昔聞異人說物外有桃源不到武陵境安知人世喧霧斂衆峰碧日暄羣木蒼翛然南軒內媚此春晝長手擕巨編讀塵境悉已忘池魚迭遊泳野鳥紛回翔物性各有適營營奚所望樹棗易為業畜萍易為魚家家重生産園沼富贏餘為農乃自適為士當如何賢聖去我逺躬耕還舊廬牧兒采樵歌歌起山谷應中懷詎有思出口但求勝雅頌世莫聞鄭衛人皆競眷兹音節美俯仰足清聽白鷺下平田平田緑秧美低徊獨拳立奄忽雙飛起周原風日好逺客亦戾止三茅三家村煙塵不曽已人生本萍梗流寓隨所以恆齊學道貴有恆為善亦如此一毫無間斷迥若天淵比栁也河東良藝德傳父子槐隂䕃千畝河潤連九里是心擴充之奚止一鄉已昔聞陶唐風今見陶唐理題劉憲副為蕭鵬舉寫雨竹圖風雨川上至秋聲滿喬林初疑鳳鸞引忽若蛟龍吟洋洋飛動意矯矯變化心隱晦在一壑干霄故千尋美人隔秋水環珮鏘璆琳清嫩育內美孤髙蕃逺隂以兹石上操託爾邱中琴共保嵗寒節永言懷好音題屈原漁父圖屈原水之仙妙在逺遊賦餐霞飲沆瀣所述非虛語孰云葬魚腹聊以辭漁父眷眷鄉國心靳尚終莫悟沅湘流不極鼓枻竟何處日暮悲風多蕭蕭滿楓樹出城南餞羅與敬東歸並出城南門相送河南渡公家有嚴程况此春欲暮伐木下逺岑拏舟邁前路冥鴻去已盡元鳥鳴相顧關山路遙遙春樹隔煙霧遊子久不歸淒然望鄉故田園長荆棘狐兔守墳墓謬為時所稽焉敢失故步慨念平生親分携重相訴浮唐紫芝老東里喬木蠧歸歟倘先理秋至或良晤題李溉之白雲半間亭焚香坐清晝一室遺垢氛無人與爭長只許白雲分白雲本無心遇旱或成雨膚寸已有餘半間那用許暮春有懷我行長伊濵休日聊遊豫溪山足真味心跡捐外慕曰余弛負擔徒以鄉曲譽敢云陋微官而不事民務度密意少歡人家隔煙霧髣佛雞犬鳴林深不知處川華草際浮空翠篁端吐挾晴花氣驕渴雨荻芽怒眷然感物情政爾濟勝具陟阜引瑶花涉江擷蘭杜美人遊不歸持此欲誰與誰與慰暌擕山川修且阻誰與敦佳期長吟碧雲暮還家春日遞層隂鳥鳴池上林久行忽顧返佇立懷好音幽花色相眩茂草翠交侵去日春尚淺歸來春已深親知各分散陟彼南山岑携持尊中酒誰與同獻斟亂離苦役役涕淚沾衣襟悼兒嬌兒名阿髙皎皎玉雪質頭圓眉宇秀雙目如㸃漆憶昨湯餅客譽兒美無匹鷹雛精爽緊驥子神氣逸誰云嵗兩周熟玩而驟失吾家世業儒潛德久已積光大我門閭望汝與諸姪如人有十指孰嚙孰可惜華屋春暄姸朋戲相扶掖慿几檢書册挽衣覔梨栗低頭解拜客唾手學濡筆吾年已四十事未見一獲勤苦鉛槧餘賴渠將過日念汝來京師襁抱恃母力遙遙三千里拏響連車迹風雪之所叨負汝諒吾責坐令昨日歡今日不再覿杳然望東南庭草為誰碧我羡拾巢鴉風枝戢修翮又羡䑛犢牛濡濕喣毛澤乳母抱出門文葆空卧席交朋走相問欲語氣先咽神理本冥冥先儒言不得我欲訴天關靈鳳先墜翼懼老為獨夫念之若芒刺或謂妄當遣靜思益難釋嬰孩無哭儀禮經有遺則奈何恩奪義苦淚滿眼黑終當護汝歸藏汝乃祖側琢我哭子詩銘之壙中石有持靈龜貺豫賦此以謝王子雅好卜漁人致靈龜服氣可千嵗昔以釣得之置之几格間顧盼生光輝答辭謝漁人龜靈爾何知兆以休咎著用由鑽灼施枯虛乃物化千嵗亦奚為曵尾生可貴留骨死更竒珍藏襲巾笥將啓決狐疑神武而不殺聖者乃如斯至人善觀化脫殼伏朵頤神知倘相契試以此道推題雲林圖浮雲如游塵倐起蔽白日何如兹山中聚散了無迹豈無學仙子只許猿鳥識結巢青松頂掃葉煮白石送玉峯長老四首俗士如磨牛欲去鼻已穿豈知世外人來往雲飄然玉峯叢林秀眼碧眉幾煙不作贊公色早參雲門禪是身無建立捨䇿因衆緣築垣聽魑魅施食來烏鳶出家英特事脫屣弊惡纒把茅折腳鐺可過三十年我本積精練夙記維摩篇中間一念差坐受衆目憐稽首西方仙可念未可捐借師卓錫泉湔我綺語愆題龍氏樂善堂余愛淵明詩匪善奚以敦誰云甘泉谷中有至樂存龍氏世簮組磊落多璵璠築堂種嘉木叢隂庇其根惡禽不敢棲好鳥時飛翻清琴橫我床濁酒盈我尊願言懷靜者時復扣衡門題胡士則善餘堂為善古云樂孰計慶有餘譬彼種嘉木嵗晚隂扶踈宦者矜巧智農者爭膏腴鋭以身易物作計良區區番陽有遺老築室愜所圖蒼蒼華蘂峯鬱鬱杉松株兄弟相塤箎兒孫亦詩書豈惟澤其家而亦浹里閭因之謝林壑吾欲卜鄰居宿濵民家晨發伊山陽暮休清汝湄二三田舍翁勞我鞍馬疲秋髙天雨霜刈穫此其時所從吏卒多溷汝父老為我來佐山邑三年何所施相看愧竊食頳汗難為辭夜闌接軟語青燈耿茅茨願同南溪社敢望桐鄉祠隱賦贈胡道翁避地如避世入山思最深營營許史輩孰是巢由心落落泉石間而多松桂林結宇審容膝攬秀豁開襟娟娟青蘿徑粲粲緑綺琴一彈箕子操再鼓重華音張目視八極矢心發孤吟落日小山桂清風首陽岑薪歌發延瀨過耳何駸駸鳳吹聞洛浦遺響入雲沉自餘嗜接武焉得齒諸任慨兹芝蘭契重接枌榆隂少日志萬里揚名綴纓簮暮齡事一壑貴德比璆琳山居可相屬㕓隱渺難尋俯仰各遂志浮沉良足針申歌示相好重比雙南金謁荆叔麟墓蒼蒼登古原舉杯酹詩翁筆端千丈虹埋沒三尺封偃蹇萬籜龍强項氷雪中詩翁不可見直節與之同遊靈山尋沙監邑隱所往日嘗馳驅方春乍游衍行吟過隙駒去䇿尋山蹇梵剎夙未名髙僧迹初展猿枝積藤蔓獅石遍苔蘚攬秀詠獨竒臨流思何淺逃禪得名宦避亂棄軒冕濤回百川峻路畏九折險後發復遲回烟雲陟層巘題逺洲春曉圖溪流隔茅屋相去能幾許欲採幽谷蘭扁舟下春渚岸花綴衣襟水鳥驚笑語偶然諧真賞山翠欲成雨感春四首離離園中花曖曖空中雲匆匆南流景悠悠百年身美人遊不歸草色日以新朱絃斷白雲綺席凝芳塵魯門墮戢翼河津曝窮鱗人生能幾何為樂當及辰已矣勿復陳相思秋復春佳人在空谷幽蘭春自緑靜觀聲利場陽熖奔渴鹿惟有無心子抱琴媚幽獨揮絃送歸鴻一寄千里目徘徊崆峒巔還顧望北邙邱墓何纍纍春風緑茫茫坐令英雄人飲恨遙相望榮名安所之萬代同悲傷所以廣成子乘雲去翺翔樵隱同在山所以在則異昭昭孔明子遺語有深意清風灑賁渾千載凛生氣黃鶴望不來白雲老天際天心水靣渟泓常滿杯深靜若無力風起欲成文月來同一色飛簷倒影動觸砌輕波泐疑有謫仙人騎鯨在亭側新樂道中朝馳新樂驛暮走邯鄲道野水囓荒墳偃禾雜秋草傳云有飛雹著物物皆槁坐令原野間勢若磕逢掃離離逃亡屋板扉沒流潦豈無勸農吏但言禾黍好老農鎌滯穗哀哀哭蒼昊望南屏山同吕仲鉉仲實作游目南屏山逍遙稅塵鞅清溪亂流涉疊巘緣雲上輝輝瀑泉落隱隱天籟響荒途理通塞虛室靜𢎞敞中有餐霞人長作御風想不乘緱嶺鶴還顧漁郎舫芝草甘若飴雕胡大盈掌雖為頽齡駐亦忌流光往永懷山中遊觀化歷清賞七言古詩看山抵玉笥山下遇雨不能歸淹留信宿偶成長句秦山幾千仞翠入蓬萊城城中望山色明暗分隂晴老夫散䇿山前路為愛看雲不歸去仰看驚怪鷺飛來回頭或見雲生處崦中孤起如炊煙乘風騰上蒼崖巔崖巔宿雲喜迎接橫空一幅兜羅綿天風吹散銀千縷淡處是煙濃是雨雲師物怒不肯回露出峯頭尺來許一雨三日溪水肥老夫欲歸不成歸雲師知我慘不樂故出小譎相娛嬉老夫作詩一笑領舉袖收雲散空迥倚松絶叫山下人仰看雲峯起山頂賣馬吟馮先生貧惟一劒我今雖貧猶一馬聊同起廢病顙駒敢向人前索髙價眉山太史作新年賣却老驄為酒錢香山居士鬢欲絲始知鬻駱放楊枝我不學遊俠誇年少臂蒼挾彈章臺道又不能雄豪如二生千金騕􅒁換輕盈驥傳稱德雖云好終日芻粱未嘗飽不須戀廄動哀鳴㑹見錦韉金絡腦家傳清與白千駟非所求要將好消息寬我庭闈憂青鞋黃帽雖吾有可奈嘗從大夫後明朝欵段駕雞栖疾惡猶如朱伯厚白泉歌白泉之流白如雪白雪連峯幻銀闕浮邱仙子太華來頭戴星冠手持節一過西岩數百年靈芝五色何鮮鮮山中閲世已陳迹世上聞名不識仙浮雲鬱秀常五彩碧落空歌久相待幾欲緣崖采茯苓長嘯臨風望滄海海中遙挹安期生六鰲戴山休逺行風塵十載散空濶宇宙再新開太平太平人物世希有我欲看山待重九諸子重携緑綺琴三仙共酌黃花酒漁樵徑路草荒荒回首煙霞接混茫交游歘散塵緣重節序空酬興味長因招白泉雪更望白泉嶺别日吹簫駕鶴軿知是王喬到仙境寒食行次進士吳莘樂韻百花冥濛媚初日萬户烟消記寒食陌頭楊栁青搖搖栁底佳人雙翠翹春醪盈樽肉盈爼淚落飄風濕新土逺人無家望鄉拜慟哭松根憶前代磨牙豺虎亂交衢縱有音書倩誰帶可憐戰骨成邱墟不獨若敖悲飯盂白楊無根附春草作底英雄是中老杜鵑啼血獨魂斷感此凄凉夜中飯明年寒食望關山滿路山花君早還送祝平逺江城四月風雨夕聞說河流髙數尺故人官舫伴春歸解印初辭浯溪驛顧我南園萬竹林卜居未遂忽分襟曉山猶似來時好春水何如别意深别離苦多歡㑹少把酒聽歌思深杳外郡掄材紫詔頻要途䇿足青雲繞楊栁吹花媚錦衣滕王閣下弄晴暉懸知鼓棹東流去故舊遙瞻彩鷁飛戰城南餞友人從師西征心惆悵望重城城之南屯甲兵背河赴敵星火急走馬略陳煙雲生戰城南列飛將操戈矛脫弓韔生擒賊酋馬上歸壯士鳴鞭兩相向中有一人氷雪顔遙隨主將馳入關妖星如雨墮地殷殺氣上逐孤雲閒息民按節勞險艱鐫功勒石磐龍山紫薇花開掖垣裏黃麻詔出彤墀間城南班師君早還濠梁小立同宋有庸賦春城粉堞連營壘濠上東風發羣卉科斗元精細滿池茨菰緑苖低出水别來容易見春歸聨斾行吟踏落暉尋常百姓今誰在栁外年年雙燕飛遊靈泉寺寺僧談其祖師善寬伏虎事求詩走筆以贈山深欲無路木杪浮紺宇靈泉引青竹聲亂落花雨至人晏坐處戒刀伏龍虎馬駒獨何疑山鬼敢豫侮我生局促隨塵網每到寬閒聊偃仰但得螺螄吞大像㑹見溈山居百丈畫眉池趙宫昔日嬋娟子玉貌仙姿雪相似黛螺畫出逺山色欲照清流嬌不起折叉玉燕塵半洗依稀尚見承恩字荒池私蛙鳴鼓吹官栁莫妬蛾眉細
