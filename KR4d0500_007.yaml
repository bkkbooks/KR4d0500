body:
  text: 伊濱集卷七元王沂撰七言律詩涎張雄飛王君冕倡和詩韻二首繡衣光照錦城春肯忘吾家叱馭人别後有書傳白鴈夢中無路駕蒼麟江回灧澦波浮蜀山入函關樹拂秦何日東華聮轡語苦吟應怪鬢毛新黑頭天陛共收科猶憶城南攬轡過十載低昂回羽翮幾人存殁隔關河秋風畫扇情中斷曉鏡蛾眉妬更多聞說著書堆滿室長安不見起悲歌和魏伯時韻二首霜洗長空兔穎纎素娥青女曉粧嚴畫樓燕子年年别金鴨沈烟夜夜添鴈嶺宿雲低似蓋龍岡秋草瘦於髯屬車未覺清塵逺却為登臨野興兼氊車一字捲朱簾别館離宫禁籞嚴白海波聲秋後小赤城雲氣曉來添農疇已溢如京望萍實仍聞似蜜甜身愧甘泉陪法從獨騎羸馬走山崦和蘇伯修侍郎平村暮歸韻長楊冠劍列仙曹咫尺清光未覺遙賜履初辭青瑣闥鳴珂又過赤闌橋紫馳負鼓移天仗蒼鶻翻鈴響碧霄莫道都人新禁火焚香夾道聽簫韶和許參政寄懷吳宗師韻四首蓬萊仙仗正徘徊扈蹕年年宰相來慣見龍沙連白海却吟紅藥與青苔雲扶豹尾班才上日轉螭頭講未回凖擬相逢又初度菊潭供釀待華開遙望文星過上台長楊從獵未歸來名駒顧影窺丹鳳宫蕊飄香㸃緑苔賜酒滿浮金鑿落歌鬟低按紫雲回只今燕市求竒駿東閣懸知早晚開看雲老子立徘徊黃鶴銜書雲上來曽約相車遊紫府何妨䗶屐破蒼苔仙花又向庭中落宫水還縈苑外回一讀新詩思清壯如將圖畫坐邊開廣文華髮厭低徊驚見仙翁鶴馭來函谷關遙橫紫氣草𤣥門靜踏蒼苔何時宣室承釐後更約浮邱把袂回塵世茫茫誰與問秋風琪樹又花開秋興龍岡高處望凉亭山勢東來拱帝京雖愧櫜鞬嚴宿衛也將歌頌答升平御溝風漾鮫綃軟宫瓦煙開翡翠明院吏熟眠花影轉日長鈴索靜無聲銅雀􅒀稜倚九天非烟非霧滿山川天津析木星槎上五柞長楊禁籞連雲氣有時成翠幄野花無地著金蓮詞臣擬上東封頌扈蹕從今億萬年漠漠秋雲覆苑低九雛烏上女牆啼露從仙掌金莖白枝老珊瑚鐵網齊遙認車聲時轣轆莫令溝水自東西相如擬草長門賦勝費丹砂鑄裊蹄夀宏毅和韻有酒筒花擔之句再和答之賭酒金錢坐列曹風光南陌本非遙花香不隔葳蕤瑣柳色深藏宛轉橋駿馬有時嘶舊路游絲無力下晴霄天津偷得新翻曲肉味都忘不為韶羽林弓騎亦分曹楊柳春旗一色遙風送落花低逐馬水隨芳草暗通橋鸞旗捧日回雙闕絳蠟分烟下九霄病眼自憐張太祝衡門孤坐聽簫韶王善甫郎中見和鄙韻賦此答之兼簡夢得君冕二同年昔别髭生今鬢蒼天風吹雁不成行山河政自驚存殁鳬鶴寧須較短長杯面晴光搖蟻緑華枝春意囀鸝黃相逢未久還相送和我新詩字字香終南山色曉蒼蒼雞犬新豐自作行倦客獨憐春又過故人相見話偏長秦宫土在花摧碧蜀道梅時雨弄黃凖擬重來一樽酒竹萌衣解蕨芽香慶夀詩卷封事當年滿皂囊歸來雙鬢㸃吳霜風塵丹轂多春夢籬落黃花自晚香釃酒尚能留好客擊鮮時復溷諸郎漢家靈夀誰堪杖早晚蒲輪召孔光薛子敬母慶夀貴及親闈古亦希况逢化日正舒遲老萊耀彩慙簪紱潘嶽稱觴乏鼎彛大國進封鸞舞誥東朝寵錫蟻浮巵自憐懷橘終無日南望茫茫涕泗垂夀胡琴所并酬春日見寄時寓居王宅投老林泉賦老槃百年仍具漢衣冠宅邊五柳歸來種池上三槐借得看絶俗調高聞白雪結交契重見金蘭兒孫揔是登雲器袍笏堆床積漸寬華髮森森四十三不才心事與誰談驚人詩句君先得名世文章我亦貪雨歇溪流初泛緑雪消山色揔浮藍興來却憶新篘美昨暮過從飲未酣和王繼學題瓊花圖二首琪花瑶草本同科摹寫詩人費切磋楚客佩搖明月碎龍宫衣剪素綃多玉龜山接三清路烏鵲橋橫七夕河莫恮落英收不得雙環仙子夜來過天上春風自一科瓊絲雪蘂巧如磋花神定品應無二月姊分香獨占多已落為雲歸閬苑初開剪水散銀河喚回紅袖烏絲夢后土祠前幾度過過鄱陽湖東流浩浩逺朝宗聯絡坤維秀所鍾山入斷雲回白雁波涵落日見蒼龍英雄埋沒憐今古形勢開張扼要衝回望匡廬招五老紫烟晴瀑界雲松寄來峯長老不見是公又幾秋碧雲吟罷憶湯休夢回江上招提境書寄淮南賈客舟玉塵尾分獅子座曼陀花雨鷫鸘裘當年曽悟身如幻凖擬滄浪沒白鷗送式上人還高麗三韓東望渺雲烟野鶴飛歸不計年鼓枻海師能聽法獻珠龍女解參禪珊瑚樹礙浮杯渡薝蔔香薰擁袖眠好把新詩書側理碧雲佳句要人傳題山水圖住近仙家雲錦溪結樓高與白雲齊丹崖翠壁參差見流水桃花咫尺迷道士養丹清似鶴山翁愛酒醉如泥毫端寫出猶竒絶况復西風一杖藜答清江劉仲修青春詞翰蚤蜚英白首林泉更負名好古獨懷韓吏部交歡曽枉范雲卿滄江逝水金川淨錦樹浮雲玉笥清逺憶瑶琴諧雅操敢辭擊節和新聲送李西溪巡檢作吏湖山亦自竒君行况及落紅飛公庭白日文書少野店青林笋蕨肥楊柳風翻沽酒斾桃花水漲釣魚磯懸知賦得江南樂笑我緇塵染素衣送朱生之湖州巡檢楚客才高不奈秋得官歸近白蘋洲村醪可飲山圍坐夜柝無聲月滿樓雲水歌傳青雀舫風塵夢斷黑貂裘鬢絲禪榻應憐我懶向湖亭覓舊遊送巡檢湖州著鞭跨馬欲風生絶勝窮年老一經鳴鏑應弦驚雁落傳杯刻燭賦詩成白蘋洲渚橫秋水畫舫笙歌奏月明若過湖亭煩寄語三刀未夢雪添莖送王巡檢王郎巡檢赴官時江水江花映彩旗可但彎弓能落雁仍聞刻燭解題詩青烟古戍人畦菜白日公庭吏奕棋坐嘯使君端好士薦書應到鳳凰池送謝仲連之小鹿巡檢興言擕手過烏衣曽記風流玉雪姿緑鬢同驚今日雪錦囊各誦昔年詩芳塘草滿春回早古鎮峰多日下遲莫把青衫試鳴鏑要憑征雁寄相思飛來山越絶山如龜曝背越王馬迹白雲中神鰻躍出杯吞海靈鷲飛來翠插空島霧深迷龕影月松聲清和塔鈴風前身𤣥度來何暮應悟三生一夢同除夕示袁仲修三年魚鳥笑人頑家在江南幾日還客裏惟君青眼舊醉中憐我綵衣閒詩成臘酒春燈裏歌斷梅花月影間夢裏不知歸路逺朔風吹雪滿關山虎牢關雙崖突兀引羊腸仰望遙空匹素長今古太行青歷歷乾坤元氣白茫茫英雄底用爭天險真宰那知闕後防回首三分書裏事區區縳虎笑劉郎和張孟功侍郎監海漕見寄詩省眼星郎給一軺銀河路逺鵲成橋吳歌閩語來江島雨楫風帆趂海潮紫府夢回鳴玉佩珠宫吟罷寫氷綃只今歲運須劉晏宜有忠言答聖朝和潘子素寄張伯雨詩白雲何處是巖阿聞道松聲滿淨窩京洛風塵人老易江湖秋水雁來多田園蕪沒須微祿親友凋零半逝波欲問囊中餐玉法相思夜半起悲歌瑶草年年滿澗阿高人燕寢自名窩山中丹井龍歸晚雲上仙飈鶴占多瓦榼尚餘京口酒布帆無恙洞庭波掉頭巢父誰能得歸聽吳儂小海歌送秦元之江南漢家原廟重祠官五載春風玉筍班華表鶴歸曽有語鼎湖龍去渺難攀清名瑞世猶周鼎昭代思賢定楚環莫道江鄉鱸可膾仙人合住道家山次仲弟子啓僉憲過洞庭湖黃鶴樓前曙色開吕公磯上首重回平湖盡處青天出積雨晴時白鴈來千古戰爭餘舊壘百年歌舞廢崇臺昔人總逐流波逝猶想清風被八垓晨興聞賜妃入廣次心吾逺傳天上降宫花重拜丹墀踏御沙憚看鴻飛思故國嬌羞馬上問誰家珊瑚作枕分龍席錦繡堆床壓象牙適意相知南北異帛書休寄雁行斜寄題王子榖望親樓樓與牛山相對宣溪孝子重彞倫高起書樓遍望親馬鬛早時封若斧牛山長日淚沾巾梁間歸燕時尋主簾底飛雲每傍人料得北平新紀事應同家乘勒堅珉題劉南山翁五世畫像贊鶴駕羣仙未易招偶因圖像見清標渾源山水猶神秀喬木風霜自寂寥六世衣冠歸盛族百年文物記前朝石田惆悵蒼苔滿西望長吟不自聊題周伯溫玉雪波千樹梅花照眼明主人詩思與同清雲裁野服侵寒著玉種高田帶雪耕柿葉滿忩書已遍松肪浮甕釀初成扁舟莫動山陰興宣室承釐待賈生送麥敬存檢正湖廣省黃鶴磯頭春水生蒼龍闕下送君行才因朱墨紛然見詩到江山勝處成蘭省分僚官獨重玉堂伴直夢同清瀟湘無數回飛鴈採得蘋華寄别情寄王顔隱士南園分首記當年東郡文星逺避躔機事秪生鷗閣下徵書不到鹿門邊中囷歲取禾三百美酒時煩斗十千倘憶幽禽能喚客還家留取杖頭錢和古愚留别韻細柳南薰拂錦韉路人爭看玉堂仙詩書將揖紅旗下歌吹生陳絳帳前沽酒何須分祿米揮毫莫惜費吟箋夢回無奈漁陽摻猶勝青門聽杜鵑滎陽道中橫帶鴻溝底用爭只今春草為誰生一邱貉了當年事千載槐留後世名牛口谷前逢急雨虎牢關上看新晴成名孺子何勞嘆笑殺窮途阮步兵七曲文昌祠夾道松陰護石苔龍盤七曲上崔嵬初無瑶席椒漿奠空望靈旗鶴駕來樓殿參差雲雨上江山環合畫圖開紅綾餅饀當年事四十人中愧不才草堂浣花老翁不可見浣花草堂何處尋鸕鷀曬翅錦江岸鸚鵡將雛榿樹陰數畝林塘誰是主千年韶濩有遺音一杯重酹郫筒酒叢竹蕭蕭風動襟題子午谷孤秀軒手種孤松不記年終南山色兩蒼然虬枝曉滴研硃露翠蓋春藏種玉田膏化龜蛇蟠厚地聲疑笙鶴過羣仙陰崖茅屋誰能到落實應留待偓佺題滑臺宋夀卿侍御西亭侍御高懷與世違秋空惟見一鴻飛山銜落日浮佳氣亭繞青松長舊圍醫國舊傳多讜論卜居從此脫塵鞿回瞻太白橫秦嶺猶記澄清攬轡歸題裴公亭古木蒼藤翠作圍裴公亭上立斜暉波沉海底珠宫見雲起峰頭鶴馭歸明滅時看金鯉出徘徊閒送白鷗飛欲携九節仙人杖直上天壇一振衣送陳玉官柳飛花滿薊門河橋猶有繫船痕美人欲别重携手春水方生易斷魂虎豹天關雲自隔雞豚鄉社席還溫虞卿莫厭窮愁在著就新書細與論賜履欣聞出尚方歸來雙鬢㸃吳霜趨朝長樂鐘聲晚猶夢名藩燕寢香八座輝光聯紫極千年遺愛在甘棠蘇臺明月清如許直送鳴珂入未央送張蔚先生紵袍入賢關名動綺襦紈袴間羣空冀北目先過草長江南人未還氷鱗斫鱠醒午醉紫筍烹茶消晝閒扁舟安得落吾手卧看苕溪溪上山送張楨黃龍關塞雪漫漫馬上貂裘不受寒豈謂紬書隨太史翻令索米困長安舟移彭蠡秋波白樹隱匡廬夕照殘歸弔當年鄭公業旅墳三尺草先乾送董仲潛大明殿上早朝時奏對聲聞白玉墀鵷鷺班行爭動色雲霄勳業蚤相期燕鴻夜月回清影郢樹春風發故枝明月扁舟瞻魏闕五雲樓觀鬱參差送鍾起元龍岡南去接榆關挾䇿逢君幾往還作賦風沙鞍馬上橫經紈袴綺襦間彩毫曽㸃宫池水白苧時看輦路山笑我清狂解吳語鑑湖未乞鬢先斑送梁受之宦遊南北馬牛風燈火停雲偶爾同升斗可能留隱吏山川終要著詩翁呼盧竟識袁彥道飲酒還逢陳孟公早晚朝廷聘遺逸蒲輪應到大關東送孫伯起畫省含香近上台西江千里聘竒才山川雄控龍沙濶機務遙分鳳沼開帳幕時隨春草動狐貂偏耐雪花來只愁誤作潯陽夢醉聽琵琶句易裁送陳醫之尚醫乘傳過龍沙新賜貂裘奈雪花白鼻騧驕肥苜蓿青氊帳小響琵琶長安賣藥誰能識梁苑延賓禮更加别後相思一回首五雲深處是京華送虞愷之花時寂寂掩衡門恰到花飛又送君病眼輕來猶斷酒故人别後少論文江波處處明於草世態年年薄似雲寄語青城老樵客藥成金鼎幾時分送劉子節馬生詞賦賈生年三語風流到處傳朝路衣冠裁鑑密慶門酥酪弟兄賢江頭酒醒梅花外天上書回鴈影前寄謝邦君惟坐嘯芙蓉幕府玉堂仙平陽驛留題市烟官樹鬱蒼蒼駐馬城邊望太行楊柳杏花春已半遊絲芳草日初長山圍晉館千峰翠水灌汾田百汊黃無奈風沙西去路羅衫銷盡舊燻香題漢州驛錦水東來繞故城江干樓閣倚新晴鵝黃怕醉郫筒酒犀角欣嘗巴竹萌可惜海棠經雨盡空看榿樹拂雲生薛濤風月無人繼誰唱陽關第一聲拜朱文公祠武夷不見此心勞得拜遺祠解鬱陶喬木春風思未已泰山晴雪仰猶高扶衰民極同先聖刮垢陳編到楚騷往事浮雲千變盡不妨江漢日滔滔汾陰春寒猶戀紫貂裘楊柳青青古渡頭詞客重來應白髮好山依舊枕寒流禹門波淨龍吟夜汾水烟消鴈影秋駐馬回看自多感更須橫笛起高樓發寶雞重關復棧厭崢嶸喜見川原掌樣平猿嘯回看鬼迷店馬嘶遙指鳳翔城隋宫漢館依稀見渭水秦山逺近迎却是春衣濕梅雨南薰古道怕塵生巴東秋風亭汾陰祠罷濟樓船豈謂雄才悔暮年半夜神光飛后土明朝寶鼎薦甘泉山河氣壯中原勢簫鼓聲沉蔓草烟今日秋風亭上望白雲猶是漢時天
