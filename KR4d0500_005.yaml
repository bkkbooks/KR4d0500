body:
  text: 伊濱集卷五元王沂撰七言古詩妬女祠關頭妬女祠古屋高亭亭靚粧袨服過其下往往霹靂來青冥翠鬟巒隱隱玉佩泉泠泠曉月吐粧鏡晚風羅畫屏與誰同躡鳳凰去玉宇瑤階常不扃人間歲月如流電回頭試望昭陽殿爭妍固寵幾多時飛燕婕妤俱不見題趙子昂畫馬龍媒來自月窟西誰其牽者虬髯奚雙瞳紫熖竹批耳一團黑雲錐卓蹄吳興學士畫無比筆迹逺過龍眠李雄姿不受絡頭絲滿紙蕭蕭朔風起公今騎鯨去滅沒世上有誰憐駿骨安得幽并豪俠相往還短衣射獵藍田山月堂為賀醫賦賀生早飲上池水心如秋空絶塵滓紫蓋峰南結屋居囊中探丸起人死長安市上識韓康宴坐歸來月滿堂江上誰能聽瑶瑟山中應許得金漿雞嘆清晨有雞步庭除朱冠蒼距秀尾舒投粟不啄鳴向余豈欲臆對如鵩乎我生羽族五德俱風兩如晦而不渝警君貪眠旦讀書胡為以我充庖厨我生曽不餓鴟如奪攘不愧為人驅填腸滿嗉誇自呼摩空唐突羲和烏彼不彈射我是圖我獨何辜君何愚題劉彥昭杏林春曉圖閒看杏林蔓柯條每到春晴花最嬌彩雲終日净如拭綘雪有時吹未銷檢方清潤浮書庋接席繁陰落酒瓢舊遊回首已十載杏實纍纍須見招沔陽驛山回江轉流百折山翠蕩摩江色淨羣飛野燕低掠水獨立晴鷗閒顧影居人十九癭纍纍見客何曽羞掩領鄉音巴蜀雜咸秦而我聞之不能省送武秀才還湖廣衡嶽之峰七十二祝融特起摩青𡨕連巒叠嶂妬竒秀盤屈怒作蛟蛇形噓雲吐霧埋不得空翠飛飛落洞庭武生家居洞庭上湖水為沼山為屏橘洲種樹等千户石鼓讀書窮六經焚香白晝鸞鶴下鼓瑟清夜魚龍聽一朝結束催客丁思與衆人朝滄溟含毫擬獻上林賦置醴亦厭侯門鯖東華塵土紅撲帽夢寐汀洲蘭芷馨腐儒老眼千年青遙看南極老人星安得酒舫載酒行長與酒徒共醉醒車轔轔車轔轔易水濱恩澤侯竄南州南州迢迢千里道雄虺呼風搖毒草朝盤蜜蝍暮鵂鶹瘴霧著人人易老昔日朱門炙手熱金紫童僕姬姜妾烹羊炮羔易折葵墮珥遺珠輕掃葉一朝禍起蹈危機上蔡無由黃犬歸金籠鸚鵡喚新主畫閣美人猶故衣故衣空憐香未滅肯信繁華有消歇君不見湘江斑竹有餘㾗竹上斑斑竟誰血題李遵道枯木孤根偃蹇蟠厚地廉藺千年有生氣叢篁瀟灑勢拂雲王謝諸子超人羣李侯筆端妙如此坐我小山烟雨裏安得天風來萬里仙槎快泛銀河水送上清張叔大錬師東還芒碭王氣浮天關真人乃在圯橋間功成往事赤松子心與浮雲如等閒上清億劫元教起坐引諸天黍珠裏昨聞仙子御風來身著山中紫霞綺東海塵飛二十年仙凡消息兩茫然守關暗識青牛去渡海春逢白鶴傳五陵八百遺仙記思欲攀天問天帝三尺青萍手可提一品銀章肘先擊笑把芙蓉花相期訪蓬島不見河上公空懷橘中老大明治世龍漢秋倐來倐往應難留月明後夜碧天淨笙鶴送爾緱山頭太古樓為余鍊師賦道人鍊質同蟬蛻回頭甲子焉能計曽見彭聃嬰孺時解記軒轅以前事願憑黃鶴寄短書借我縹眇之仙居安得霞飱野服長健八千歲著書細說天人初虎牢關孤雲兩角如劃布中有長天懸匹素關頭一上眼豁開漢殿秦宫皆可數太行之青遺塊小下視黃流一絲裊乾坤勝槩無古今一笑英雄如過鳥長謡我欲問真宰世事茫茫幾成敗君不見三分書裏說虎牢曽使戰骨如山高老胡賣藥歌西城賈胡年八十一生技能人不及神農百草舊知名久客江南是鄉邑朝來街北暮街東聞擲銅鈴競來集居人相見眼終青不似當時答术丁師心已解工名術療病何煩說難經江南只今成樂土異代繁華復親覩全家妻子得安居篋裏青蚨夜還數燈前酌酒醉婆娑痼疾疲癃易得瘥金絲膏藥熬較好傷折近來人苦多川船南通有新藥海上竒方效如昨眼中萬事不足論流寓無如賈胡樂題李後主畫山人騎牛圖君不學嵩山劉屯田鐵笛牛背吹雲烟又不學廬山陳處士目送飛鴻坐牛背問君胡為偃蹇牛背眠結草為轡蓑為韉山童抱琴走如鹿溪溜沒膝衣鶉懸南唐天子畫無比深宫晝長雲夢水揮毫寫出逸人容清標照耀澄心紙期人太淺陋相如妄謂山澤儒皆臞安知有道棲草野食雖不玉顔長朱繁華已逐西風盡空餘建業文房印凄凉天水柳枝龍白鴈江頭又霜信發福昌望女几山弔辛敬之竹雞喚雨催遊人提壺勸客意最真連昌宫中一杯酒不負落花啼鳥春東風忽來吹女几翠縷參差為誰起不見能詩辛老子卒與老饑相抗死清時亦有郊島窮况乃天地兵塵中書生糠籺苦不足朱門蒼頭飽粱肉李子實八十李翁眼碧眉紫烟見者疑是商山仙庭前花發三荆滿膝下衣裁五色鮮畦蔬可茹泉可釀冠蓋時時問無恙青鞋野服步履輕不要漢家靈夀杖題古愚逺碧樓峴山鱗鱗翠初洗勢若濤瀾低復起秋高水落衆峰出野曠烟消數鬟委嵐光分流與尊酒秀色浮空來席几先生久厭承明廬晚歲重紬金匱史肩輿不復用門生結屋于兹有兒子駟馬歸來延福里倚闌琢詩萬事理溪流可釀為翁夀絶勝南陽菊渾水春江釣者白鷺洲頭春水生青山倒影碧波明閒門却掃流塵靜深樹似聞啼鳥聲漁舟蕩漾持竿久世事茫茫不回首釣得金鱗換酒歸夕陽正照垂楊柳周博士伯溫次韻見示和以答之硯紋女髮緑新洗硯質女膚滑凝水海犀壓紙風不起妙語縱橫能泣鬼子官中祕覽羣玉古意清風如可掬畫闌鹿眠香草軟繡簾燕掠飛花蹙經惟舊講思無邪裊蹄新鑄丹穴砂好陳聖主賢臣頌莫讓淵雲來漢家老夫南望江上屋只有歸田賦堪續買舟留詩供一笑有入定憶顔光祿雕玉盤螭歌我有雙盤螭文藻光陸離自非蟾肪昆吾刀雕法精妙曷以為世無李伯時解作洗玉池又無吕與叔能辨璜與􅋒貫之雙帶祇自竒豈惟比德古君子亦可借題君王詩别外窩禪寺四山如城勢如東一徑蜿蜒入穹谷林端縹眇浮斷香知有招提映深竹山僧見客若麋鹿揭炬夜開方丈屋談空煮茗欲忘眠月轉金盆掛喬木朝來鐘磬亦多情餘音送我逺益清自憐踈拙招物議敢厭犖確疲山行青山勸汝一杯酒問我他年更來否送項可立歸養天台林烏返哺朝陽枝倚門手取連環持木奴青黃屋角垂遊子心驚懷橘時有親七十世上稀况君抱得明珠歸斑衣兒啼真樂在擁笏垂魚徒爾為愛君德器溫且厚藍田烟霧生瓊玖安得赤城瀑布變春酒為太夫人千歲夀燒山羣峰峩峩錯鯨齒頑寒贔屭氷脫指獰飈折樹怒未已黑雲壓山山火起初疑夜過古戰場走燐出沒秋草黃又疑兵散井陘野萬馬赤幟隨低昂倐如斜陽下喬木江浦漁燈相斷續諸姨紅袖照驪山齊奴錦帳圍金谷長烟遙遙橫楚氛怒熖烈烈奔吳軍炎官播弄水妃怒九輪照燭乾坤焚窮蛇上木不遺力驚鶻穿雲勢何急熊羆相弔獵夫喜桐梓哀鳴山鬼泣紛紛飛燼隨西風回首咸陽三月紅怪同燃犀弔牛渚快若照燕焚吳宫陸渾仙去文章伯千載風流冷如鐵怪詞險韻吾未能物色分留愧逋客蜀禽林端錦鳩鳴逐婦林下竹雞啼喚雨逺認丁丁啄木聲近愛關關栗留語提壺只解自獻酬畫眉雖工誰媚嫵何年失國號郭公何帝遺魄為杜宇姑惡怨出誰氏夫婆餅憂焦誰氏女夏雞侵曉促耕夫山狗臨昏警行旅惜無柘彈落鴟號恨不雕籠貯鸚鵡山鴉澤雉雜羣龍百族喧啾誰復數林棲澗飲性各適雄飛雌從了朝暮豈惟清美巧音聲亦復斕斑好毛羽老夫萬里蜀道歸馬上新修蜀禽譜泥滑滑泥滑滑山鳥啼馬蕭蕭人未歸聲聲喚起風和雨高柳畫橋西去路回頭勿憶去年時老盡行人路如故送春詞黃金臺下東西道紫燕矜誇金勒好長溝漾情情不盡碧草迷人人易老樓上迎春又送春邯鄲兒女嬌翠嚬一聲鵯鵊鳯城曙滿眼芳洲生白蘋柔桑繞舍麥如尾錦雉將雛梅結子為問歸耕江上田何如但索長安米漞石硯天孫染雲緑初洗剛風吹落熙河水龍工呵護睡不起探頷適遭西域鬼昆吾寶刀利切玉秀色可餐潤可掬隋宫百斛分黛螺何似文君一嚬蹙侑之黃金古辟邪土痕隱隱凝丹砂那知建業文房物流落灤江好事家翰林夜半光射屋廣文高詞韻莫續校讎喚取劉更生定有青藜照天祿白翎雀白翎雀龍沙漫漫生處樂醒鬆共愛語言好璀璨誰憐羽毛薄霜威稜稜風力緊飛飛不過槍竿嶺結巢生子草棘間雌雄相依寒並影梨園弟子畨曲譜歲歲年年兩京路慣聞清哢雜好音旋理氷弦移鴈柱寫出新聲玉指勞真珠落盤鈐撼絛坐令華筵之四壁灤河流急秋雲高從此流傳喧樂府爭買千金比鸚鵡雕籠雖好無常主時向北風念疇侣又詞烏桓城邊春草薄草際飛鳴白翎雀年年馬上聽好音疑是氊車響絃索南風吹雲沙磧凉飛塵不到紫游韁芙蓉金照晴川逈芍藥紅翻灤水香灤江已過猶回首華堂美人將進酒酒酣忽作馬上聽紅蓮袖插曹剛手廬陵解先生之子子元見示詩卷因次韻交遊聚散如團沙忍使白璧生微瑕賓鴻自顧好儔侣猛虎莫恃雄鬚牙乃翁臯比坐談道根極理要遺浮葩泮宫要看富芹藻茅屋未許鄰烟霞賢郎早歲事著述經學奧妙窺永嘉娛親自有筆五色長身鵠立衣猶麻天門九重見明主彤庭左右皆驚嗟京華旅食厭葱韭江國歸思多魚蝦垂天佇化北溟翼老圃莫種東陵瓜他年懷綬拜家慶小窗夜雨燈先花送紫虛道人紫虛道人羽為裳骨如削石瞳碧光鳳凰城裏秋風起龍虎山中瑶草長燕齊方士皆與友賣藥得錢即沽酒手持青竹或成龍自種靈苗時化狗飄然忽賦太山吟南望白雲深復深坐令京洛塵土底似聽石泉風雨音問君胡為樂枯槁富貴輕塵棲弱草世人如鹿死無魂安知海上如瓜棗高空山人高空之山多仙靈山泉可釀田可耕烟消日出紫翠橫倣佛羽蓋揚霓旌高空山人世簪纓玉壺滿貯氷雪清風流不減謝內史翰墨欲壓山元卿今年七十髮未白胸中梨棗栽已成焚香永晝鸞鶴下橫笛清夜蛟龍驚碧蓮供吸酒過客或騎鯨便令呼麻姑共謁王方平握手一笑三千齡撫頂何勞授長生壬寅紀異同劉以和賦壬寅仲春天雨雹南平城中盡驚愕初從屋瓦亂奔騰散入階除更跳躍兒童不識挽衣盛兩兩相看恣相謔老來閲歷憂患餘却顧兒童淚雙落春秋咎徴不一書兹事班班宛如昨自從兵革十年來澒洞風塵亘沙漠奮當車轍小物為天理何嘗宥元惡竊聞李郭收西京元氣依然萃光嶽旄頭夜夜粲中天風虎雲龍聖人作嗚呼風虎雲龍聖人作吾徒勿憂在溝壑房公湖房公昔年為刺史日日湖邊看湖水琴中不識董庭蘭觀過亦足知君子漢州修竹緑如雲落落相看有此君兒曹謗傷等蟬沸逸氣自是超人羣我行金鴈橋西路緑樹啼鵑怨春暮鵯筒拍拍貯鵝黃一酹房公舊遊處題明皇幸蜀圖華清朝披霓裳舞日晏漁陽動鼙鼓潼關烽火照驪山玉輦西巡劍門路劍門崢嶸高切雲長安不見見烟塵嫣然一笑侍君側腸斷昭陽第一人巴雲𡨕𡨕上亭驛羽蓋低垂翠華濕鈴聲琅琅雨聲急宫嬪不眠內官泣君王起坐寫新聲明珠玉佩相和鳴鮫人綃梭夜停織山鬼倚樹愁天明弄兵祿兒帳下死神器潛移遽如此高將軍去侍臣稀往事欲言誰與理泰陵野草凝荒烟蜀山春樹多啼鵑教坊花氏閟真譜惆悵側聲今不傳由東綿虎坳至浪川望石人嶺阻雨留宿田家臘月南薰吹度關我行始識東綿山篁牙連峰雜雲樹蔚若虎豹文采相班班奔湍噴壑雨外急惡鳥啼晝林之灣泥路滑滑傷旅顔晝移木坑始歇息午飯未已仍躋攀前登虎坳險有客壠上還息肩弛擔問鄉井更說前途方險難荷戈壯士揭竿南蠻當關守禦乃為國而我逺道蒲伏何時閒山風薄雲山雨惡石人嶺頭石鑿鑿僕夫跬步不可以徑升下有豺狼上黃鶴豺狼攫人肉黃鶴翔寥廓我獨栖栖風雨中足繭荒村竟誰托田夫曉出夜未歸田婦呼兒慰牢落瓦盆酌酒酒數行藉草歆眠散腰腳山中雲重浮嵐寒身上濕衣猶未乾今人學古事干謁歲宴先歌行路難
