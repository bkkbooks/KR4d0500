body:
  text: 伊濵集卷十八元王沂撰記樞宻院斷事官㕔題名記元朝舊制一切政務皆斷事官闗決中統初紀綱浸備迺立中書總庶務樞本兵柄其屬任之重眷注之隆實均焉故典樞軸者必勲舊重臣乃心王室坐定大議其位尊望崇司莫敢齒其機務之繁則置屬以總焉故建斷事官視中書凡聽訟決獄寄請徵比程期㑹紏愆違屬焉可謂繁且重矣才足以經逺徳足以鎮浮智足以謀治體識足以達事幾而後克稱厥位繇是而秉鈞衡授節鉞踵相躡也嵗月之不書姓名之不紀則又何以表見於後為法將來今幕府之賢經厯管罝勒蔵布知事郝端輯而志之且琢於石以圖不朽其意至深逺也在至元初斷事官始設二員已而増至八員階三品開幕於至元三年設知事一員已而増經厯提控按牘各一員令史初置三人繼増至八譯史一通事一奏差一典史一盖疆宇之廣生齒日繁則事務益滋此其勢所以増多也雖然謹其名者將循之以稽其實也今夫前人名氏之著行事之美其風采可想見也來者其亦慕乎蕭規而曹隨於以見朝廷得人之盛祖宗垂憲之意循之無窮至千萬世則豈不偉哉樞宻院經歴司題名記天子嵗清暑上京中書分總百職率屬小大相維以從而上樞之地皇武是經喉舌之司為股肱之體必勲舊大臣任之以輔弼皇圖羽儀近列然宻勿之司事機甚劇以故幕府聨屬偕上比還題名存故實也都司白君徳源請書恭惟我朝聖聖相承盛徳大業度越前古五兵載戢海宇謐清龎鴻之恩浹於品庶中和之頌暢於風聲是固列聖致治之效大臣協宣之力然而賛畫可否舉措損益幕府諸君盖亦與有功焉授經署板屋記至正元年皇帝肇開宣文閣以稽古右文迺設授經郎二員以教世戚勲臣之子孫建學舎内苑以嚴中外之别豐廩餼給筆札俾無外慕所以長養其材以待上之用法至美也而考徳問業者皆入侍帷幄出備警蹕以故大駕嵗清暑上京必從授經郎二員在扈從列他司皆有官舎守者洒掃以待釡盎百須皆具惟二授經郎一解鞍即遑遑謀僦居夫豈師嚴道尊之意哉明年六月近臣奏故藝文監為授經署古屋岌岌覆壓是虞後四年授經郎寶格董鑰始除治其地為板屋牕户秩然暑雨無蒸潤之患沍凍無摧䧟之憂乗駟而來者若歸焉矣雖然不事一室者昔人固曰有其志居一日必葺亦古人之所謂賢者後之人時易其腐朽而新之則其利豈有涯哉是為記石室書院記石室何以名祀漢文翁也曷以祀之古者建學先聖先師各因其國之故禮也今先聖先師之位定於一祀之禮與曰郡邑先賢得祠於學宫猶古也然則何以書蜀有儒自公始祀有書院自今舒嚕侯始書謹始也初侯有宅承教里其地亢爽宜講藝其位深靖宜妥神謀斥新之為書院乃請於省部使者相與圖之如不及故材不賦而羨工不發而集為殿以祀先聖為室以祀公講有堂栖士有舎重門修廡以制庖湢庫廐以序又割俸購書作祭器於吳而俎豆籩篚罇爵簠簋皆具而經史百氏無外求者祀斂其新都膏腴之田畆一百五十所入廟幹其家僮二百指既成而嵓才里秀接踵來學至元六年侯來京師請記漢史載公之治蜀開學校以詩書教人而從化者衆有道則嚴遵李仲元洽聞則張寛文章則司馬相如王褒揚雄時漢之興六十餘載矣公一倡而鄉人翕然況乎一道徳而同風俗者哉蜀在宋季為邊郡民纒焚剽之毒百餘年王師南戡成都最先下太宗皇帝墾除艱阨提擕赤子置之樂土累聖繼以休養蕃息嚮之援枹擊柝今則田耕井飲矣昔之重闗複棧今則東阡南陌矣太和之所涵煦孰知夫百年之深歟既富而教非方伯連率之職歟表顯以風厲多士不在公歟讀其書想其人凜乎如見之也況低徊是祠之下者哉夫有先賢為之依歸有賢方伯連率植之風聲作為宫室教肄之翼然而峻整耽然而崇邃而市囂之聲弗聞錦江横陳玊壘環峙而山川之秀可挹也潤澤之所被華藻之所敷學於斯者心移而神曠氣閒而意消漸摩乎擇善修身之道涵泳乎詩書禮樂之中於以窮神知化於以開物成務出者為唐虞處者為洙泗可也詎特作為中和樂職之詩以歌詠盛徳如漢何武輩而已舒嚕侯世長萬夫知夫文武之道寓於干戈羽籥而以築宫育士為急其賢乎人逺矣故余樂為之書侯名多爾濟字存道官雲南都元帥云祀河瀆西海記皇帝以嵗時致禮名山川臣沂辱將命大懼弗克稱上意享神祇以輯嘉瑞以至元六年二月廿九日馳詣臨晉祠河瀆王禮有常已而祠西海王禮如之夫百川之大者曰河海先河而後海禮也豐楙於是乎報黎庶於是乎穆此上之所以崇山川之祀而神祇所以嘉享萬物所以降輯也哉祀濟瀆北海記至順三年二月甲辰皇帝臨御之五年集賢院臣伊嚕勒特穆爾奏嵗時巡祭嶽瀆祈為百姓育穀宜以儒臣充使臣沂與焉遂以其年五月已夘奉薌幣率通議大夫監懐慶路事臣阿什克特穆爾即濟源縣濟瀆清源善濟王祠庚辰之日齋於廟中有司用當而黎庶不知壇場燎煙賛見一如制明日旦祀北海廣澤靈祐王如祭濟瀆禮盖三王之祭川也必先河而後海而神祇可得而禮遲明享神餕雲氣覆野膏雨大洽初池水昏翳若蓄黛既事澄澈明瑩若鏡然此實聖人心通天地致其昭受而顯答臣沂將薦盥復何幸焉是為記紫邏口記伊陽之東汝陽之北有山曰紫邏口背汝而面伊嶄然相峙其中汝水東注其竒麗閎廓為登眺浮游之最由其下以望則兩崖側立千尺石芒峭發丹碧陸離天横其上杳杳疋練耳由其上以望則羣山􅍶嵂蜿蟺庸附穉列遥遥如畫山多美箭傑木怪卉野藤轇轕恑石蓊葧幽谷其上絶壁摩空蹊僅容趾有鶻宅其巔旦必逺戾求食野鴿居其傍者甚衆皆弗擊反若與之相狎者豈栁儀曹所謂卓然有立者邪下臨巨潭其深莫測平若蓄黛沉沉無聲或云怪虬潜其窟嘗從大魚數百尾出遊每見必有獰風劇雨之變豈韓子所謂固含畜以儲陰姦者邪由潭之右數里山曰雲蒙石益竒樹益老瘦有泉蛇行伏見激松杪墮石齒鏘然而鳴琅然而清其下重洲小渚㣲波遐響涵澹澎湃相應迭和如鳴珮環奏琴筑晨夜不絶其傍石洞窺之深黒其上峭嶮不可窮竟其中窈然篝燈然後可行漸下數里洞陰淋漓淒神寒骨竟莫能窮其外飛瀑一瀉千尺跳珠濺雪流若白虹豈山靈善幻挾其伎以娛夫擯落山澤者邪抑聞山川必有竒勝而後名竒勝必待人而後顯若子厚於鈷鉧潭子美於滄浪亭其一泉一石經題品者皆照暎天壤間二君可謂不幸矣潭與亭獨非幸歟噫兹遊之所得鈷鉧滄浪不專美矣惜乎余非其人也不知千載之後俾人思紫邏之名如二君否重修廟記鳴皋廟以祀南嶽尚矣闔境祈禳請輙應厯數百年當元統初元駐戍兵千夫長克哷君景兖顧其棟宇勢入腐折懼㣲以報神之功迺令人籍禱祠所入謀屬吏鄉邑之老合財力撤新之為正殿重門修廊采章炳如民承事益䖍始於元統三年三月甲子落成於其年五月後二年當至元三年景兖之子瑪克夲求余記或謂禮山林川谷丘陵諸侯在其地則祭之衡山於洛其逺數千里祀之禮歟余曰山有嶽豈以崇髙廣大抜其類哉亦其出雲洩雨澤及萬物威靈烜赫警動兆民所被者廣則報禮也衆庸豈一郡一邑所限域哉觀夫鳴皋諸峯其勢雄氣秀猶紫蓋天柱石廩之森列其巖壑吞吐猶朱陵之臺而太虚之洞也況一氣之所流通者哉既紀其事且繫以詩俾得歌以祀焉曰伊之山兮參復差曰祝融之峩嵬匪祝融兮我民之思伊之流兮深復深曰湘水之沉沉匪湘水兮實勞我心山雲兮冥迷靈風兮清淒神之來兮駕六螭盖翠羽兮旌虹蜺翼翼新宫兮神既安止煥乎龍章兮粲兮黼扆山祇朝兮走厲鬼我牲刑兮酒復㫖神既醉兮錫繁祉富我繭絲兮我倉如坻祐我室家兮夀我耄倪秋我有報兮春我有祈猗千萬年兮歌此銘詩慈脩護聖禪院記禪學之盛盛於東南而杭為東南之一大都㑹宗門尊宿實證實悟擔荷此事莫盛於杭而富為杭屬邑此慈脩護聖禪院所由建也初正悟圓明大師年甫髫鬌葷血不接於喉吻稍長棄其家從斷崖章居士持頭陀行誦大小經論日乞民間而鉢中之施弗勝食户外之屨弗勝數里人馮青捐貲營屋以居之榜曰慈脩庵乃禮浄慈雪庭傳師受具落髪又叅天衣魯庵㑹師求究竟法既而諸方客衲以為法器腴室望旗争相歸重計工鳩材為重門步廊殿宇中峙穹閣後臨寢廬方丈庫庾庖湢各以序列又塑佛菩薩觀音大士天王像雲披月滿金碧煥發極莊嚴相存之妙鐃鼓魚螺鐘磬之徧具完搆端乎至大已酉成於泰定之乙丑是固象教之尊向慕者衆而然亦其願力之至有以動人故為無不成也至順辛未國師賜號正悟圓明大師且額其庵曰慈脩護聖禪院師董氏子名行脩初丁未戊申嵗大祲飢死疫者骸胔狼藉師用浮屠法歛而焚之且率其徒誦經環遶喻以迷悟因縁後至正三年富陽尉白君書來請記白尉姻家也故余不辭而書鏡湖接待院記越城之南泝鏡湖而上五里有山萃然起於中流繫舟石觜繇山之椒紆餘而登中有浮圖精舎蟠深據險擅其形勢僧了源者主之四方釋子蹻巇越阻旦暮相面背於門突無熄煙了源竭其田之入移而棲之廬而弗勌以故其徒翕然信嚮披攘經畫不挽而同迺合聚施易故而新増下而髙而殿宇重門㽎㽎然矣既事㑹余逰越請記其事余謂物之盛衰有待於人而道之廢興亦然先是時其徒累累詘戒叛律分庖割席不啻傳置視其廬也於是遏鐘鯨之鳴拒户外之屨而院亦濵於廢者數矣則道之廢興詎不以人乎哉今夫是院也水天横陳乎前羣峯擁環其左右周三百五十里浩茫空濶島溆間錯山連如珠或植如殳雲湧水波摇曳蕩磨汗漫融液蜿蜒鬱積風雨變怪千狀萬態野盡天垂煙樹離離輕颿短蓑釣磯耕隴或見或隠延顧無際意若遐騖太空者心夷體舒神廣氣閒客塵妄想銷落弗留表裏翛然蛻俗遺世此宜子之徒長往深遯而不返者也尚何已之私而道之叛邪了源舉足動念因敬生慧故能矯羣庸而累世其為之也不貳其卒之也不私不唯利身在利人不唯利今在利後嘻此其封植其道何如哉是不可無傳也院始於宋咸淳間修於皇朝泰定甲子冬十二月西方聖人中土中扶䟽枝葉分南東此動彼應雷與風心傳宻付實證同惟一不二乃正宗勉哉衲子勿惰慵摩尼在水月在空丹碧焜耀殿複重巍然層閣増竒雄六時天樂鳴鼓鐘龍天呵護罔不恭甘露普雨年穀豐慧燈可續傳無窮復修廟記太后其先吳人後𦵏長陵而廟祀於伊洛者盛自前古余竊感焉昔髙帝之興吕以佐定天下功為后戚姬以華色專寵而太后獨以仁善稱髙帝崩吕后刼攘神器操殺生柄戚姬以幽死而禍迨其子獨太后以希見故得出從子之代後代立是為文帝為漢仁主迹其福祚而擬夫强暴佞幸者猶霄壤之懸絶也抑所謂天道是耶非耶彼吕戚之死泯滅無聞久矣而太后至今猶思而祀之豈非世之寵位當時則榮沒則已焉而徳之在民者雖逺而不忘也廟在伊闕之東搆於宋建中靖國二年記於伊闕尉張華之文金季廢於兵獨古殿存岌岌欲顛丹素翳昏至者不肅古碑斷裂仆地余佐伊之三年乃與其耆老率錢姑易其圮腐而新之雖不能復其故盖有待也昔韓退之遷揭陽懼不得脱死過黄陵而禱之其後拜祭酒卒以私錢治其廟噫余之竒於人也久矣而敢望信於神也故書於壁以識嵗月云希濂亭記希濂何以名武略侯景兖逰息之所前翰林學士涿郡盧公之命名也侯龍沙人也宦達者也希於濂也何居濂溪也周子茂叔之隠也古之人有起士㑹於九原弔靈均於江濵者而況於濂溪乎然侯於濂也希之云乎友之云乎希之而不足也友之而無以致其至也於是慕其平生之所嗜好焉濂溪之愛蓮也蓮花中之君子也然則侯於蓮也因之而想見其人也思其所以為君子而務及之也滮池北流其清且漣既見君子載笑載言傳夫千載不傳之傳嘉翰林之名之義之淵美侯之屏棄其所挾而尚友於古之賢筆夫而拙而陋而鄙之沂之言既書其事又為之歌曰我思古之人登斯亭而徜徉夫何廬阜之遥遥兮懷先生而難忘曰可懷而不可見兮窺遺編之洋洋仰光風而容與兮滌我心於滄浪製雲錦以為衣兮綴明月而為璫潄碧流之餘潤兮襲嘉卉之遺芳樂吾之樂兮聊於焉以翺翔慕亭記吴母汪夫人之疾革也子謐禱於天乞以身代弗獲請又乞紓其疾以待其父及兄歸又弗獲請則刲臂肉和藥以進已而疾少愈既踰旬夫人易衣坐而暝既𦵏謐兄弟為亭於其塋之右春秋登於斯望其墓而祝以寓其孝思焉因名之曰慕沂聞古者祭於廟虚中以求陰陽之義具物以將孝敬之誠備矣墓祭非古也雖然致愛則存致慤則著祭義也今夫宰如鬲如者非遺體之所藏歟蓊如森如者非神明之所依歟深静而闃寂者非精神之所聚歟時乎霜露之變近乎耳目之所接非著存不忘乎心之義歟後之君子制禮作經則亭之設豈不合古義而得今宜者哉吳氏兄弟知所以慕其親則知所以敬其身知所以敬其身則知所以順於道知所以順於道則知所以全而歸之知所以全而歸之則慕亭之洒埽有繼矣静復齋記國學生任震名其讀書之室曰静復奎章學士尚君既大書以扁之而問其義於余余曰生居京師亦嘗觀於市乎雞鳴而爭趨日中而駢闐揭價名物恐人我先鼓石詆欺左睨右盼逐什一之利而卒流徙無常者往往皆然若乃豪丈人者長軒邃宇坁粟京稼籌算掛壁萬貨四輳其享之若固有其應之常有餘其素所樹立然也學之欲立其心也久矣後生末學莫知法誡之設邪辟之防而情想汨之利欲昏之忘已以狥物棄真而取偽惟得之務而欲之求一旦衒鬻而不售則反視平昔所有皆陳腐剽剥無所用之往往轉而易業是與㕓夫販婦曷以異哉若夫質之美學之粹不馳情於外誘不棄日於無用操存之固而涵養之至湛然其中如明鑑然知其不善則速改以從善此復之初九所以不逺復無祗悔顔子之學也雖然是豈死灰槁木然哉傳曰知止而後有定定而後能静然則在於地乎在於人乎在於端居默坐終日無事而已乎由是言之不在乎地不在乎人而在乎心也樂閒堂記知閒之為樂者何人哉世之仕者居卑思巔在外思中逐逐然計功謀利之間罹尤蹈禍而不悔者固不知閒之為樂其有志願遂聲名著頭白齒脱懸車而歸約居獨㳺而思徒御趨走賔客之造請於前茹而藜糝衣而大帛而思芻豢之適口紈縠之華體陋巷窮閭而思公宇之宏麗軒豁安有樂乎哉其有宦達而全多棊壠繩畦擅竒擇勝醉醲飽鮮絲竹在前羅紈擁後非不足以自娛也然静念疇昔之鬻獄賣直覬倖枉義顛汗心悸惴惴然鬼責是慄於樂何有必也糠粃軒冕土苴富貴而後知其為樂也吾於院君見之矣於潛之北望之鬱然秀者曰白鶴里里之北有山迤邐而起伏者曰千秋嶺負嶺面溪上有屋數十楹則院君燕居之堂翰林學士虞公集題曰樂閒者也堂之陽老桂偃蹇森秀麋芬雲蔚軒曰延桂堂後植竹數百竿蒼翠轇轕可愛君早以才行顯今年八十餘耳目聰明聲音滿堂日從子孫來四方之客與夫鄉人之老杖屨樽席笑歌偃息駕乗之勞不接於體機擭之畏不萌於心以忘其年以遂其志世人之所不能及者獨得也其真閒而能樂者哉其孫昌言問業廣文館因其㳺謝君閏徴記於余昌言孝謹篤學盖有以成君之樂云是為記望松亭記京兆張君克禮之先隴既樹以松又亭其旁登亭以望則列植而交陰條暢而碩茂直而幢曲而盖立而人卧而虬此亭之所以名也邪予曰未也是松由蘗而拱而圍而任棟梁雨露之所濡沐霜雪之所凌厲寒暑晝夜之往來而吾親日以逺矣其為思何如哉是松之生生也不已而吾思吾親亦不已凡君之宗族少長相從於此也其亦同此心邪由是心而推其孝可知也豈惟宗族為然凡三原之人過其阡目其蓊然以深森然以髙者因而感君之不忘其親化其善自一家而刑一鄉由一鄉而推之無逺豈惟化其人將見其松日以盛甘露膏其柯葉醴泉潄其根而靈烏巢其間馴鹿遊其下也詩曰孝子不匱永錫爾類此之謂也
