body:
  text: 伊濱集卷十五元王沂撰序彭氏世譜序番陽彭氏有學道龍飛山之上清宫以清淨無為之㫖祝釐上方制授太和靜正成德真人曰承祖以所修家譜見示㑹廷議修遼金宋史方求故家遺記望喬木而遐思發幽光於既往竊考故宋盛時名家巨族之子孫更南渡後而仕宦顯著者猶厯厯可述內附以來邈乎無所聞豈必有待乎賢者而後有以亢其宗耶真人寄跡方外而能不忘其先緝其家世行事如此抑賢者之傳固當有見於後世也耶按彭氏自重黎為火正世其官後至鏗封彭城而受氏有子曰武曰夷得道建之崇安山後人因名其山曰武夷其後分合之由逺難徵矣今諜自故宋而下始書蓋謹之也初少保之先自崇安徙饒之番陽世有潜德少保嘗曰天下事可人意者其惟教子起家乎故五子悉使就學果大其門若樞密使汝發寶文閣待制樞密都承㫖汝勵諫議汝霖朝奉大夫知衢州死金兵諡忠毅汝方一門兄弟並踐華要嶷嶷相望寶文立朝大節為丞相范純仁所推許自可以見其原本之深固而知其流裔之長久盛大矣寶文三世孫曰大問官信州司户司户孫渙草九公嘗過薌溪之北愛其溪石林泉岩壑之勝因家焉且戒其子孫以漢龎德公為法距今十餘世子孫既多而皆力耕以奉公上讀書以訓閭里其用意至深逺也今譜自少保而下三百年間世緒既逺枝分𣲖别散居樂平之厲陽餘干之土橋安仁之彭坊又何其盛也噫詩書清門能不墜其素風淳德斯可謂能世其家矣真人之所以求書其端者感傳緒之在兹遡世德之不易其亦知所重矣哉寶善堂序物常寶於所好山林江海所蓄藏瑰竒偉麗之玩是物之難致者人得以為寶由世之好者衆也善吾心所固有其求之也無鑿深穴逺篝火腰絙之艱無懸崖絶壑蛟魚虎兕之患其為寶也以之禔身則純終令聞以之理人則心悅誠服其流風餘澤被於千萬世權懸乎瑰竒偉麗之玩饑不可食寒不可衣者猶霄壤也然世知寶者少詎非嗜欲障蔽充塞使然與雖然世有為不善者矣人也動而之禽獸行也動而之罪辟生也動而之死亡可不大哀也乎亳徐克清以寶善名堂搢紳大夫既永言以表之而請其說於豫余謂克清知所寶矣然不免有意之纍也有意為善利之也假之也無意為善性之也由之也是言也吾聞之宋大儒云張道微居安堂詩序居之安難矣哉今夫囿於膠膠擾擾之蹊喉喘顛汗而不反與蠉飛蠕動均死生此固莫知安為安槁項黃馘之士超然獨立卓然離世宜其無適而不安也乃今張道微以居安名堂其哀夫世之薾然者衆而自適其安歟抑求其所以安而未得歟曷思而曰吾之未有吾身也果何在乎吾之所以為我也孰為之乎求是而不得也則所謂安者惡乎在夫大塊載我以形勞我以生而欲安乎猶畏影而走逃雨而濡必也神明藏於無形精神返於無始莫死莫生莫虛莫盈甘瞑乎無何有之鄉而後安可言也若然者詎特關尹老聃莊周之徒聞其風而悅之鄒魯之士搢紳先生亦有悅於此者矣道微字允幾主恩州之瑞雲聖夀觀學琴與詩能從賢士大夫交游故往往咏言以美之而請沂書其端送圖烈敬甫序文宗皇帝廷試郡國髦士於時圖烈圖敬甫收甲科授承務郎集賢修撰比三載歸湖南覲省或曰敬甫齒甚壯氣甚鋭文甚富敡於王庭甲俊造之選退瀛洲之仙馳聲耀譽聞於公卿雖去親數千里之外猶朝夕侍其旁也雖書信歲不過三四至猶朝夕與之上下語也乃今翻然歸詎其父母意余曰不然驊騮騏騄天下之俊馬也必蓄其力然後一日千里杞梓豫樟天下之良材也必養以歲月然後可支大厦敬甫展覲承顔溫凊之隙學以植其志信以篤其道則其所至詎可量也哉是行也持余言簡其大人必粲然曰愛人以德莫如師魯其言拱璧大鼎也是為序繫之詩一章帝城三月春遊絲正橫路之子賦驪駒征衫裁白苧忽聞長樂鐘回望盧溝樹樹上有慈烏飛鳴送君去文采比於菟承明厭直廬湖南芳草碧渺渺正愁豫書寄上林鴈羮煮武昌魚莫道江山好朝家有聘車送陳衆仲序沂至順二年始遇莆田陳君衆仲於京師時衆仲用薦者由布衣入教國子生奎章閣侍書學士虞公伯生今御史中丞馬公伯庸皆注意髙仰之以故名實震發暴耀一時已而見其文章詩閎肆俊偉語出驚人久而知其學問穿貫經史百子其較古今證成敗若鑑照若决拾應機而發若乘載决積水而伯禹為之講畫若驅蒲梢駃騠蹈平地而王良握其銜策也衆仲固可謂魁礨特起之士而二公可謂善知人者也頃之沂待罪博士始欲致所慕於衆仲而衆仲遽去將問其都授諸生者而就學焉而衆仲反求言於我昔陶朱公將之楚謂其友曰奚以贈我其友曰我窶人子也衣則短褐食則粗糲彼長劍佩玉緩步濶視而懼我俾吾震栗不敢仰視皆供子指呼者也子不能捐萬斛之升斗以起吾病反我乎索忍人哉衆仲於沂亦若是然陶朱公善富以其積而能散也衆仲為助教五年執經北面考疑問業者猶挹水於河取火於燧計然之策遂矣今提舉江浙也將見其至不幾日人士譁曰自君之來也少且秀者得以勉老且憊者得以依惰者勵頑傲者革學校風俗於是乎一變矣此又所謂富好行其德者耶同館之士咸右其賢惜其去而欲其無久於外也賦詩以送而沂為之序送熊生序初余過昌平識南昌熊天瑞既而擕其詩如干篇示余既序其端而天瑞來請曰吾先子潜德不耀翰林待制揭君曼碩既銘其藏而太常諡曰通孝吾為子之責其庶乎今我老矣將歸大江之西君其贈我以言天瑞客梁宋間數年乃至京師曵裾王門而無出無車之歌交名卿大夫而無彈冠之望或欲羅而致之門下辭不就也獨於余文拳拳如是抑如老父取張長史之判也邪昔子輿與子桑友而霖雨十日子輿褁飯而往食之子桑鼓琴而嘆曰吾思夫使我至此極者而弗得也余文之陋其與褁飯而食之者輕重何如也送馮翊序聖朝重風紀之司故掌案牘者必慎其選使者歲再周行其疆書史二人從凡訓農勵學紏官慝求民瘼與鉤正違遲於簿書皆其職也其視諸司為難況真定距京畿五百里揚為東南之衝為諸郡之首幅員驛傳之所㑹其譽與毁易致也其視他道為尤難夫知其難則為之也不易不矯以異也不俯以同也不歸功於已而貽疾於彼也兹難也正其所以為易也與國學生馮翊學行完潔為諸生所推祭酒博士以其名聞中臺檄淮東憲將用矣遂書以勉之送董生序始余讀韓非子書曰長袖善舞多財善賈於是悟作文之法乃取古人書讀之研索以求其精渟蓄以富其積蔚乎其春榮薰乎其蘭馥皆我有也已而讀莊周逍遙游司馬相如大人賦又愛其架空鑿堅刋陳趨新危如易轉之卵如層起之蔓如獨繅之繭而不絶於是又悟辭必我出而後工出而不窮而後竒彼長袖善舞多財善賈特其淺淺者耳既而讀韓子書味其晚年之論曰文無難易惟其是而已於是又悟韓子所謂是即夫子所謂辭達也彼莊周司馬相如於辭固工蹈道則未也雖然余自結髮知學今三十年矣力疲於事物意耗於疾病涉獵而未醇也粗淺而弗精也然而毁譽不入於心窮達不易其守蓋亦有年矣其於道也是歟非歟疇昔之所得於古者其亦近之歟趙郡董旟嘗從余學為文其歸也遂強次是說以贈嗚呼生有志於斯其尚懲余之不敏也夫送李思道序始大名李生思道由臺臣奏應博士弟子選余異其誦說有法文辭剪截整飭問昔何師對曰事江左李君子材於淮南來京師事今翰林學士蜀都謝先生時子材捐館二年矣聞其教授淮南日徒衆甚盛夫以李生觀之則其漸涵之深切劘之效何如哉然而從子材於淮南者較之固不人人皆然而李生獨然則又知生之所自致者亦穎然絶衆矣而翰林方為天下育才俾生從之久則其所至又何如哉因二公之為教李生之自致而信夫學不可以無師也世習日陋後生小子率師淺習邇所志不越簮裳之末所玩不逾程試之文十金謁書肆閉門而誦以脂澤其言鞶帨其技曰吾業足矣碩師良友近在州里且弗暇過而問焉況逺乎今生獨慨然求師友以自益既南之淮又北之京師其志篤矣此余所謂穎然絶衆者歟雖然士以一身之微而欲窮天地萬物之理生千載之下而欲考古昔聖賢之心豈易為力哉必也功循序而不躐守據正而不渝庶乎其可也生覲其親淮南晉人張君仲舉余友也生其問之當於斯言有不約而契者矣送劉復初序昔余過山陽之墟弔淮隂之功而慨其不終意其俗徑悍而輕剽也訪枚臯父子之迹而讀其遺書意其士尚藻黼而工頰舌也既而拜徐仲車先生之祠嘆其純孝篤行足以化徑悍輕剽之俗其仁義之言如天球之音威鳳之鳴視藻黼頰舌之習又何其陋也又意大川長谷之間窮閻敗屋之下必有獨得其傳而深藏不市者山陽劉復初省其兄京師比還因余遊髙舜卿請言意義理之在人心未嘗泯泯吾於子之行卜之也子訪於其所與遊得其人焉求所謂治心養氣者以自勵且吾告焉可也是為序送曹溱序初許文正公以集賢館大學士祭酒國學乃奏召舊弟子散居四方者若耶律公有尚髙公凝姚公燧等十二人驛致館下以齒貴胄其後皆為時魁礨知名士自此以來嵓材里秀用舉者得受業如弟子員滿百人歲貢八人甲掾六部乙為郡博士各四人遂著功令由是而處從官大臣之列備文儒道德任者班班矣余為博士之三年諸生曹溱以甲科貢求余言為别嗟乎余何言君相長育人材恩至渥也師友磨礲灌養之功至備也而昔人之風聲氣烈未泯泯也先民有言百年之迹粲乎其如前千載之議凜乎其在後吾子勉之而已送張宗德序嵓材里秀之齒貴胄於國學必繇三品朝官舉而後補其員限百人既補然後尚書御史祭酒司業考試取其中科者而為第其甲乙以名升於禮部甲為六部史乙郡博士歲八人謂之出身較之貴胄讀而後始雖無分積計日之勤然登名薦書者或逺至十餘年其法詳且密如此余為博士之三年諸生滏陽張宗德以待次告歸且求贈言余方欿然以不足乎人師自愧於生之行且有嘆也初許文正公之避宅左揆也以集賢館大學士祭酒國學奏召舊弟子散居四方者若大梁王公梓大名韓公思永蘇公郁東平耶律公有尚雄姚公燧燉髙公凝河內孫公安秦劉公季偉吕公端善劉公安中太原白公棟十二人者皆驛致館下固無待於朝士之薦而限員次補之格也其觀道德於前後聽教誨於左右而業以之精行以之成或助教國子或編修史館或提舉儒學又不囿於六曹史郡博士也十二人者其後皆居從官大臣之列備文儒道德之任勳名顯白繼武當世豈其鼓舞作興之機薰陶涵養之妙固在此而不在彼耶余為此愧久矣宗德歸而植志以力學彌道而襮藝他日嶷然有立以繼乎前人之風聲氣烈無以久次而戚戚也樊彥澤山齊詩卷序余觀樊生寫形與神如明鑑取影斯亦專且精矣意其挾專且精者遊乎通邑大都媒其身以譁世鉤貨乃以山名齊若能遺外聲勢而徜徉邱壑者其進技以道者耶其亦吾心有得於是而樂之也夫人物之相好惡必以類育羣物而不倦焉四方並取而不私焉山也古之進技以道者亦因物而不用吾私焉生於斯技其樂之於心而不用其私者耶樂山仁者也仁者之迹雖逺而傳其名而覽其像者莫不嗟咨涕洟而如見其人焉彼檮杌嵬瑣姦回凶慝雖赫赫於一時而隨其世泯泯矣庸詎傳其像耶然則生之心其有慕於仁者耶抑亦警不仁而勉之為仁耶余故敘以問之髙生野雲詩卷序雲之行乎太虛也或拳然而獸或偃然而人或軿軿兮車蓋或錯錯兮魚鱗或林巒之敷舒或樓觀之嶙峋彼搏而斫之者其氣之神歟觸石而出勃怒衝鬱六合一氣何生不育或覆䕃乎堇荼或霑溉乎穜稑或益涓滴乎滄溟或浩流潦乎川谷其綱而維之者理孰得而燭也今夫大塊賦我以形也齒毛頤口須目耳鼻孰為之知以長動類賢愚壽夭貴賤參差或妍或媸有萬不齊或蒙瞀而乘軒或沖明而褐衣或跖而壽或顔而饑其裁而為之者孰得而窺耶彼昧者亦挈挈然冥迷於得喪眩惑乎同異是猶灑濯其神超江漢以為尋常之津懼奪其氣見立表以為搏噬之鬼是故氣之寓者君子不言時之合否盡其在已得是道者窮居非所慍冠冕非所喜髙生彥文先京兆人歸而藏修亭扁野雲將油然有作而良苗懷新將脫屣囂氛而蠖屈不伸既莫得而知又孰得而陳徒指夫山中之雲而書以贈君送張常道尹隨縣序國子助教張君常道出為隨尹八館儒學之士相與賦詩飲酒送於齊化門外或曰常道以謹願褆身以經術教人恥心鉤距惠文乃今充百里之任難矣哉襄陰王沂曰是乃所以任百里也司馬遷序循吏謹身率先居已廉平而已簡而易用也要而易守也世之聲才幹揚風采者則比比鷹擊毛摯以自衒救火揚沸以趣辦彼愚而神者有塗義而室嘆者矣才乎才乎非吾徒之才也夫德義以漸澤惠愛以熏蒸而化冥冥而微赫赫之聲古所以治今則曰迂奮髯抵几䎒䎒以武斷俾庸夫孺子驚駭稱快古所為淺丈夫今則盜治辦名矣夫名之倒置不足計而心所存則當辨名於嗜利於啖等私耳其諸心乎廉平顓顓乎謹身帥先則庶幾君子遺風矣詩曰芃芃黍苗陰雨膏之此其心何如哉隨為邑遐僻山窮川阻無珍貨竒産其俗醇厚無椎埋剽掠之姦夫土之瘠則善心易生也俗之美則易從化也而常道以經術理之謹厚帥之民其有不從者乎隨之民其可賀也夫送廉縣尹序廉氏由魏國孝懿公著清德於時垂令名於後子孫守其家法雖顯於朝廷登於輔弼不以門地驕人其世德然也士矩少而濡染典訓脫略貴美既長從先生國子講論道德以求其益退託於布衣韋帶如素習然已而登至順三年丙科為翰林檢閲益力學問為文章賢士大夫皆慕稱其人而士矩歉然常若不足於已者是固世德之美亦其見善之明學之而後至也久之出監五河縣衆謂士矩生於髙門而强學力行有過於人者當路要人孰不欲知之而乃自試於川窮山阻僻絶之鄉豈不背馳余曰是乃所以為士矩也昔歐陽公少時官夷陵取架閣陳年公案反覆觀之見其枉曲乖錯不可勝數夫以夷陵荒逺褊小尚然天下固可知也乃仰天自誓自爾遇事不敢忽也其後每對學者多談吏事或問之曰文學止於潤身政事可以及物士矩之自試也有以也哉本末之相須體用之兼舉學之所以成已成物也士矩用力於斯久矣吾知其克紹先烈必自此始於其行為序以朂之送李縣尹之舒城序淮民朴野重厚愈於他俗況舒被漢朱嗇夫之化耶以故士之官是邑者咸樂其土風其交游亦樂為歌詩送之況吾所素善如李圭卿者耶初圭卿為虹縣余為臨淮壤相接也圭卿練習文法於事擲根觖節馭吏如束溼吾知必辦治舒矣雖然朱仲卿俾其民稷而社之尸而祝之實廉平不苛之所致漢循吏蓋如此班氏紀止五六人而文翁冠之文翁實舒人也倡文教於蜀而司馬相如王褒嚴遵揚雄之徒出夫以朱邑之遺化也文翁之故家也圭卿知所取則矣送余闕之官泗州序元統初郡國髦士咸進於有司時沂佐考試得淮南余闕對策意甚偉之既而覆於天子之廷果中甲科釋褐授同知泗州比行之沂别請言或謂子猷文雅韻宜列館閣乃今願效一州孰失之歟沂謂君子貴乎全者無所處而不宜也夫以黼黻之采金石之音以聲文至治子也固宜俾方千里之民貧可富富可教庸非子責歟射者工乎中微拙於使人無已譽君子易於自將難乎必時無我用吾知儒林詞館將不子捨矣泗為州𨽻縣五臨淮其一昔吾尹是邑愛其民之質野朴木易治教使移也吾亦慨慕桐鄉嗇夫雖不能至然心鄉往之夫以吾之疲駑而民從之若此矧夫以子之才耶以一臨淮民受賜曷若五邑之衆耶繇是吾豈繄慕漢朱仲卿亦將子慕矣雖然仲由居蒲子賤治單父昔人入其境見成效而後稱之吾豈繄子慕於是乎觀子矣子以為如何哉送李舜舉轉運判官序兩浙鹽課歲所入不以時上宰相擇人理之於時鄴城李君舜舉擢都轉運鹽使司判官舜舉雅與余接間過余道所經畫余曰浙漕歲經入幾何虧幾何余皆不能余聞古之善理財者使變通不倦故公私兼足今之議者孰不曰法之壞久矣盜鬻之繁滋也警邏之弗密亭户之困敝也撫柔之未至而求利課豐羡難矣哉余則曰不然今之禁網加密矣而私鬻盜販者皆猾民豪室囊槖游徼戍之卒事露輒巧法相躔也而釱於市者則躡短素困之民仁恤之恩非不至也牢盆之費或朘削於下而潦薄旱墳則莫能隨時為令於上也今之往也將因循其故耶吾憂民之重困也課之虧也宰相任之之意其然耶抑求其弊而更張之耶則必御輕斂散之權而杜因緣之姦可也彼前世良吏上以裕乎國下以足於民者豈有他哉亦勉乎此而已舜舉以明敏之材潔廉之行由丞東曹掾試工部司計聲譽動一時夫材之敏足以變因循就功效行之潔足以表帥而摩厲之上下習於事則又能明乎得失之源吾將見掌邦計者無南嚮而慮矣於其行遂書以送之喬顯孝義詩序貢禹之疏曰何以孝弟為財多而光榮何以禮義為史書而仕宦父勉其子兄勸其弟是為賢耳漢之俗如此則其變世易俗化正天下者可知也喬顯居衣冠車馬之會珍貨竒産之聚萬足一心恐人我先而顯泊然自如以孝義名鄉里官為表其閭豈獨顯有其過人而教化之隆風俗之美自近以及逺由內而及外若決流抑隊者從可知歟咏而詩之固宜
