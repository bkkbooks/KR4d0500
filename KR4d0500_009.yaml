body:
  text: 伊濵集卷九元王沂撰七言律詩為上饒鄭良楚賦菊莊秋菊為糧杞作蔬石泉自鑿帶經鋤伯休賣藥無人識魯望能文與世踈沽酒有時招木客揮絃還解出淵魚晚香採得為親夀坐對南山讀道書冷泉鄉道中簡書驅迫走西東原野蕭條嵗欲窮草屋斜陽留過客山田餘雪記來鴻禪心原入西方社世事㸔如北塞翁歌罷驪駒始歸去當年王式不湏同宜陽道中貂裘零落據征鞍兩鬢塵埃一笑還世事遶成羅帶水客愁遮斷錦屏山呼風喬木氣猶壯不雨孤雲心未安安得三鄉塔為筆盡書佳句夕陽間東禪寺林端孤塔語琅璫木老烟深路渺茫嵐氣嘘雲吞佛屋灘聲挾雨撼僧床休官先製尋山服避俗重燒結願香只恐清脩逺公社未容元亮醉為鄉感懐漫郎何事强為官旅思愔愔帶眼寛春草池塘詩入夢杏花時節雨生寒白鷗雲水盟猶在老馬風沙興已闌我愛當年孟東野歸書只是説平安遊秦望山江山歴歴子長遊秦越興亡貉一邱滄海猶誇鞭石渡仙山曾為採芝求神鴉上下隨鹽舸官栁參差集戍樓臨眺無窮知古意巖花自雨鷫鸘裘挽張菊存摳衣猶記列諸生昨夢那知奠兩楹任道自期周九鼎論詩人比漢三明斯文未用悲麟獲令子還能續鳯鳴愁絶侯芭抱元草西風吹淚濕銘旌挽沈菊泉姑孰歸來鬢欲絲按行三徑菊花枝琴尊寂寞成千古邱壑風流自一時玉樹忍㸔埋馬鬛錦囊能復賦蛾眉生芻遥奠蘆溪道丹旐風生草木悲挽何潛齋漢濵冠蓋自紛紛遺老翛然玉雪身白帽空歸滄海客黄花猶識義熙人悠悠往事千年鶴凛凛髙風一角麟精爽邱原藏不得長虹㑹見燭蒼旻挽張書巢青門冠蓋日紛紛丈室翛然獨見君元晏自憐長卧病茂陵誰復柬求文橘洲田土無新業書幌塵埃有斷熏不待隣人解横笛西風吹淚濕江雲水木清華亭湘中處士絶塵氛嵗晚移家寄白雲棋局偶攜林下看鯨音時向葦間聞鹿門妻子甘長往谷口聲名莫見分翹足故林歸未得舊盟空愧海鷗羣和楊汝似奉遷三朝御容玉堂詩韻二首玉函寳軸降琳闗曉色扶桑眩晃間天濶鼎湖龍自去秋髙汾水鴈空還衣冠久矣藏原廟羽衛猶疑幸道山儒館小臣生獨晚却從圗畫望龍顔冠劍星羅拱北辰魚龍曼衍列勾陳遥瞻天仗移金界尚想鑾輿下紫宸瑞日曈曨浮絳闕仙雲縹緲䕶宫茵道旁鮐背咨嗟久曾是先朝擊壤民為貴溪張真人賦象山道院勝地豈惟仙窟宅仍聞先哲此絃歌氣涵金碧溪山秀澤潤詩書簪組多䆉稏花浮香遶屋芙蓉旗動影摇波祝釐他日從天下重寫黄庭換白鵝題浮雲道院後記木奴秋實綴黄金桐樹孫枝斵素琴浮世㡬迴丹轂換故山依舊白雲深知魚日日來濠上抱甕年年老漢隂倦客題詩一惆悵有盟重與海鷗尋瑞雲宫道人索詩書此以遺之仙嵓石髓碧崔嵬曾見神仙㡬度開七字持身慙聴瑩一言悟主本非才偶逢和璞何勞問不識桃椎亦漫猜記取明年杏花發道人休忘我曾來送道士徐中孚之武當桃花流水絶塵囂絳節霓旌到泬寥天姥峰髙先見日龍池波動暗通潮芝田自合仙人種琪樹那容野客樵後㑹皇家祝釐事為君騎鶴過山椒留題靈泉觀山城三月客添衣賦就閒居却自違春水畫橋人獨立夕陽茅屋燕相依百年杯酒留連醉萬事風花自在飛我愛聖門蘧伯玉囘頭二十八年非太行道中岡巒重複勢奔羣石磴參差齒露齦人似夏蟲初見雪馬如饑鶴欲穿雲并州豪俠凋零盡晉國山河逺近分却怪無情是汾水流波日日送斜曛題西嵓書院湖上新居絶垢氛湖邊石筍挿層雲堦前書帶長堪剪沙際拏音速更聞明月只捐神女佩光風誰續汜人文一麾吾欲淮南去叢桂山中有古芬避雨浄土院遂宿是日春盡風助灘聲入夜喧雨供苔色上僧垣鶯花昨夢空禪榻蠶麥歸心入故園少日鮎魚思上竹年來野鶴畏乗軒山靈珍重巖間石留寫先生醉後言登越州古城參差殘雪照樓臺晚上孤城眼豁開嵐翠週遭迷禹穴海雲明滅認蓬萊千年往事空流水一片殘碑自古苔惆悵稽山無賀老輕舟載酒為誰來題耿叔開政績卷上都留判平疑獄沙苑鷹師脱械時太史巳書循吏傳廣文仍賦好賢詩圜扉一旦銷寃氣老吏經年費獄辭見説長楊新校獵歡聲雷動羽林兒遊普照寺弔張齊賢墓逺客相逢飯顆山飄然瓶錫為誰還朱門畫㦸何人問古像昏燈盡日閒異卉風前縈錦帶遥山木杪吐青鬟老僧心已如枯木為報禪門不用闗和景兖梅花詩韻殘雪離離㸃燒痕畫橋流水夕陽村玉妃謫墮縁何事翠羽飛來亦斷魂寳髻斜簪春意好羅帷深䕶晚香繁滯留東洛身千里孤負西湖酒一尊哭次兒仲孚風雨他山竟不歸重闈老淚豈勝揮丁寧地主㸔新壟太息隣家乞故衣住世百年誰不死過庭萬事痛相違青春况説升平近白首何堪骨肉稀送蘇伯修侍郎扈蹕之上京晴川金鯉出芙蕖持槖仙郎得句無禮樂又新三代制丹青應上兩京圗雲端馴象扶雕輦仗外明駞絡寳珠擬待賜酺祠馬祖華光星裏望驪駒送謝子良驛丞之京水驛論交舊著名春城分袂若為情空羣竒驥長千里惜别流鶯更一聲白下雨收梅子熟清江風過栁花輕歸船暫泊應囘首五色雲中是玉京小孤山江風澹澹散江烟聖母祠邊曉泊船萬壑奔流東赴海孤山拳石上擎天花留珤靨珠纓合樹繞粧亭水鏡懸絶頂盤雲㸔未了似聞神語珮泠然送左衛教授馬伯誠將軍緩帶擁輕袍俎豆初陳卷豹韜祗許攜壺來問字何須舞劍助揮毫旌旗影逐春風轉絃誦聲連夜月髙細栁依依莫留客蘭臺給劄待英髦送胡古愚左衛教授落絮飛花送客舟樽前容易失詩流也知太史才名舊自是將軍禮數優説劍夜窻銷蠟炬横經朝幕坐青油漢庭正議東封事莫向周南嘆滯留送李禎之東陽教授敬亭山下宛溪頭曾見騎􅚪汗漫遊留滯京華追往事蕭騷鬢髪又驚秋仁風欲贈袁宏扇朗詠誰同謝朓舟極目亭前佳勝地一杯還憶故人不送趙徳翁教授常徳州問君捧腹笑何事笑我生逢雌甲辰豈但下帷傳老子翻然囘棹覓秦人伏波祠畔青楓晚招屈亭前白芷春莫把新詩教楚女竹枝歌罷恐傷神送黄希明教授南歸兼寄其父秋江徴士二首少微曾近上台明歸棹秋風白髪生霄漢鵷鴻驚昨夢田園竹菊寄髙情青山遥望雲行影𤣥鶴欣聞子和聲想見鄉人攜酒炙擁門争賀綵衣榮靈椿堂下綠隂成萱草堦前綵袖明行比一鄉能飽徳思封千戶却辭榮鴈行坐致朱輪貴鳩杖何妨白髪生從此門閭表通徳諸郎便合自升卿題天衣寺書堂無復晉風流翠蘚丹梯屐齒留雙澗聲摇維衛室十峰嵐擁法雲樓歸來野鶴三千嵗覽盡支那四百州金縷木蘭何處問松花自雨黑貂裘柬伯兄子教授兄弟情親六十年幼時相契老依然文章猶愧三王後風度渾如兩晉前江閣艤舟勞逺顧林亭下榻阻相延玉虹元接龍灣水别去音書許鴈傳送吳興相錄事摇摇畫舫逐鴻輕雲水東南一月程丹鳳門前攜酒别駱駞橋上折花迎溪山莫厭登臨樂閭里能忘俯傴情不見風流松雪老墨池春草為誰生雪後出近郊書寓目醉面衝風酒易醒破冰泉脉響泠泠梅花全露天然白山谷難藏雪後青老馬長鳴疲犖确病身隨影怪伶俜歸來寂寂虛齋冷石鼎雲翻煑茯苓和魏伯時灤京秋興薇垣書事一首秋著龍沙白草纎周廬擊柝令霜嚴珊瑚鐵網枝應老仙掌金莖露又添馳道屬車囘豹尾天門虎士盡虬髯仙郎持橐歸來早馬上尋詩吏隠兼送傅士開之守饒州故人薊北想風標候吏江東望畫橈共喜疲民蘇劇郡其如舊徳去中朝淮陽卧治何妨逺宣室思賢未覺遥莫道尺書誰與寄琵琶洲畔水通潮同孫景賢登陳覇先髙城覇先城郭眺新春還共孫郎話昔人兵下粤南曾駐吉園移梁祚遂歸陳麥苗秀匝中軍壘草色晴斑邏騎津今古興亡同一慨龍州景物更傷神題董宇定杏林書虞伯生詩後小車初駕試春衣三月城南花亂飛紅杏不須令虎守黄庭時許換鵝歸山中羽客曾相問天上文星漸覺稀准擬明年寒食夜重攜樽酒説芳菲越王臺崇臺遺構碧岧嶢南越何年覇業銷漢節早隨雲北去禺山猶在海東潮鷓鴣芳草王孫怨鴻鴈秋風荔子凋能賦登髙今老大都將清興託漁樵五言排律詩北上三十韻封軺趨召亟夙夜敢懐安入直羞持被馳邊示據鞍朝餔猶觸暑夕憇遽凌寒蔓草風吹綠繁花雨染丹行山疑路盡出嶺信天寛井近駞羣立沙柔象跡團霧衝泉喜動雲斸石愁刓薄賦兹多稼勤田復刈菅免罝施涿鹿麟藪絡桑乾鳥道車重轍仙方客借翰逶逶僧舍曲矗矗酒檣攢大海將昇日支流即瀉湍君臣嚴漢制禮樂屬周官扶杖思迎拜圜橋擬聚觀來朝煩就聘奔走愧傳餐有秩軒黄䇿無勞綺季冠採芝歌眇眇種菊去盤盤白髪從余懶青衿賴爾懽惜苔因病鶴養竹為翔鸞尚此糜倉廪寧徒陟巘巒赤塵浮目睫元淖漬絲鞶鷄塞霜凝露龍門水漲瀾冰脂羊尾割蕋蜜馬酥搏蓐食仍杯飲陶居亦考槃生微紈袴習粗給室家完文物昌期㑹光華首善端同文通肅慎奏賦見烏桓魚笏留青鎖樓船汎碧灤鎬京歌在藻殷輅御和鑾儃僈陪朝論空傷六義殘見子山尚書學禮趨庭日傳經相漢年帝思麟閣像臣獻栢梁篇清澈金莖露芬芳玉井蓮塤箎鳴自合星鳯覩争先委佩青𡨕上含香日月前才名應間出忠孝實雙全東壁圖書府西垣翰墨筵囊收封事草袖拂御爐烟簪筆烏臺峻鳴珂粉署妍聖情常有眷雅量獨翛然側聴經綸宻曾窺琬琰鐫薛慙懸溜直楮媿畫沙圓綠玉蠻溪硯金花内府牋草工王逸少筆諫栁公權昭代俱登用微才獨棄捐雕蟲蒙記憶轍鮒定應憐病馬猶思秣枯桐或可絃激昻中散曲飄泊孝亷船白帽尋歸隠緇衣竊好賢山林甘潦倒霄漢仰神仙鏡檻詩擬李義山體照獸金塗爪釵鸞翠縷翹梅添妝後額栁妬舞時腰未暖羅衣換先春綵勝飄深情眉上覺宻意眼中饒惆悵朱絃瑟殷勤白管蕭黄蜂偷蜜露翠羽拂蘭苕東海麻姑信西河阿母朝簾開仙珮近車去異香遥莫把犀如意時簪玉步摇塵飛青犢幰花壓畫欄橋越網千絲宻巫山一段銷屏山終礙路溝水不通潮窈窕烟光好丰茸草色嬌金泥書繭紙珠淚聚鮫綃才子芝田賦仙人紫府謡試慿梔子帶重問木蘭橈送傅汝礪教授之羊城貢玉堂中客梅花嶺外遊儒衣輕結束祖席且淹留古昔文為理詩家自一流明珠堪結佩白璧可聯鈎飛動催雷電微茫犯斗牛王楊端有體沈謝亦相侔前輩嗟零落風騷阻道修千人一日曉十度九言休之子年方盛詩名孰與儔才華紅錦縀塵土黑貂裘狗監無人薦雞林有價酬張騫囘漢莭王粲在荆州鳯詔論功早皐比屬望優畨禺秦郡縣泮水魯諸侯象跡烟中堞鯨波雨外舟榕隂迷粤徼栁色寄盧溝諸老皆青眼横經尚黑頭相思應有寄清絶變蠻謳送天師還山二十韵三十九代奕世元功著清時景運昌宗風從此振神教本無方綠繡傳天語奩香出未央九莖紛婀娜萬鶴下翺翔北極星辰近三山日月長椒蘭紛馥郁璧玉爛華光壇宇垂黄蓋天門奏綠章羽衣凌縹緲金節倚蒼茫黙爾精誠契油然恊氣滂甘霖蘇衆槁快雪表殊祥襏襫耕無勸汙邪載可望飛花深一尺宿麥富千箱餘潤沾袍濕殘飄拂面揚芝華髙擁坐桂醑滑流觴宣室承釐後浮邱挹袂行昔聞黄石履今避蓋公堂道大心無累功成世與忘樓船飛弱水仙袖拂扶桑園綺雖千載崆峒自一郷詞林書樂府靈徳永無疆題趙敬甫右丞經筵奏議藁後泰定開皇極文星拱北辰雍容治安䇿宥宻老成人廟算推先覺天聰斷若神百年興禮樂一徳㑹君臣超漢開東觀歸周盡逸民給符鳴玉佩賜坐列芳裀敷奏天嗟晚論思地更親清都零雨露仙樂罷韶鈞渾渾唐虞典熙熙宇宙春侍臣工㸃筆少府寵頒銀側聴經論宻恭惟徳教淳越裳來白雉宫沼出黄鱗丙魏聲名舊䕫龍寵渥新佇㸔歸補衮圗象在麒麟送汪臣良餘姚守十韻貢玉堂中客西陵渡口舟人呼前太史官是古諸侯共道還家樂仍傳得郡優石淙懸雁蕩嵓翠壓龍湫訪隠過梅市登髙賦越樓稻花風着水蓮葉雨争秋但使民無訟何煩里有謳人生五馬貴肯為一錢留江海誰狂客溪山是舊游鏡湖何日賜吾欲弄清流挽丁文苑北闕收科日東州半刺翔吳鈎利鋒鍔西玉美琳琅攻苦甘餐蘗摧枯快擊彊詩書名已著霄漢路應長蘭省初騰價儀曹轉耀鋩欲興周禮樂要補舜衣裳羽衛驚傳警欃槍怒益張從來身滿膽那惜皂為囊力挽千鈞弩精聞百鍊鋼忠言昭日月真氣攝豺狼豈特銷氛祲居然振紀綱周官嚴掌計漢署貴含香持節分吳㑹鳴珂出帝鄉鋤奸到根節遺愛洽耕桑三翼江流白千峰木葉黄弄兵封劍閣燃燧照清湘韜畧知無敵威懐各有方浮雲開斥堠飛鳥避風霜宇宙歸遼鶴波濤怒楚艎一時悲耿耿千古閟堂堂故箧遺文在新阡宿草荒素風知不墜能世有諸郎
