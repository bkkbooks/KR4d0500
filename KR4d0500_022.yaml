body:
  text: 伊濵集卷二十二元王沂撰題跋題胡士恭濠上藳嗜欲熾則神疲而意昏憂患集則氣折而語陋囿二者之纍而求詩之工難矣哉蛻氛埃處閒曠日與逸人勝士游固無嗜欲之惑逺聲光遺勢利遐想夫灝氣之初太素之始又絶乎憂患之撓士恭得乎濠上者若此宜其詩之工且多也由是而工之不已窅其興含之彌章幽其趣韜之彌光潔其氣逺之彌芳淡其味咀之彌長清其韻聆之彌揚與夫栁宗元韋應物李太白陳子昻上下乎清都之境翺翔乎白雲之鄉士恭以是求之則觀魚之樂亦有合於蒙莊書麥舟圖後嘗讀陳履常詩為惠不必廣但問與者誰受施何用多名義以為資未嘗不撫卷嘆息以為名言由是觀之則冉子之請原思之辭皆非義也孟子於薛宋則受於齊則不受莫非義也故曰可以取可以無取取傷亷可以與可以無與與傷惠堯夫曼卿皆一時偉人傑士其於取與必有見於此題孝節卷夫有德色之子則有誶語之婦有髙義之夫則有偕隱之妻劉氏之守節固偉矣亦處士之孝有以化之也家人之義歸於反身信哉而况關雎之行流風之被乎江漢者當何如也雖然子之致孝其親妻之弗移於夫理當然也而韓氏夫婦乃厪太史為之書噫題獲麟圖關雎之應實無麟而若麟之瑞春秋之作實有麟而非麟之時噫題李敬齊樂府後余嘗觀敬齊賦鴈邱雙蕖怨樂府數章於元遺山集中經緯綿密詞㫖清楚似勝元作意者如黃魯直陳無已和東坡詩前輩所謂極力以壓此老者今觀全集其語意渾厚絶類晏元獻父子乃知遺山附入之意有在也題晦室甄德修命其藏修之室曰晦而王子為之詞曰春華之榮須風光以成煥其神明須含光以貞龍蛇之蟄以藏身尺蠖之屈以求伸巷顔之如愚而摯之耕於有莘晦其名者昌晦其德者百世不忘斯聖人之所以洗心於密而退藏題大學治平龜鑑後李朝佐著窮經將以致用者也漢之儒者亦嘗以六經之學竊見於用如以禹貢行河以春秋斷獄以三百五篇進諌六經之用固不止於此然視夫授之以政不逹使於四方不能專對者如何也余有取乎大學治平龜鑑者以此云題歐陽公權墨迹宋江文忠公萬里稱歐陽公權事親孝為人忠謹身如玉淡然無世間榮利意評其文髙處逼西漢其推重如此此記雖非愜意之作然憂世之心溢於言外是未易以工拙論也書紀將軍傳後晉州鼓城之東有封巋然相傳為漢紀將軍墓鼓城居氓紀姓者百餘家皆云將軍後蓋信然也司馬遷班固序漢之興亡有畫一策下一城皆為立傳而將軍以身殉國脫髙祖於厄忠義之氣到今凜然如生權懸夫運籌游說搴旗斬將之功何霄壤之寥絶也是宜詳其胄出而傳之以勸忠於後世而乃附載焉繆矣雖然彼運籌游說搴旗斬將者雖赫然震耀於一時而泯滅無聞久矣將軍獨俾人稱思至今社而稷之尸而祝之豈其忠義之在人心者使然歟傳曰非此族也不在祀典將軍在之矣紀姓有仕國朝為千夫長者曰禎字天祐為廟以祀余既嘆史氏之陋而嘉天祐之能表顯其先也於是乎書書硯北生傳後至順間余嘗序硯北生集古印考是時生年甫三十挾此著書游京師一時賢豪知名士皆與交生負其有不肯俯首隨流俗已而歸吳中後十年余待詔宣文閣審定御府所藏珍圖名札品第甲乙諸公貴人間問海內精賞鑑可召用者余曰吳中趙仲穆與生淮南陳新甫而已既而余承乏翰林一二貴人亦相繼去而無知生者矣又三年詔修遼金宋史余言任事者曰生聞見甚博叙事有法宜以前代陳無已故事召生而任事者復以白衣難之至是不見生十五年矣道士張一無來出吳興王蒙著硯北生傳讀之笑曰昔米元章以髙世逸羣之氣而姍侮杜少陵於數百年之上豈獨為一薛少保計哉生方以圖書翰墨之樂而錙銖軒冕以湖山釣遊之適而塵壤勢利是區區者曽何足言而余亦淺乎知生者矣乃補傳贊曰鼓文周篆缺莫續鐃歌漢詞亡可屬昆玉蟾肪泥視玉螭盤蠶卧紋雷榖商甗姜鼎敦有牧雕戈蟲魚畫狸鵠斷縑敗楮倒囊贖雜然前陳什襲蓄清風古意溢我目誰其樂之吳郡陸題理千户孝行傳後歐陽子云禮之失久矣喪禮尤廢也今之居喪者惟仕宦婚嫁聼樂不為此特法令之所禁爾其衰麻之數哭泣之節居處之别飲食之變皆莫知夫有禮也在上位者不以身率其下在下者無所望於其上其遂廢矣乎觀此則知理君之孝行可尚也哉文謁鳴臯山三清殿文鶴鳴之山秀而雄兮方壺蓬萊此别宮兮雲旗羽輪飄乘風兮烟消月出聞瑽瑢兮哀此嵩民瘠而窮兮維神之祐助嵗功兮藥疾驅癘攘螟蟲兮雨暘以時沴易豐兮桴鼓不鳴囹圄空兮爾夀爾昌曰農工兮何以報之愧於中兮謁於靈宇嚴以恭兮神之惠我曷其終兮謁木門義應侯廟文撮土之山勺水之淵苟利於人有神司焉况於嵩髙卓瑋拔出倫類出風雨見怪物而合於先王之典禮者耶維神血食此邦著於前代靈蹟昭昭攘凶拯害其式遵故典敢修禮謁永維靈德常祐斯民則民之事神其孰敢怠謁三塗龍祠文三塗之險實險而竒創立峩峩帶以長伊其險伊何有神司之神有靈蹟邦人所祗噫風震霆騰雲擴霓驕陽以祛膏澤以施拯溺攘凶庇廕嘉秠開闔變化其功孰窺我民報事豈有斁思爰卜其吉蚤駕以馳爰肅我躬爰謁靈祠爰求民瘼匪禱我私爰以薦神神其歆之弔鼂錯文有漢失馭兮裂土擅强太阿倒持兮黃屋翺翔綱紀逆臾兮弗慮弗匡馮口或啓兮胸陷劔鋩賈䇿之畫兮流涕浪浪大夫之弗言兮後之人又何望噫􅏓盩之云錮兮俞扁深矉其旁厲針石以從之兮衆果竊笑其為狂猛獸之在山兮樵採擯迹鷙翮之髙翔兮狐狸不食何大夫之忠勇兮君胡惑夫讒賊詎覆敗之是圖兮卒快心乎仇敵殺身之匪余戚兮哀宗社之將隳苟余心之無愆兮雖勦絶而奚悲嗟夫世之議大夫兮曰胡蹈殆而弗疑術數之自操兮斯聖人之所非身居而君將兮固召禍以媒譏君子之過忠兮故忍責其纎微羌余𠂻之坎坎兮獨咏嘆而長思余哀後之人兮何鞠恧而抵巇咸嗟卑而嘆老兮孰懼忠讜之或虧瞻馬鬛之遺封兮聊徘徊于潁湄緬遺塵之遼絶兮涕浪浪以沾衣贊天衢子贊翰林供奉李彥方自號天衢子贊曰豐下而腴有美髯鬚冠服也儒春溫盎如紬金匱書直承明廬扁舟江湖世莫能拘彼疾其驅我車徐徐與時卷舒是為天衢二賢贊翰林待制揭君曼碩既為西江彭君宗徐書仲長統樂志論陶淵明歸去來辭宗徐弟宗建求余書其末余謂二賢之心迹固見於論與辭若其言行之詳有非辭與論所能盡者乃為二賢贊俾有以希慕云曰有漢徴士世居山陽䇿幹之敗厥聲益彰俶儻敢言或以為狂發憤著書其言曰昌足繼西京董賈劉揚卜居清曠於焉倘徉散䇿平林濯纓滄浪雅操南風妙曲清商呼吸精和靈龜與藏猗歟先生與道翺翔有晉處士少而居貧州府三命不屈元纁棄官從好厚志薄身賦詩歸來寂寞之濵灌畦鬻蔬魚菽是勤宵盤晝憩非舟非輪抑揚爽朗其辭不群白璧微瑕孰云知文簞瓢屢空短褐懸鶉求義而義求仁而仁曰康曰惠往世同塵猗歟先生天之逸民王善甫畫像贊千嵗之松百鍊之鋼遇挫弗虧雖老益彊撫民也煦兮春陽擊強也凛然秋霜髮白顔蒼洗心退藏觀浮雲而一笑聊杖屨以徜徉張淳甫像贊洛陽張生舉拜且泣請於余曰先人以潛德晦行聞於鄉而卒窮以死舉也無似懼無以表見於世先生其哀而賜之文俾托以不朽吾小人亦與榮焉豫弗獲辭為之言曰莊周論天曰自然吾以為荒唐之言至於仁者夭鄙者夀賢者窮愚者逹荒忽而不可究然後知周之言為弗謬嗚呼張君璞玉之良道弸於中而暴之以藝孝行于家而譽聞於鄉然而善不克報勤不獲祿謂天有知何禍何福謂天無知何後之淑舉也勉旃姑務于學以求其傳庶足以發幽光於九泉古之所謂倚伏者尚可信而俟焉申包胥不云乎天定而後勝人人衆而能勝天奎章照磨林彥廣侍儀舍人畫贊辨色而朝百辟輯瑞以㑹萬方紫宸之班濟濟蹌蹌望之猶鳴鳯之在朝陽此其凛而清頎而長言而文神而昌直承明廬登寶繪堂者邪遺安堂贊為李唐卿御史書維士晦顯繇時亂治即以求安其㫖有二其在於易隨時之義義猶權衡曷可錯置其在於書曰安汝止道猶規矩方圓是視三仁事殷或去或死二老歸周或用或恥是義之安以時而已君仁臣敬安在於是止慈止孝曰父與子是道之安不易萬世龎公栖遁丁漢之季豈表是依聊以避地遺安之對可施於彼表終不悟徒髙其事猗歟世德醴泉仙李其承有子以文起仕既二天官為材御史有孫嶷嶷亦紹厥美畎畝之安烏得而擬曰視諸道其安以此其安以此維後之祉銘尊已齊銘為績溪汪氏賦人于萬物所貴為已蹈賢軌賢由巳而巳惟爾從欲得彼忘此孰云千金視若泥滓惟此可尊惟彼可耻精擇力行一問諸理伊誰名堂猗歟朱子先君硯銘其厚也不反不側君子之德其潤也溫其如玉君子之澤惟其然余先君子寶焉以昌斯文之傳碑知宣德府王公遺愛碑宣德郡兩京間險帶河山勢壯屛翰列聖時巡馳道所從出車傳旁午民廬阜蕃猶漢三輔嵗巡幸服御供帳陪扈百官厨傳飛挽鏹屬罷軟吏既喉喘顛汗免罪戾不暇而並緣為奸者躍躍以喜矣其鷹擊以峙威猛令以趨辦則又民不寒而栗其有臨政而民安之既去而思之不忘者可不謂賢乎哉乃今王公既代之如干年而民著其善政于石曰俾我民不忘公之德則其賢可知矣初延祐三年陕西牧弄兵朔漢皆警上都留守議時丁祁寒宜預具羊裘以待戰士既具而請其直賦宣德屬邑裘帽袴四百餘雙襲既輸而直不下巳而西北解嚴嵗輸不巳民以故敝其資或立劵舉責困不能償至鬻妻子歷十四年吏師耳目不究公曰弊有大於此耶事首於一時權宜者曷可因於後况畿輔根本地王化所先民可重困也哉即下令其屬罷之既而留守司亦不復語所輸公代去久之徵如初時至元三年也公家居上京聞之歎曰夫任其事必圖其效我為政於彼而惠莫能終可乎且古之君子有以利人無不為也今吾豈宜避一時之嫌而貽其民百世之害乃析陳其顛末於分司御史罷之如公言於是民歡呼以手加額曰公德我民至矣哉且以武川劉黼之序介國子助教康君魯瞻來請書公名敏善甫字也蔚州靈仙人早以儒術飾吏事嘗拜御史西臺丞珍用監同知上都留守司所至聲赫然今特紀其為宣武者繫以詩曰治理孰難厥惟王畿懦或勢回猛威禍基一弛一張惟相厥宜我以吾誠孰難厥施灤水之陽居庸之北眷此奧區拱翼都邑民物夥繁風氣淳質順時撫方布昭品式從官衛士羽林鷹師其來如雲其給星馳曰此常供民敢或違豈其誅求恆若登陴惟我王公若疾在已蠧宿弗剔曷致於理公言諄諄如裘之溫惟誠動神而况於人昔也五羖貴擬狐貉今也在野戢戢其角昔也紐聨婦手胼胝今也然膏緝毳而機民言公德我覆我育豈惟婦子及我牢畜博瘠蘇僵起我嚬呻公燕夀考式慰我民我民之思載歌載詩庸勸後人德馨似之
