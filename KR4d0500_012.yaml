body:
  text: 伊濵集卷十二元王沂撰七言絶句詩上京離宫金碧鬱岧嶤祇隔灤河一水遙知是上林來進果鈴聲隱隱轉山腰黃金布地寶陳華香漾薔薇洗佛牙甘露穴中遺舍利神光五色瑩無瑕曼衍魚龍雜梵儀金仙來降鳯城時都人稽首瞻雕輦漠漠祥雲護彩旗白面王孫家五陵朝回新賜雪毛鷹金溝芳草沿堤緑蹀躞花驄驕不勝龍綃衣薄怯新涼銀葉煙消換日香休畫修蛾鬭雙緑栁風吹淡漢宫黃滇池細馬四蹄風白玉雕鞍繡結鬃爭把珊瑚鞭指㸃飛塵先入建章宫鐵幡竿下散燈回茜褐髙僧夜呪雷明日皇家賜酺宴秋雲漠漠曉光開轆轤金井促晨粧珠帽紅靴小作行爭向銀床拾梧葉夜來秋意到長楊黃須年少羽林郎宫錦纏腰角抵裝得雋每䝉天一笑歸來騶從亦輝光龍沙白草望參差苜蓿蒲桃記種時待詔侍臣巳華髮梨園休奏玉交枝賁渾法輪寺阻雨四首燈昏丈室雨聲寒料理禪床蝶夢殘惆悵陸渾房次律琴中不識董庭蘭風鈴驚鵲未安枝山月窺床夢斷時休問甕中書在否前身知是永禪師野衲窮年靜愛山白雲一塢竹千竿庭前柏樹何須指架上楞嚴已不看欲寫新詩調比邱芭蕉葉老不禁秋法輪要識無窮轉雲自長空水自流題德興董孝子傳後芝山修竹拂雲髙歲歲慈鴉占作巢無限春風採蘭意江湖天濶足風濤雲臺觀寄張宜相蓮花峯下對爐薰坐待飈車過羽輪欲問山靈乞飛翠囊封寄與學仙人山茶青雀西飛阿母宫霓旌羽蓋緑雲中丹砂費盡三千斛染出仙衣鶴頂紅題並騎圖上林苑內辭同輦繡嶺宫前語並鞍紈扇秋來猶在篋香囊塵暗莫重看與劉志善談詩風氣開時習俗移文章千變亦如之當時不是毛韓輩雅頌寥寥說向誰過古伊陽縣汝流浩浩鬱黃霧紫羅山腰欲無路可憐客子無安棲不及浮槎有髙樹寄四川支文舉三首昔年我作成都客酒釀郫筒日日攜惆悵浣花溪上路亂山無主子規啼雪衣勸酒能呼客烏鬼銜魚自上船多少海棠花上露春來不染薛濤箋蜀梅纖縷蜀薑辛暈碧裁紅更可人待詔相如苦消渴煩君為寄錦江春寄賈本二首遙憐問事賈長頭鞏樹嵩雲又一秋我寄雙魚問消息誰能遣騎覔扁舟君歸耕種水南田我望神嵩一慨然安得攜琴午橋路竹隂多處㵼寒泉送鄭生之靖州知事賣刀買犢趁春耕共說氷壺莫厭輕過得沅湘故人少芳馨欲寄若為情河東試院書事十首把卷燈花綴玉蟲懸知冀北馬羣空錦袍落魄并州客曽識當年郭令公風簾漾日影鱗鱗咫尺中分越與秦莫道霜袍如立鵠河汾還有著書人偶從連蜷議雌霓堆案森森束笱齊簾捲虛庭羣吏散古槐隂泠暮禽棲雕蟲燕說竟如何未必冥鴻在網羅重理槐花少年夢自憐樗散鬢絲多銅盤官燭淚成堆過鴈聲聲叫夢回想見京華秋意好小園黃菊待人開陳布常山器械犀姓名應染武都泥漢家肯許黃金鎰萬斛丹砂鑄裊蹄睡起挑燈自寫題青綾半擁聽鳴雞坐中執法霜威肅過眼誰云五色迷空階墜葉響琅玕鳥鵲無聲白晝閒忽意河汾隱君子夢中攜酒石州山漢武汾隂㑹百靈樓船簫鼓徹青冥年年后土祠前路落葉秋波似洞庭蒼煙白草古離宫不見宫花向日紅欲問晉陽興廢事亂鴉飛盡夕陽中寶雞縣壁見張雄飛杜德常二御史詩嘉陵江水淨無泥江上青山是寶雞古驛荒涼誰與語故人詩向壁間題解虎圖宴坐空山性自圓短笻服猛立翛然極知解鬭修行力何似相忘未鬭前看山昔年騎馬看青山曾與青山共往還今日居家亭子上依然山在白雲間和陸友仁尺五城南詩九首尺五城南油壁車香輪輾破緑無涯遙憐館娃宫外路應與裙腰一道斜尺五城南日正遲遙憐江上草薰時梅花落盡不歸去惆悵玉叉生網絲尺五城南歲又除坐看春色滿皇都東家剪綵作蝴蝶西舍然燈迎紫姑尺五城南側玉壺葳蕤舞帶拂氍毹酒酣莫把朱櫻擲獺髓補痕郎有無尺五城南栁色新縹窗不識曉街塵桃花一夜開無主鸚鵡明朝錯喚人尺五城南日半曛金羈繡轂兩紛紛羯鼓聲催柘枝曲葡萄酒汚石榴裙尺五城南第幾家燕姬留客醉琵琶秦娘莫與新粧好走上皋橋空折花尺五城南恩澤侯從奴斜抱白貂裘禁街鐘盡無人問千騎鳴笳踏月遊尺五城南賈客船吳綾賣盡買茸氊猶嫌吳女吳音拙載入都門學管弦題竹篔簹偃竹何年寫石上孤根碧蘚封煙雨從教藏翡翠風雷慎勿起蛟龍復齊詩為李彥方作廬陵李直卿以復名其齊求子詩久未暇也今日雪霽登樓偶得此遂書以贈顧惟聖門精微綱領豈淺陋能窺祗增三嘆焚香清坐玩羲經一氣循環自不停造化密移誰解得窗前草色又青青李侯索我復齊詩此理難明信者稀要識聖人端的意須于動處見天機萬化根源天地心幾人于此費追尋端倪不逺君看取妙用何曽間古今渭北春天送王君實御史西臺渭北春天驄馬行蜀江波照緑衣明蒟醬遙聞通道路皂囊何以答升平渭北春天栁色青暫辭鴛鷺出蓬瀛風光正好若為别花發鳥啼空復情渭北春天引興長登臨誰共繡衣郎漢家宫殿生秋草秦國山河半夕陽渭北春天縱目初曲江樓上獨躊躇長安煙樹多如薺望見蓬萊雲氣無渭北春天午睡餘諫章封了夢清都羽陽宫瓦堪為硯閒寫先秦古器圖書貢生慈母傳後魚軒未入甘泉畫彤管先書太史辭寸草春暉何以報南陔正是采蘭時題看雨軒江雲漠漠樹濛濛葛服龍鍾寄短蓬憶我滄洲十年夢不知身在此軒中折花折花不用散花天自插銅瓶貯石泉莫恨洗粧無一物維摩方丈本翛然聞鶯衣染鵝黃濕未乾髙枝顧影怯春寒數聲飛入林深處婭姹嗔人著意看宫人聽琴圖幽閒曲奏鳳凰絃寂聽多時側鬢蟬彈到樊姬秋竹引媫妤飛燕莫爭妍湧翠亭十年京洛敝貂裘馬首黃塵學水流今日君家亭子上青山如浪屋如舟武功驛書感驛有姚合詩刻武功姚尉最能詩古驛荒涼卧斷碑澗水流春山罨畫料應清味少人知白桃花東風别作武陵春林下盈盈縞袂新道骨仙姿有如此譍門不是去年人南軒書事四首鷦鷯隨處一枝安庭角哦詩歲又闌不是銅章留客住鳴皋山月要人看官舍何殊山崦居蕭然瓶錫野僧如問君千里西來意只為伊陽好著書孤燈掛壁不成光白牯青奴共晚涼清夢初回成獨笑偶然山雨到叢篁綸巾羽服卧伊濵清嘯孤吟頗著勳留與後人還要否南山修竹北山雲滎河書事萬里洪河豁醉眸村歌野舞故淹留欲扶公子青藜杖拄到崑崙最上頭汾河汾河詰曲繞靈關邑屋參差夕照間隔岸修眉畫新緑郵童指是石州山題頤貞齊曽聞天上養賢鼎只與山家煮菜同誰向東堂乞鵝炙劉郎原未是英雄立春日二絶閉户貪抄陸氏方東風不學到伊陽易求合浦珠千斛難覔江南書一行竹外梅花出短籬梅邊水暖鴨先知風流好似西湖上只缺東風媚酒旗舟泊荻港水光山色漾丹霞舟艤鷗沙近酒家亂撲篷窗惱詩思春衣㸃㸃是楊花世綵堂緑江廖氏多才子文采風流世所稀江上雲霞散成綺年年裁作老萊衣神禹治水圖昔年將㫖祀河東曽過龍門嘆禹功誰築宣房歌瓠子汾隂簫鼓又秋風晚春風吹榆莢飄似霰雨洗天階淨如練佳人别來不相見却羡游絲逐雙燕宫人怨捧鏡宫鬟促曉粧經春夢不到昭陽雙雙怕見新來燕休捲珠簾十二行宫怨五雲樓館靜愔愔一閉嬋姢日月深三十六年勞望幸輕紅淺黛一生心題馮致逺世父書畫後筆底江湖一段秋書成蠆尾雜銀鈎故家文物于今少珍重名郎什襲收三馬圖金羈玉勒非吾喜豐草長林樂我天安得圖中此三駿南山射虎過殘年枕上聞布穀退處衡門久謝名田園生計頗關情松風蘿月洪岡曙枕上初聞布穀聲嘉陵驛嘉陵修竹拂雲長石棧東風覺筍香指㸃籜龍呼驛吏從今館劵莫支羊又江流迎客縠紋波啼鳥窺人隱緑蘿撲鼻生香來不斷東風一路野花多題水仙水為環珮玉為裳一種春風各自香幽恨瑤琴傳不盡至今煙雨暗瀟湘應真渡海圖雲海茫茫空復空擔囊飛錫浪花中好將貝闕珠宫景說與西山面壁翁題胡古愚李氏婦傳後見說當年挽鹿車素風淳範照鄉閭日星炳煥班昭戒華衮褒揚太史書金人射獵圖驚沙獵獵北風寒馬上呼鷹塞草乾壯士還家散如霧只今餘得畫圖看訪袁仲修城西草亭暮行濠上雜花謝盡獨海棠一株照映籬落間成詩三首閉門不知緑滿城春濃睡足午窗明今朝憩馬官栁下聽得黃鸝一兩聲玉川破屋城西邊應門長鬚貪晝眠鵲聲似報有佳客蹴踏殘花落馬前華屋金盤夢一場也隨風絮落溪傍天寒翠袖無人識閒照滄浪試晚粧題宣和畫鷂圖修翎豈是懷中物日轉龍墀奏未終却是南朝賞神俊青縧穩繫待秋風贈玉峯長老破鐺煮飲把茅間不信石頭行路難要致塗湖千五百玉峯髙並雪峯寒停雲晚坐山郭濛濛雨欲塵滿園羣緑一時新賸傾竹葉杯中物報答海棠枝上春汾陽道中映竹桃花取次開天寒翠袖若為裁落紅飛滿汾隂路知有詩人紫禁來東行邃谷僅容駝歷歷蜂房户牖多想見陶唐餘俗在黎民擊壤有遺歌過潼關天風吹袖下雲台玉井芙蓉為我開行過潼關却回望半空飛翠逐人來仙源秋曉逺是青山近是林仙源秋色雨中深前溪不是桃花水縱有漁郎無處尋芝圖鶴駕羣仙不可追卷中還見舊題詩桐鄉祠在荒秋草圖畫空傳五色芝晚立晚花飄盡緑隂涼輸與蕪菁滿眼黃老大此身無著處東風吹上橐駝岡清明雜詩二首新緑層層社雨餘官居瀟灑似禪居東風無賴吹佳夢何事重翻架上書飛來黃鳥最髙枝欲語還休待我詩忽憶江南消息斷折花臨水立多時次西湖柬萬初首座紅葉離離翠葉乾浮雲散盡楚天寬推篷吟得湯休句留與東山首座看詞清平樂春去宿酲初醒裊裊吟鞭影蜀道秦川行路永羅袖殘香消盡清明寒食匆匆能消幾日東風蝴蝶不知春去畫橋貪趁流紅菩薩蠻題李溉之詞卷大明湖上秋容暮風煙杖屨時來去說與病維摩可人秋水呵自書盤谷序和了停雲句把酒為君歌濟南名士多青玉案送溫叔剛之解州軍司幕官東風撲面飄紅雨正杜宇催春去馬首西山青半縷汾隂簫鼓晉陽煙樹總是消魂處芙蓉緑水佳賔主賭酒金錢更數若見東皋煩寄語山林真味醉鄉天趣待我平分取滿江紅夀張良卿學士九萬扶搖試看取垂天鵬翼追往事星辰劔履玉階山立為問寶香黃閣夢何如仙闕丹臺籍寫風流杖屨入耆英今猶昔詩酒部笙歌席松菊社雲煙屐早東風為報日邊消息虎節貂蟬端舊物分封凖擬如椽筆對西山一笑五千年髯如㦸水龍吟和鄭彥章韻畫簷疏雨才收酒醒疑掩蓬窗卧熏爐火冷餘香猶在擁衾清坐㸃鬢霜明窺人月小短檠花墮想吳山越水樓臺縹眇應曽有飛鴻過寂寞文園病後舊心情苦無些箇多君調我幽蘭新句紋箋玉唾花落元都鶴歸華表夢誰驚破待蓴鱸江上髙歌小海扣舷相和御街行送王君冕煙中列岫青無數遮不斷長安路杜鵑誰道等閒啼迤邐得人歸去隴雲秦樹周臺漢苑滿眼相思處停杯莫放離歌舉至剪燭西窗語元都燕麥又春風自是劉郎遲暮紉蘭結佩裁氷斫句細和閒情賦君行廣武山前路是阮籍回車處問他孺子竟何成落日大河東注無人說與遙岑逺目也㑹修眉嫵離宫别館空禾黍嘯木魅啼蒼鼠悠悠往事不經心只有閒雲來去停雲得句歸雲洞府領取淵明趣
