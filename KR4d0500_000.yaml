body:
  text: 提要别集類四元伊濱集二十四卷臣等謹案伊濱集二十四卷元王沂撰沂字思魯先世雲中人徙于真定父元父官至承事郎監黃池稅務馬祖常石田集有所作元父墓碣銘叙其家世甚詳而沂始末不槩見今以集中所自述與他書參考之尚可得其大略據馬祖常碣銘稱與沂同榜則當為延祐初進士據集中送李縣令序則嘗為臨淮縣尹據義應候廟記稱延祐四年佐郡伊陽考地理志伊陽在嵩州則嘗為嵩州同知又詩中有綸巾羽服卧伊濱之句則集名伊濱亦即起于此時據祀南鎮北嶽諸記則至順三年嘗為國史院編修官據送翟生序及胡節母詩序諸篇則元統三年嘗在國子學為博士據送余闕序稱元統初佐考試見闕對策云云則嘗入試院同考而余闕實為所得士據祀西鎮記御書跋諸篇則至元六年嘗為翰林待制並嘗待詔宣文閣又宋遼金三史成于至正五年而書前列諸臣修史有總裁官中大夫禮部尚書王沂之名則是時已位至列卿其後遷轉遂不可考疑即致仕以去然集中壬寅紀異詩有壬寅仲春天雨電南平城中晝驚愕自從兵革十年來澒洞風塵亘沙漠之句又鄰冦逼境倉皇南渡詩有鄰邑舉烽燧長驅冦南平中宵始聞警挈家遂逺行之句又有寓吉林塘避桃林兵警詩壬寅為至正二十二年正中原盜起之時距沂登第已五十載尚轉側兵戈間計其年亦當過七十矣沂歷躋館閣多居文字之職廟堂著作多出其手與傳若金許有壬周伯琦陳旅等俱相唱和故所作詩文舂容和雅猶有先正軌度惜其名不甚著集亦絶鮮流傳選元詩者并不能舉其名氏今從永樂太典中裒掇編次釐為二十四卷庶梗概尚具不致遂就湮沒焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
